<!DOCTYPE html>
<html lang="da">
<head>
  <meta http-equiv="Cache-Control" content="no-store" />
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- PWA / iOS standalone-mode -->
  <link rel="manifest" href="manifest.json">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Biodynamisk">
  <meta name="theme-color" content="#131a22">
  <link rel="apple-touch-icon" href="apple-touch-icon.png">
  <link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
  <title>Dagens invitation — Den Biodynamiske App</title>

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=Cinzel:wght@300;400&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="container">

    <!-- Top navigation -->
    <header class="top-nav">
      <button class="back-btn" onclick="window.location.href='index.html'">‹ Hjem</button>
      <span class="category-label">DAGENS INVITATION</span>
    </header>

    <!-- Main title -->
    <h1 class="main-title" style="margin-top: 24px;">DAGENS INVITATION</h1>
    <p class="subtitle">en hilsen at sidde med</p>

    <!-- Divider -->
    <div class="divider"></div>

    <!-- Hero illustration -->
    <div class="hero-container" style="max-width: 380px; margin: 32px auto;">
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 80 380 380" role="img" aria-label="Dagens invitation">
<defs>
<style>
@keyframes core-r { 0%, 100% { r: 36px; } 50% { r: 46px; } }
@keyframes aura-r { 0%, 100% { rx: 158px; ry: 158px; } 50% { rx: 182px; ry: 182px; } }
/* Strålerne ekspanderer synkront ud fra kernen — invitationen rækker udad */
@keyframes beams-breathe {
  0%, 100% { transform: scale(1); }
  50% { transform: scale(1.12); }
}
.core { animation: core-r 8s ease-in-out infinite; }
.aura { animation: aura-r 8s ease-in-out infinite; }
.beams-group {
  animation: beams-breathe 8s ease-in-out infinite;
  transform-origin: 190px 270px;
  transform-box: view-box;
}
@media (prefers-reduced-motion: reduce) {
  .core, .aura, .beams-group { animation: none; }
}
</style>
<radialGradient id="well-inv" cx="50%" cy="42%" r="65%">
<stop offset="0%" stop-color="#1f2a35"/>
<stop offset="55%" stop-color="#131a22"/>
<stop offset="100%" stop-color="#0c1218"/>
</radialGradient>
<!-- Monokrom palet: rent hvidt over mørk skifer — DAGENS INVITATION -->
<radialGradient id="core-g-inv" cx="50%" cy="50%" r="50%">
<stop offset="0%" stop-color="#ffffff" stop-opacity="1"/>
<stop offset="30%" stop-color="#e8e8e8" stop-opacity="0.75"/>
<stop offset="70%" stop-color="#a8a8a8" stop-opacity="0.25"/>
<stop offset="100%" stop-color="#787878" stop-opacity="0"/>
</radialGradient>
<radialGradient id="aura-g-inv" cx="50%" cy="50%" r="50%">
<stop offset="0%" stop-color="#d8d8d8" stop-opacity="0.28"/>
<stop offset="55%" stop-color="#888888" stop-opacity="0.08"/>
<stop offset="100%" stop-color="#666666" stop-opacity="0"/>
</radialGradient>
</defs>
<rect x="0" y="0" width="380" height="640" fill="url(#well-inv)"/>
<ellipse class="aura" cx="190" cy="270" rx="170" ry="170" fill="url(#aura-g-inv)"/>

<!-- Otte stråler der rækker fra kernen ud mod periferien.
     Cardinale + diagonale retninger. Symbolet på en invitation der ikke
     henvender sig til én retning, men til alle retninger samtidigt. -->
<g class="beams-group" stroke="#e0e0e0" stroke-width="0.6" fill="none" opacity="0.6">
  <line x1="245" y1="270" x2="330" y2="270"/>
  <line x1="229" y1="309" x2="289" y2="369"/>
  <line x1="190" y1="325" x2="190" y2="410"/>
  <line x1="151" y1="309" x2="91" y2="369"/>
  <line x1="135" y1="270" x2="50" y2="270"/>
  <line x1="151" y1="231" x2="91" y2="171"/>
  <line x1="190" y1="215" x2="190" y2="130"/>
  <line x1="229" y1="231" x2="289" y2="171"/>
</g>

<!-- Indre lag af stråler — svagere, lidt kortere — dybden af invitationen -->
<g class="beams-group" stroke="#c0c0c0" stroke-width="0.4" fill="none" opacity="0.32">
  <line x1="218" y1="270" x2="259" y2="270"/>
  <line x1="210" y1="290" x2="244" y2="324"/>
  <line x1="190" y1="298" x2="190" y2="345"/>
  <line x1="170" y1="290" x2="136" y2="324"/>
  <line x1="162" y1="270" x2="121" y2="270"/>
  <line x1="170" y1="250" x2="136" y2="216"/>
  <line x1="190" y1="242" x2="190" y2="195"/>
  <line x1="210" y1="250" x2="244" y2="216"/>
</g>

<circle class="core" cx="190" cy="270" r="42" fill="url(#core-g-inv)"/>
</svg>
    </div>

    <!-- Dagens draw — fuldt kort -->
    <div id="daglig-draw-slot"></div>

    <!-- Bottom navigation -->
    <nav class="bottom-nav" data-active=""></nav>

  </div>

  <script src="js/theme-toggle.js"></script>
  <script src="js/bottom-nav.js"></script>
  <script src="js/daglig-draw.js"></script>
</body>
</html>
