<style>
@keyframes core-r { 0%, 100% { r: 36px; } 50% { r: 46px; } }
@keyframes aura-r { 0%, 100% { rx: 158px; ry: 158px; } 50% { rx: 182px; ry: 182px; } }
@keyframes spiral-breathe {
  0%, 100% { transform: scale(1); }
  50% { transform: scale(1.12); }
}
@keyframes dot-r { 0%, 100% { r: 2.5px; } 50% { r: 3.3px; } }
@keyframes dot-highlight {
  0%, 100% { r: 2.5px; opacity: 0.95; }
  8% { r: 5.5px; opacity: 1; }
  16% { r: 2.5px; opacity: 0.95; }
}
.core { animation: core-r 8s ease-in-out infinite; }
.aura { animation: aura-r 8s ease-in-out infinite; }
.spiral-group {
  animation: spiral-breathe 8s ease-in-out infinite;
  transform-origin: 190px 270px;
  transform-box: view-box;
}
.spiral-dot { animation: dot-r 8s ease-in-out infinite; }
.spiral-dot-1 { animation: dot-highlight 20s ease-in-out infinite 0s; }
.spiral-dot-2 { animation: dot-highlight 20s ease-in-out infinite -4s; }
.spiral-dot-3 { animation: dot-highlight 20s ease-in-out infinite -8s; }
.spiral-dot-4 { animation: dot-highlight 20s ease-in-out infinite -12s; }
.spiral-dot-5 { animation: dot-highlight 20s ease-in-out infinite -16s; }
@media (prefers-reduced-motion: reduce) {
  .core, .aura, .spiral-group, .spiral-dot,
  .spiral-dot-1, .spiral-dot-2, .spiral-dot-3, .spiral-dot-4, .spiral-dot-5 { animation: none; }
}
