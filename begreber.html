<!DOCTYPE html>
<html lang="da">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>De 18 begreber — Den Biodynamiske App</title>

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=Cinzel:wght@300;400&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="css/style.css">

  <style>
    .constellation-container {
      width: 100%;
      max-width: 900px;
      margin: 32px auto 48px;
      padding: 0 20px;
    }

    .constellation-svg {
      width: 100%;
      height: auto;
    }

    .constellation-sphere {
      cursor: pointer;
      transition: opacity 0.2s ease;
    }

    .constellation-sphere:hover {
      opacity: 0.85;
    }

    .constellation-label {
      font-family: var(--font-body);
      font-size: 13px;
      font-weight: 400;
      fill: var(--text-primary);
      text-anchor: middle;
      pointer-events: none;
      user-select: none;
    }

    .constellation-connection {
      stroke: var(--text-secondary);
      stroke-width: 0.5;
      stroke-dasharray: 3, 3;
      opacity: 0.25;
      fill: none;
    }

    /* Kontinuerlig pulsering (6-sekunders cyklus som på individuelle sider) */
    .sphere-circle {
      animation: breathe 6s ease-in-out infinite;
      transform-origin: center;
      transform-box: fill-box;
    }

    .sphere-glow {
      animation: glow-pulse 6s ease-in-out infinite;
      transform-origin: center;
      transform-box: fill-box;
    }

    @keyframes breathe {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.055); }
    }

    @keyframes glow-pulse {
      0%, 100% { opacity: 0.82; transform: scale(1); }
      50% { opacity: 1; transform: scale(1.03); }
    }

    /* Respekter brugerens motion-preferencer */
    @media (prefers-reduced-motion: reduce) {
      .sphere-circle,
      .sphere-glow {
        animation: none;
      }
    }

  </style>
</head>
<body>

  <!-- Dark mode toggle -->
  <button class="theme-toggle" aria-label="Skift tema"></button>

  <div class="container">

    <!-- Top navigation -->
    <header class="top-nav">
      <button class="back-btn" onclick="window.location.href='index.html'">‹ Hjem</button>
      <span class="category-label">MODELLEN</span>
    </header>

    <!-- Main title -->
    <h1 class="main-title" style="margin-top: 24px;">DE 18 BEGREBER</h1>
    <p class="subtitle">modellens grundord</p>

    <!-- Divider -->
    <div class="divider"></div>

    <!-- Radial konstellation -->
    <div class="constellation-container" id="constellation-container">
      <!-- SVG genereres dynamisk via JavaScript -->
    </div>

    <!-- Bottom navigation -->
    <nav class="bottom-nav">
      <button class="nav-tab nav-tab-active" onclick="window.location.href='begreber.html'">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <circle cx="12" cy="12" r="3"/>
          <circle cx="6" cy="6" r="1.5"/>
          <circle cx="18" cy="6" r="1.5"/>
          <circle cx="6" cy="18" r="1.5"/>
          <circle cx="18" cy="18" r="1.5"/>
        </svg>
        <span class="nav-label">Modellen</span>
      </button>

      <button class="nav-tab" onclick="window.location.href='zoner.html'">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <circle cx="12" cy="12" r="6"/>
          <circle cx="12" cy="12" r="2"/>
        </svg>
        <span class="nav-label">Behandleren</span>
      </button>

      <button class="nav-tab" onclick="window.location.href='index.html'">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <path d="M3 18 Q 6 15, 9 12 T 15 9 T 21 6"/>
        </svg>
        <span class="nav-label">Rejsen</span>
      </button>

      <button class="nav-tab" onclick="window.location.href='index.html'">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <circle cx="10" cy="12" r="4"/>
          <circle cx="14" cy="12" r="4"/>
          <circle cx="12" cy="9" r="4"/>
        </svg>
        <span class="nav-label">Inspiration</span>
      </button>
    </nav>

  </div>

  <script>
    // Farvedybde per begreb (dybest, mellem, lysere) - bruges til subtile variationer
    const BEGREB_DYBDE = {
      // Dybeste (en anelse mere mættet)
      'dynamisk-stilhed': 'dybest',
      'breath-of-life': 'dybest',
      'primary-respiration': 'dybest',
      'midtlinjen': 'dybest',
      'wholeness': 'dybest',
      'fluid-body': 'dybest',
      // Mellemdybt
      'the-health': 'mellem',
      'transmutation': 'mellem',
      'ignition': 'mellem',
      'stillpoints': 'mellem',
      'den-iboende-behandlingsplan': 'mellem',
      'the-lesion-field': 'mellem',
      'potency': 'mellem',
      // Lysere (en anelse mindre mættet)
      'motion-present': 'lysere',
      'fulcrum': 'lysere',
      'automatic-shifting': 'lysere',
      'axial-fluctuations': 'lysere',
      'the-neutral': 'lysere'
    };

    // Animation delays for organisk pulsering (fordelt over 6-sekunders cyklus)
    const BEGREB_ANIMATION_DELAY = {
      'dynamisk-stilhed': 0,
      'breath-of-life': -1,
      'primary-respiration': -2,
      'midtlinjen': -0.5,
      'the-health': -1.5,
      'motion-present': -2.5,
      'fulcrum': -3,
      'stillpoints': -0.8,
      'transmutation': -1.8,
      'the-neutral': -2.8,
      'automatic-shifting': -3.5,
      'den-iboende-behandlingsplan': -1.2,
      'fluid-body': -2.2,
      'the-lesion-field': -3.2,
      'potency': -0.3,
      'ignition': -1.3,
      'axial-fluctuations': -2.3,
      'wholeness': -3.3
    };

    // De 18 begreber med numre og titler
    const BEGREBER = [
      { id: 'dynamisk-stilhed', nummer: '1', titel: 'Dynamisk Stilhed' },
      { id: 'breath-of-life', nummer: '2', titel: 'Breath of Life' },
      { id: 'primary-respiration', nummer: '3', titel: 'Primary Respiration' },
      { id: 'midtlinjen', nummer: '4', titel: 'Midtlinjen' },
      { id: 'the-health', nummer: '5', titel: 'The Health' },
      { id: 'motion-present', nummer: '6', titel: 'Motion Present' },
      { id: 'fulcrum', nummer: '7', titel: 'Fulcrum' },
      { id: 'stillpoints', nummer: '8', titel: 'Stillpoints' },
      { id: 'transmutation', nummer: '9', titel: 'Transmutation' },
      { id: 'the-neutral', nummer: '10', titel: 'The Neutral' },
      { id: 'automatic-shifting', nummer: '11', titel: 'Automatic Shifting' },
      { id: 'den-iboende-behandlingsplan', nummer: '12', titel: 'Den Iboende Behandlingsplan' },
      { id: 'fluid-body', nummer: '13', titel: 'Fluid Body' },
      { id: 'the-lesion-field', nummer: '14', titel: 'The Lesion Field' },
      { id: 'potency', nummer: '15', titel: 'Potency' },
      { id: 'ignition', nummer: '16', titel: 'Ignition' },
      { id: 'axial-fluctuations', nummer: '17', titel: 'Axial Fluctuations' },
      { id: 'wholeness', nummer: '18', titel: 'Wholeness' }
    ];

    // Generer subtil farvevariation baseret på dybde
    function getColorVariation(dybde) {
      // Basis-gradient: havets lyse boble
      const baseColors = ['#FFFFFF', '#E6ECF1', '#C4D0DC', '#A6B7C7', '#96A9BB'];

      if (dybde === 'dybest') {
        // En anelse mere mættet (lidt mørkere)
        return {
          stops: ['#FFFFFF', '#E0E8EE', '#BCC8D6', '#9EAFBF', '#8DA0B2'],
          opacity: 1.0
        };
      } else if (dybde === 'lysere') {
        // En anelse mindre mættet (lidt lysere)
        return {
          stops: ['#FFFFFF', '#ECF0F4', '#CCD6E2', '#B4C3CF', '#A8B7C4'],
          opacity: 0.95
        };
      } else {
        // Mellem (standard)
        return {
          stops: baseColors,
          opacity: 1.0
        };
      }
    }

    // Generer spindelvæv af forbindelseslinjer
    function generateWebConnections(positions) {
      let connections = '';

      // For hver kugle, forbind til 8-10 andre kugler
      positions.forEach((pos1, i) => {
        // Beregn afstande til alle andre kugler
        const distances = positions.map((pos2, j) => {
          if (i === j) return { index: j, dist: Infinity };
          const dx = pos2.x - pos1.x;
          const dy = pos2.y - pos1.y;
          return { index: j, dist: Math.sqrt(dx * dx + dy * dy) };
        });

        // Sortér efter afstand og vælg de 8-10 nærmeste
        distances.sort((a, b) => a.dist - b.dist);
        const numConnections = Math.min(9, distances.length);

        // Tegn linjer til de nærmeste (kun hvis vi ikke allerede har tegnet linjen)
        for (let k = 0; k < numConnections; k++) {
          const j = distances[k].index;
          if (i < j) { // Tegn kun hver linje én gang
            const opacity = 0.10 + Math.random() * 0.05; // Subtil variation
            connections += `<line x1="${pos1.x}" y1="${pos1.y}" x2="${positions[j].x}" y2="${positions[j].y}"
                                 stroke="#B8C5D3" stroke-width="0.4" stroke-opacity="${opacity}"/>`;
          }
        }
      });

      return connections;
    }

    // Generer radial konstellation
    function generateConstellation() {
      const container = document.getElementById('constellation-container');

      // ViewBox dimensioner
      const width = 1000;
      const height = 1000;
      const centerX = width / 2;
      const centerY = height / 2;

      // Radius for satellit-kugler fra centrum
      const orbitRadius = 350;

      // Central kugle (Dynamisk Stilhed) radius
      const centerRadius = 70;

      // Satellit kugle radius
      const satelliteRadius = 42;

      // Dynamisk Stilhed er først i arrayet
      const centerConcept = BEGREBER[0];
      const satellites = BEGREBER.slice(1);

      // Beregn alle positioner
      const positions = [];
      positions.push({ x: centerX, y: centerY, begreb: centerConcept, radius: centerRadius });

      satellites.forEach((begreb, index) => {
        const angle = (index * 360 / satellites.length - 90) * Math.PI / 180;
        const x = centerX + orbitRadius * Math.cos(angle);
        const y = centerY + orbitRadius * Math.sin(angle);
        positions.push({ x, y, begreb, radius: satelliteRadius });
      });

      let svg = `<svg class="constellation-svg" viewBox="0 0 ${width} ${height}" xmlns="http://www.w3.org/2000/svg">`;

      // Defs til gradienter
      svg += '<defs>';

      BEGREBER.forEach(begreb => {
        const dybde = BEGREB_DYBDE[begreb.id] || 'mellem';
        const variation = getColorVariation(dybde);

        svg += `
          <!-- Kugle-gradient for ${begreb.id} -->
          <radialGradient id="bubble-${begreb.id}" cx="38%" cy="32%" r="70%">
            <stop offset="0%" stop-color="${variation.stops[0]}" stop-opacity="0.95"/>
            <stop offset="25%" stop-color="${variation.stops[1]}"/>
            <stop offset="60%" stop-color="${variation.stops[2]}"/>
            <stop offset="90%" stop-color="${variation.stops[3]}"/>
            <stop offset="100%" stop-color="${variation.stops[4]}"/>
          </radialGradient>

          <!-- Glow-halo -->
          <radialGradient id="glow-${begreb.id}" cx="50%" cy="50%" r="50%">
            <stop offset="0%" stop-color="#B8C5D3" stop-opacity="0.25"/>
            <stop offset="60%" stop-color="#B8C5D3" stop-opacity="0.06"/>
            <stop offset="100%" stop-color="#B8C5D3" stop-opacity="0"/>
          </radialGradient>

          <!-- Højlys -->
          <radialGradient id="highlight-${begreb.id}" cx="35%" cy="25%" r="35%">
            <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.65"/>
            <stop offset="60%" stop-color="#FFFFFF" stop-opacity="0.15"/>
            <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
          </radialGradient>

          <!-- Skygge -->
          <radialGradient id="shadow-${begreb.id}" cx="50%" cy="50%" r="50%">
            <stop offset="0%" stop-color="#7A8B9C" stop-opacity="0.18"/>
            <stop offset="70%" stop-color="#7A8B9C" stop-opacity="0.04"/>
            <stop offset="100%" stop-color="#7A8B9C" stop-opacity="0"/>
          </radialGradient>
        `;
      });

      svg += '</defs>';

      // Tegn spindelvæv af forbindelseslinjer
      svg += generateWebConnections(positions);

      // Tegn kugler (satellitter først, så centrum ovenpå)
      positions.slice(1).forEach(pos => {
        svg += generateSphere(pos.begreb, pos.x, pos.y, pos.radius);
      });
      svg += generateSphere(positions[0].begreb, positions[0].x, positions[0].y, positions[0].radius);

      svg += '</svg>';

      container.innerHTML = svg;

      // Tilføj click handlers
      BEGREBER.forEach(begreb => {
        const sphere = document.getElementById(`sphere-${begreb.id}`);
        if (sphere) {
          sphere.addEventListener('click', () => {
            window.location.href = `begreb.html?id=${begreb.id}`;
          });
        }
      });
    }

    // Generer en enkelt sfærisk kugle
    function generateSphere(begreb, cx, cy, radius) {
      const isCentral = begreb.id === 'dynamisk-stilhed';
      const animDelay = BEGREB_ANIMATION_DELAY[begreb.id] || 0;
      const dybde = BEGREB_DYBDE[begreb.id] || 'mellem';
      const variation = getColorVariation(dybde);

      // Label placering (under kuglen)
      const labelY = cy + radius + 20;

      // Forkortet titel hvis for lang
      let displayTitle = begreb.titel;
      if (displayTitle.length > 20 && !isCentral) {
        const words = displayTitle.split(' ');
        if (words.length > 2) {
          displayTitle = words.slice(0, 2).join(' ') + '...';
        }
      }

      // Skygge placering
      const shadowY = cy + radius + 20;
      const shadowRx = radius * 1.7;

      return `
        <g id="sphere-${begreb.id}" class="constellation-sphere" style="animation-delay: ${animDelay}s;">
          <!-- Glow halo -->
          <ellipse class="sphere-glow" cx="${cx}" cy="${cy}" rx="${radius * 1.5}" ry="${radius * 1.5}"
                   fill="url(#glow-${begreb.id})" style="animation-delay: ${animDelay}s;" opacity="${variation.opacity}"/>

          <!-- Skygge under kuglen -->
          <ellipse class="sphere-glow" cx="${cx}" cy="${shadowY}" rx="${shadowRx}" ry="16"
                   fill="url(#shadow-${begreb.id})" style="animation-delay: ${animDelay}s;"/>

          <!-- Kuglen -->
          <g class="sphere-circle" style="animation-delay: ${animDelay}s;">
            <circle cx="${cx}" cy="${cy}" r="${radius}" fill="url(#bubble-${begreb.id})"/>
            <ellipse cx="${cx - radius * 0.25}" cy="${cy - radius * 0.25}"
                     rx="${radius * 0.45}" ry="${radius * 0.33}"
                     fill="url(#highlight-${begreb.id})" opacity="0.9"/>
            <circle cx="${cx}" cy="${cy}" r="${radius}" fill="none"
                    stroke="#FFFFFF" stroke-width="0.75" stroke-opacity="0.85"/>
          </g>

          <!-- Label -->
          <text class="constellation-label" x="${cx}" y="${labelY}"
                style="font-size: ${isCentral ? '16px' : '12px'}; font-weight: ${isCentral ? '500' : '400'}">
            ${displayTitle}
          </text>
        </g>
      `;
    }

    // Generer konstellationen når siden loader
    generateConstellation();
  </script>

  <script src="js/theme-toggle.js"></script>
</body>
</html>
