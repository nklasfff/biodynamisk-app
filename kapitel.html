<!DOCTYPE html>
<html lang="da">
<head>
  <meta http-equiv="Cache-Control" content="no-store" />
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- PWA / iOS standalone-mode -->
  <link rel="manifest" href="manifest.json">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Biodynamisk">
  <meta name="theme-color" content="#1d2731">
  <link rel="apple-touch-icon" href="apple-touch-icon.png">
  <link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
  <title>Den Biodynamiske App</title>

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=Cinzel:wght@300;400&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="css/style.css">

  <!-- Marked.js from CDN -->
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>
<body>

  <!-- Dark mode toggle -->
  <button class="theme-toggle" aria-label="Skift tema"></button>

  <div class="container" id="app-container">
    <!-- Content loaded dynamically via JavaScript -->
    <div style="text-align: center; padding: 60px 20px; color: var(--text-secondary);">
      <p>Indlæser...</p>
    </div>
  </div>

  <script>
    // Parse YAML frontmatter (simple regex-baseret parser)
    function parseFrontmatter(markdown) {
      const frontmatterRegex = /^---\s*\n([\s\S]*?)\n---\s*\n([\s\S]*)$/;
      const match = markdown.match(frontmatterRegex);

      if (!match) {
        return { frontmatter: {}, content: markdown };
      }

      const frontmatterText = match[1];
      const content = match[2];

      const frontmatter = {};
      frontmatterText.split('\n').forEach(line => {
        const colonIndex = line.indexOf(':');
        if (colonIndex > -1) {
          const key = line.substring(0, colonIndex).trim();
          let value = line.substring(colonIndex + 1).trim();
          // Remove quotes if present
          value = value.replace(/^["']|["']$/g, '');
          frontmatter[key] = value;
        }
      });

      return { frontmatter, content };
    }

    // Parse markdown content into sections
    function parseContent(markdownContent) {
      const sections = {};
      const lines = markdownContent.split('\n');
      let currentSection = null;
      let currentContent = [];

      lines.forEach(line => {
        if (line.startsWith('## ')) {
          // Save previous section
          if (currentSection) {
            sections[currentSection] = currentContent.join('\n').trim();
          }
          // Start new section
          currentSection = line.replace('## ', '').trim();
          currentContent = [];
        } else if (currentSection) {
          currentContent.push(line);
        }
      });

      // Save last section
      if (currentSection) {
        sections[currentSection] = currentContent.join('\n').trim();
      }

      return sections;
    }

    // Map kapitel IDs to SVG filenames
    const KAPITEL_SVG_MAP = {
      'den-biodynamiske-model': '24-modellen-oversigt.svg',
      'i-behandlingssituationen': '00-begreber-oversigt.svg',
      'helheden-under-pres': 'helhed-1-balance.svg',
      'ordliste': '38-ordliste.svg',
      'blechschmidts-principper': '28-blechschmidt.svg',
      'de-otte-essentielle-egenskaber': '29-egenskaber-oversigt.svg',
      'typiske-klientmoenstre': '30-klientmoenstre-oversigt.svg',
      'de-syv-perspektiver': '32-perspektiver-oversigt.svg',
      'de-fire-guidede-oevelser': '33-oevelser-oversigt.svg',
      'andre-traditioner-og-specielle-temaer': '34-traditioner-oversigt.svg',
      'integration-i-din-praksis': '35-integration-oversigt.svg',
      'afslutning': '36-afslutning-oversigt.svg'
    };

    // Map kapitel IDs to parent section (so back-button går til rigtig sektion)
    const KAPITEL_PARENT = {
      'den-biodynamiske-model': { href: 'modellen.html', label: 'Modellen' },
      'blechschmidts-principper': { href: 'modellen.html', label: 'Modellen' },
      'i-behandlingssituationen': { href: 'modellen.html', label: 'Modellen' },
      'helheden-under-pres': { href: 'modellen.html', label: 'Modellen' },
      'ordliste': { href: 'modellen.html', label: 'Modellen' },
      'de-otte-essentielle-egenskaber': { href: 'behandleren.html', label: 'Behandleren' },
      'typiske-klientmoenstre': { href: 'behandleren.html', label: 'Behandleren' },
      'de-syv-perspektiver': { href: 'rejsen.html', label: 'Rejsen' },
      'de-fire-guidede-oevelser': { href: 'rejsen.html', label: 'Rejsen' },
      'andre-traditioner-og-specielle-temaer': { href: 'inspiration.html', label: 'Inspiration' },
      'integration-i-din-praksis': { href: 'inspiration.html', label: 'Inspiration' },
      'afslutning': { href: 'inspiration.html', label: 'Inspiration' }
    };

    // Load hero SVG dynamically from file
    async function loadHeroSVG(kapitelId) {
      const filename = KAPITEL_SVG_MAP[kapitelId];

      if (!filename) {
        // Return a placeholder for kapitels without specific illustrations
        return `
          <svg viewBox="0 0 380 380" xmlns="http://www.w3.org/2000/svg">
            <rect width="380" height="380" fill="#1d2731"/>
          </svg>
        `;
      }

      try {
        const response = await fetch(`hero-motiver/${filename}`);

        if (!response.ok) {
          throw new Error(`Could not load ${filename}`);
        }

        return await response.text();
      } catch (error) {
        console.error('Error loading hero SVG:', error);
        // Return placeholder on error
        return `
          <svg viewBox="0 0 380 380" xmlns="http://www.w3.org/2000/svg">
            <rect width="380" height="380" fill="#1d2731"/>
          </svg>
        `;
      }
    }

    // Main render function
    async function renderKapitel(kapitelId) {
      const container = document.getElementById('app-container');

      try {
        // Fetch markdown file
        const mdResponse = await fetch(`content/${kapitelId}.md`);
        if (!mdResponse.ok) {
          throw new Error(`Kunne ikke loade ${kapitelId}.md`);
        }
        const markdownText = await mdResponse.text();

        // Parse frontmatter and content
        const { frontmatter, content } = parseFrontmatter(markdownText);
        const sections = parseContent(content);

        // Load hero SVG
        const heroSVG = await loadHeroSVG(kapitelId);

        // Generate HTML - using string parts to avoid template literal issues
        const parent = KAPITEL_PARENT[kapitelId] || { href: 'index.html', label: 'Hjem' };

        let html = '';
        html += '<header class="top-nav">';
        html += `<button class="back-btn" onclick="window.location.href='${parent.href}'">‹ ${parent.label}</button>`;
        html += `<span class="category-label">${parent.label.toUpperCase()}</span>`;
        html += '</header>';
        html += '<div class="hero-container" style="max-width: 380px; margin: 32px auto;">';
        html += heroSVG;
        html += '</div>';
        html += '<h1 class="main-title">' + frontmatter.titel.toUpperCase() + '</h1>';

        // Undertitel (hvis den findes)
        if (frontmatter.undertitel) {
          html += `<p class="subtitle">${frontmatter.undertitel}</p>`;
        }

        html += `<div class="divider"></div>`;

        // Intro text (always visible)
        if (sections['Intro']) {
          html += `<div class="intro-text">${marked.parse(sections['Intro'])}</div>`;
        }

        const sekventiel = frontmatter.layout === 'sekventiel';

        if (sekventiel) {
          // Sekventielt layout — sektioner bygges med <img> tags som normalt;
          // SVG'er inlines som DOM EFTER container.innerHTML er sat.
          const sectionTitles = Object.keys(sections).filter(t =>
            t !== 'Intro' && t !== 'Relationer' && t !== 'Til refleksion'
          );

          for (const sectionTitle of sectionTitles) {
            html += `
              <section class="sekvens-step">
                <h2 class="sekvens-title">${sectionTitle}</h2>
                <div class="sekvens-content">
                  ${marked.parse(sections[sectionTitle])}
                </div>
              </section>
            `;
          }
        } else {
          // Collapsible cards
          html += '<div class="cards-container">';
          Object.keys(sections).forEach(sectionTitle => {
            if (sectionTitle === 'Intro' || sectionTitle === 'Relationer' || sectionTitle === 'Til refleksion') {
              return;
            }
            html += `
              <div class="card">
                <div class="card-header" onclick="toggleCard(this)">
                  <span class="card-marker"></span>
                  <span class="card-title">${sectionTitle}</span>
                  <span class="chevron">▾</span>
                </div>
                <div class="card-content" onclick="closeCardFromContent(event, this)">
                  ${marked.parse(sections[sectionTitle])}
                </div>
              </div>
            `;
          });
          html += '</div>';
        }

        // Reflection section
        if (sections['Til refleksion']) {
          html += `
            <section class="reflection-section">
              <div class="reflection-illustration">
                <img src="hero-motiver/refleksion-A-aabne-rum.svg" alt="" />
              </div>
              <h2 class="section-heading">Til refleksion</h2>
              <div class="reflection-content">
                ${marked.parse(sections['Til refleksion'])}
              </div>
            </section>
          `;
        }

        // Bottom navigation
        html += `
          <nav class="bottom-nav">
            <button class="nav-tab" onclick="window.location.href='modellen.html'">
              <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                <circle cx="12" cy="12" r="3"/>
                <circle cx="6" cy="6" r="1.5"/>
                <circle cx="18" cy="6" r="1.5"/>
                <circle cx="6" cy="18" r="1.5"/>
                <circle cx="18" cy="18" r="1.5"/>
              </svg>
              <span class="nav-label">Modellen</span>
            </button>

            <button class="nav-tab" onclick="window.location.href='zoner.html'">
              <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                <circle cx="12" cy="12" r="6"/>
                <circle cx="12" cy="12" r="2"/>
              </svg>
              <span class="nav-label">Behandleren</span>
            </button>

            <button class="nav-tab" onclick="window.location.href='rejsen.html'">
              <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                <path d="M3 18 Q 6 15, 9 12 T 15 9 T 21 6"/>
              </svg>
              <span class="nav-label">Rejsen</span>
            </button>

            <button class="nav-tab" onclick="window.location.href='index.html'">
              <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                <circle cx="10" cy="12" r="4"/>
                <circle cx="14" cy="12" r="4"/>
                <circle cx="12" cy="9" r="4"/>
              </svg>
              <span class="nav-label">Inspiration</span>
            </button>
          </nav>
        `;

        // Update page title
        document.title = `${frontmatter.titel} — Den Biodynamiske App`;

        // Render
        container.innerHTML = html;

        // POST-RENDER: erstat <img src="*.svg"> i sekvens-content med inline SVG.
        // Dette skal ske EFTER innerHTML, så browseren har parset DOM korrekt.
        // SMIL <animate> kører i inline SVG men IKKE i <img>-tag.
        if (sekventiel) {
          const sekvensImgs = container.querySelectorAll('.sekvens-content img[src$=".svg"], .sekvens-content img[src*=".svg?"]');
          for (const img of sekvensImgs) {
            try {
              const src = img.getAttribute('src');
              const url = src.includes('?') ? src : src + '?v=' + Date.now();
              const svgResp = await fetch(url);
              if (!svgResp.ok) continue;
              const svgText = await svgResp.text();
              const wrapper = document.createElement('div');
              wrapper.className = 'sekvens-illustration';
              wrapper.innerHTML = svgText;
              // Hvis <img> er eneste child af <p>, replace <p> for at undgå
              // ugyldigt <p><div>...</div></p>
              const parent = img.parentElement;
              if (parent && parent.tagName === 'P' && parent.children.length === 1) {
                parent.replaceWith(wrapper);
              } else {
                img.replaceWith(wrapper);
              }
            } catch (err) {
              console.error('Kunne ikke loade SVG:', img.src, err);
            }
          }
        }

      } catch (error) {
        console.error('Fejl ved indlæsning:', error);
        container.innerHTML = `
          <div style="text-align: center; padding: 60px 20px;">
            <h1 style="font-family: var(--font-display); font-size: 24px; color: var(--text-primary); margin-bottom: 12px;">
              KAPITEL IKKE FUNDET
            </h1>
            <p style="font-family: var(--font-body); font-size: 17px; color: var(--text-secondary); line-height: 1.75; margin-bottom: 24px;">
              Kapitlet med id <strong>${kapitelId}</strong> kunne ikke indlæses.
            </p>
            <button onclick="window.location.href='modellen.html'"
                    style="font-family: var(--font-body); font-size: 14px; font-style: italic;
                           color: var(--text-secondary); background: none; border: 1px solid var(--border-card);
                           border-radius: 8px; padding: 10px 20px; cursor: pointer;">
              Tilbage til Modellen
            </button>
          </div>
        `;
      }
    }

    // toggleCard, closeCardFromContent ligger i js/card-interactions.js

    // Get kapitel ID from URL and render
    const urlParams = new URLSearchParams(window.location.search);
    const kapitelId = urlParams.get('id');

    if (!kapitelId) {
      document.getElementById('app-container').innerHTML = `
        <div style="text-align: center; padding: 60px 20px;">
          <h1 style="font-family: var(--font-display); font-size: 24px; color: var(--text-primary); margin-bottom: 12px;">
            INTET KAPITEL VALGT
          </h1>
          <p style="font-family: var(--font-body); font-size: 17px; color: var(--text-secondary); line-height: 1.75;">
            Tilføj <code>?id=...</code> til URL'en.
          </p>
        </div>
      `;
    } else {
      window.scrollTo(0, 0);
      renderKapitel(kapitelId);
    }
  </script>

  <script src="js/card-interactions.js"></script>
  <script src="js/theme-toggle.js"></script>
</body>
</html>
