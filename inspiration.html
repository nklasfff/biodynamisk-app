<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 80 380 380" role="img" aria-label="Inspiration">
<defs>
<style>
@keyframes core-r { 0%, 100% { r: 36px; } 50% { r: 46px; } }
@keyframes aura-r { 0%, 100% { rx: 158px; ry: 158px; } 50% { rx: 182px; ry: 182px; } }
@keyframes weave-breathe {
  0%, 100% { transform: scale(1); }
  50% { transform: scale(1.12); }
}
.core { animation: core-r 8s ease-in-out infinite; }
.aura { animation: aura-r 8s ease-in-out infinite; }
.weave-group {
  animation: weave-breathe 8s ease-in-out infinite;
  transform-origin: 190px 270px;
  transform-box: view-box;
}
@media (prefers-reduced-motion: reduce) {
  .core, .aura, .weave-group { animation: none; }
}
</style>
<radialGradient id="well-insp" cx="50%" cy="42%" r="65%">
<stop offset="0%" style="stop-color: var(--hero-green-well-0)"/>
<stop offset="55%" style="stop-color: var(--hero-green-well-55)"/>
<stop offset="100%" style="stop-color: var(--hero-green-well-100)"/>
</radialGradient>
<radialGradient id="core-g-insp" cx="50%" cy="50%" r="50%">
<stop offset="0%" style="stop-color: var(--hero-green-core-0)" stop-opacity="1"/>
<stop offset="30%" style="stop-color: var(--hero-green-core-30)" stop-opacity="0.75"/>
<stop offset="70%" style="stop-color: var(--hero-green-core-70)" stop-opacity="0.25"/>
<stop offset="100%" style="stop-color: var(--hero-green-core-100)" stop-opacity="0"/>
</radialGradient>
<radialGradient id="aura-g-insp" cx="50%" cy="50%" r="50%">
<stop offset="0%" style="stop-color: var(--hero-green-aura-0)" stop-opacity="0.28"/>
<stop offset="55%" style="stop-color: var(--hero-green-aura-deep)" stop-opacity="0.08"/>
<stop offset="100%" style="stop-color: var(--hero-green-aura-deep)" stop-opacity="0"/>
</radialGradient>
</defs>
<rect x="0" y="0" width="380" height="640" fill="url(#well-insp)"/>
<ellipse class="aura" cx="190" cy="270" rx="170" ry="170" fill="url(#aura-g-insp)"/>
<g class="weave-group" stroke="var(--hero-green-stream-outer)" stroke-width="0.7" fill="none" opacity="0.7">
  <path d="M 225.00 195.00 Q 190.00 225.00 155.00 195.00"/>
  <path d="M 272.14 280.11 Q 232.80 256.09 250.51 213.54"/>
  <path d="M 205.77 351.25 Q 216.45 306.41 262.40 310.10"/>
  <path d="M 117.60 310.10 Q 163.55 306.41 174.23 351.25"/>
  <path d="M 129.49 213.54 Q 147.20 256.09 107.86 280.11"/>
</g>
<g class="weave-group" stroke="var(--hero-green-stream-inner)" stroke-width="0.5" fill="none" opacity="0.35">
  <path d="M 218.00 208.00 Q 190.00 230.00 162.00 208.00"/>
  <path d="M 258.00 278.00 Q 228.00 258.00 243.00 220.00"/>
  <path d="M 207.00 338.00 Q 216.00 303.00 251.00 306.00"/>
  <path d="M 129.00 306.00 Q 164.00 303.00 173.00 338.00"/>
  <path d="M 137.00 220.00 Q 152.00 258.00 122.00 278.00"/>
</g>
<circle class="core" cx="190" cy="270" r="42" fill="url(#core-g-insp)"/>
</svg>
