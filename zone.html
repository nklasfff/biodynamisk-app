<!DOCTYPE html>
<html lang="da">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Den Biodynamiske App</title>

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=Cinzel:wght@300;400&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="css/style.css">

  <!-- Marked.js from CDN -->
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

  <style>
    /* Åndedrag for zone-kugler (forskudt rytme) */
    .zone-sphere-left,
    .zone-glow-left {
      animation: breathe 6s ease-in-out -1.5s infinite;
      transform-origin: center;
      transform-box: fill-box;
    }

    .zone-sphere-mid,
    .zone-glow-mid {
      animation: breathe 6s ease-in-out 0s infinite;
      transform-origin: center;
      transform-box: fill-box;
    }

    .zone-sphere-right,
    .zone-glow-right {
      animation: breathe 6s ease-in-out -3s infinite;
      transform-origin: center;
      transform-box: fill-box;
    }

    .zone-glow-left,
    .zone-glow-mid,
    .zone-glow-right {
      animation-name: glow-pulse;
    }

    @keyframes breathe {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.045); }
    }

    @keyframes glow-pulse {
      0%, 100% { opacity: 0.82; transform: scale(1); }
      50% { opacity: 1; transform: scale(1.025); }
    }

    @media (prefers-reduced-motion: reduce) {
      .zone-sphere-left,
      .zone-sphere-mid,
      .zone-sphere-right,
      .zone-glow-left,
      .zone-glow-mid,
      .zone-glow-right {
        animation: none;
      }
    }
  </style>
</head>
<body>

  <!-- Dark mode toggle -->
  <button class="theme-toggle" aria-label="Skift tema"></button>

  <div class="container" id="app-container">
    <!-- Content loaded dynamically via JavaScript -->
    <div style="text-align: center; padding: 60px 20px; color: var(--text-secondary);">
      <p>Indlæser...</p>
    </div>
  </div>

  <script>
    // Zone data med hero-tekster og metadata
    const ZONE_DATA = {
      'a-fysisk-krop': {
        letter: 'A',
        number: 1,
        titel: 'DEN FYSISKE KROP',
        undertitel: 'hvor dine hænder møder vævet',
        intro: 'Vævet, knoglerne, organerne. Kroppens konkrete virkelighed.',
        heroTexts: {
          left: ['Vævet', 'og dets', 'historie'],
          mid: ['Den', 'fysiske', 'krop'],
          right: ['Åbningen', 'mod', 'væsken']
        }
      },
      'b-vaeskekrop': {
        letter: 'B',
        number: 2,
        titel: 'VÆSKEKROPPEN',
        undertitel: 'broen mellem energi og form',
        intro: 'Væsken der gennemstrømmer alt. Livets levende matrix.',
        heroTexts: {
          left: ['Den', 'medbragte', 'tilstand'],
          mid: ['Væske-', 'kroppens', 'vågnen'],
          right: ['Åbningen', 'mod det', 'relationelle']
        }
      },
      'c-relationelt-felt': {
        letter: 'C',
        number: 3,
        titel: 'DET RELATIONELLE FELT',
        undertitel: 'hvor to systemer mødes',
        intro: 'Co-regulering og gennemsigtighed. Heling i relation.',
        heroTexts: {
          left: ['Væske-', 'kroppens', 'resonans'],
          mid: ['Det', 'relationelle', 'felt'],
          right: ['Det fælles', 'terapeutiske', 'rum']
        }
      },
      'd-primary-respiration': {
        letter: 'D',
        number: 4,
        titel: 'THE LONG TIDE',
        undertitel: 'livets dybeste rytme',
        intro: 'Den universelle bølge. Livets store åndedrag.',
        heroTexts: {
          left: ['Det', 'relationelle', 'felt'],
          mid: ['The', 'Long', 'Tide'],
          right: ['Dynamisk', 'Stilheds', 'nærhed']
        }
      },
      'e-dynamisk-stilhed': {
        letter: 'E',
        number: 5,
        titel: 'DYNAMISK STILHED',
        undertitel: 'livets arnested',
        intro: 'Kilden hvorfra alt udspringer. Paradoksernes rum.',
        heroTexts: {
          left: ['The', 'Long', 'Tide'],
          mid: ['Dynamisk', 'Stilhed'],
          right: ['Alting', 'forenet']
        }
      }
    };

    // Generer hero SVG med tre kugler og tekst
    function generateZoneHeroSVG(zoneId, heroTexts) {
      return `
        <svg viewBox="0 0 380 560" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Zone ${zoneId}">
          <defs>
            <!-- Kugle-gradienter (havets lyse boble) -->
            <radialGradient id="bubble-${zoneId}-left" cx="38%" cy="32%" r="70%">
              <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.95"/>
              <stop offset="25%" stop-color="#E6ECF1"/>
              <stop offset="60%" stop-color="#C4D0DC"/>
              <stop offset="90%" stop-color="#A6B7C7"/>
              <stop offset="100%" stop-color="#96A9BB"/>
            </radialGradient>
            <radialGradient id="bubble-${zoneId}-mid" cx="38%" cy="32%" r="70%">
              <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.95"/>
              <stop offset="25%" stop-color="#E6ECF1"/>
              <stop offset="60%" stop-color="#C4D0DC"/>
              <stop offset="90%" stop-color="#A6B7C7"/>
              <stop offset="100%" stop-color="#96A9BB"/>
            </radialGradient>
            <radialGradient id="bubble-${zoneId}-right" cx="38%" cy="32%" r="70%">
              <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.95"/>
              <stop offset="25%" stop-color="#E6ECF1"/>
              <stop offset="60%" stop-color="#C4D0DC"/>
              <stop offset="90%" stop-color="#A6B7C7"/>
              <stop offset="100%" stop-color="#96A9BB"/>
            </radialGradient>

            <!-- Højlys -->
            <radialGradient id="highlight-${zoneId}-left" cx="35%" cy="25%" r="35%">
              <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.65"/>
              <stop offset="60%" stop-color="#FFFFFF" stop-opacity="0.15"/>
              <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
            </radialGradient>
            <radialGradient id="highlight-${zoneId}-mid" cx="35%" cy="25%" r="35%">
              <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.65"/>
              <stop offset="60%" stop-color="#FFFFFF" stop-opacity="0.15"/>
              <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
            </radialGradient>
            <radialGradient id="highlight-${zoneId}-right" cx="35%" cy="25%" r="35%">
              <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.65"/>
              <stop offset="60%" stop-color="#FFFFFF" stop-opacity="0.15"/>
              <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
            </radialGradient>

            <!-- Glow bag kugler -->
            <radialGradient id="glow-${zoneId}-left" cx="50%" cy="50%" r="50%">
              <stop offset="0%" stop-color="#B8C5D3" stop-opacity="0.22"/>
              <stop offset="60%" stop-color="#B8C5D3" stop-opacity="0.06"/>
              <stop offset="100%" stop-color="#B8C5D3" stop-opacity="0"/>
            </radialGradient>
            <radialGradient id="glow-${zoneId}-mid" cx="50%" cy="50%" r="50%">
              <stop offset="0%" stop-color="#B8C5D3" stop-opacity="0.22"/>
              <stop offset="60%" stop-color="#B8C5D3" stop-opacity="0.06"/>
              <stop offset="100%" stop-color="#B8C5D3" stop-opacity="0"/>
            </radialGradient>
            <radialGradient id="glow-${zoneId}-right" cx="50%" cy="50%" r="50%">
              <stop offset="0%" stop-color="#B8C5D3" stop-opacity="0.22"/>
              <stop offset="60%" stop-color="#B8C5D3" stop-opacity="0.06"/>
              <stop offset="100%" stop-color="#B8C5D3" stop-opacity="0"/>
            </radialGradient>

            <!-- Skygger -->
            <radialGradient id="shadow-${zoneId}" cx="50%" cy="50%" r="50%">
              <stop offset="0%" stop-color="#7A8B9C" stop-opacity="0.18"/>
              <stop offset="70%" stop-color="#7A8B9C" stop-opacity="0.04"/>
              <stop offset="100%" stop-color="#7A8B9C" stop-opacity="0"/>
            </radialGradient>
          </defs>

          <!-- Venstre kugle -->
          <ellipse class="zone-glow-left" cx="70" cy="290" rx="62" ry="62" fill="url(#glow-${zoneId}-left)"/>
          <ellipse class="zone-glow-left" cx="70" cy="340" rx="44" ry="5" fill="url(#shadow-${zoneId})"/>
          <g class="zone-sphere-left">
            <circle cx="70" cy="290" r="42" fill="url(#bubble-${zoneId}-left)"/>
            <ellipse cx="59.5" cy="279.5" rx="18.9" ry="13.86" fill="url(#highlight-${zoneId}-left)" opacity="0.9"/>
            <circle cx="70" cy="290" r="42" fill="none" stroke="#FFFFFF" stroke-width="0.75" stroke-opacity="0.85"/>
            <!-- Tekst i venstre kugle -->
            <text x="70" y="282" text-anchor="middle" font-family="Georgia, serif" font-size="10" fill="#425567">${heroTexts.left[0]}</text>
            <text x="70" y="296" text-anchor="middle" font-family="Georgia, serif" font-size="10" fill="#425567">${heroTexts.left[1]}</text>
            <text x="70" y="310" text-anchor="middle" font-family="Georgia, serif" font-size="10" fill="#425567">${heroTexts.left[2]}</text>
          </g>

          <!-- Midterkugle -->
          <ellipse class="zone-glow-mid" cx="190" cy="250" rx="88" ry="88" fill="url(#glow-${zoneId}-mid)"/>
          <ellipse class="zone-glow-mid" cx="190" cy="318" rx="62" ry="7" fill="url(#shadow-${zoneId})"/>
          <g class="zone-sphere-mid">
            <circle cx="190" cy="250" r="62" fill="url(#bubble-${zoneId}-mid)"/>
            <ellipse cx="174.7" cy="234.5" rx="27.9" ry="20.46" fill="url(#highlight-${zoneId}-mid)" opacity="0.9"/>
            <circle cx="190" cy="250" r="62" fill="none" stroke="#FFFFFF" stroke-width="0.75" stroke-opacity="0.85"/>
            <!-- Tekst i midterkugle -->
            <text x="190" y="240" text-anchor="middle" font-family="Georgia, serif" font-size="13" fill="#425567">${heroTexts.mid[0]}</text>
            <text x="190" y="257" text-anchor="middle" font-family="Georgia, serif" font-size="13" fill="#425567">${heroTexts.mid[1]}</text>
            <text x="190" y="274" text-anchor="middle" font-family="Georgia, serif" font-size="13" fill="#425567">${heroTexts.mid[2]}</text>
          </g>

          <!-- Højre kugle -->
          <ellipse class="zone-glow-right" cx="310" cy="290" rx="62" ry="62" fill="url(#glow-${zoneId}-right)"/>
          <ellipse class="zone-glow-right" cx="310" cy="340" rx="44" ry="5" fill="url(#shadow-${zoneId})"/>
          <g class="zone-sphere-right">
            <circle cx="310" cy="290" r="42" fill="url(#bubble-${zoneId}-right)"/>
            <ellipse cx="299.5" cy="279.5" rx="18.9" ry="13.86" fill="url(#highlight-${zoneId}-right)" opacity="0.9"/>
            <circle cx="310" cy="290" r="42" fill="none" stroke="#FFFFFF" stroke-width="0.75" stroke-opacity="0.85"/>
            <!-- Tekst i højre kugle -->
            <text x="310" y="282" text-anchor="middle" font-family="Georgia, serif" font-size="10" fill="#425567">${heroTexts.right[0]}</text>
            <text x="310" y="296" text-anchor="middle" font-family="Georgia, serif" font-size="10" fill="#425567">${heroTexts.right[1]}</text>
            <text x="310" y="310" text-anchor="middle" font-family="Georgia, serif" font-size="10" fill="#425567">${heroTexts.right[2]}</text>
          </g>
        </svg>
      `;
    }

    // Parse zone content from de-fem-zoner.md
    function parseZoneContent(fullMarkdown, zoneLetter) {
      // Find the zone section (## Zone A — ...)
      const zoneHeaderPattern = new RegExp(`^## Zone ${zoneLetter} — .*$`, 'gm');
      const match = zoneHeaderPattern.exec(fullMarkdown);

      if (!match) return null;

      const startIndex = match.index;
      // Find next ## header (next zone or end)
      const nextZonePattern = /^## Zone [A-E] — /gm;
      nextZonePattern.lastIndex = startIndex + match[0].length;
      const nextMatch = nextZonePattern.exec(fullMarkdown);

      const endIndex = nextMatch ? nextMatch.index : fullMarkdown.length;
      const zoneContent = fullMarkdown.substring(startIndex + match[0].length, endIndex).trim();

      // Parse subsections (marked with **Bold headings**)
      const sections = {};
      const lines = zoneContent.split('\n');
      let currentSection = null;
      let currentContent = [];

      lines.forEach(line => {
        // Check for **Bold heading**
        const boldHeadingMatch = line.match(/^\*\*(.+?)\*\*$/);
        if (boldHeadingMatch) {
          // Save previous section
          if (currentSection) {
            sections[currentSection] = currentContent.join('\n').trim();
          }
          // Start new section
          currentSection = boldHeadingMatch[1];
          currentContent = [];
        } else if (currentSection) {
          currentContent.push(line);
        }
      });

      // Save last section
      if (currentSection) {
        sections[currentSection] = currentContent.join('\n').trim();
      }

      return sections;
    }

    // Main render function
    async function renderZone(zoneId) {
      const container = document.getElementById('app-container');

      try {
        const zoneData = ZONE_DATA[zoneId];
        if (!zoneData) {
          throw new Error(`Ugyldigt zone-id: ${zoneId}`);
        }

        // Fetch de-fem-zoner.md for foldable cards
        let sections = {};
        try {
          const response = await fetch('content/de-fem-zoner.md');
          if (response.ok) {
            const fullMarkdown = await response.text();
            sections = parseZoneContent(fullMarkdown, zoneData.letter) || {};
          }
        } catch (e) {
          console.warn('Kunne ikke loade markdown-indhold, bruger tom struktur');
        }

        // Generate HTML
        let html = `
          <header class="top-nav">
            <button class="back-btn" onclick="window.location.href='behandleren.html'">‹ behandleren</button>
            <span class="category-label">DE 5 ZONER</span>
          </header>

          <div class="subcategory-label">ZONE ${zoneData.letter} · ${zoneData.number}</div>

          <div class="hero-container">
            ${generateZoneHeroSVG(zoneId, zoneData.heroTexts)}
          </div>

          <h1 class="main-title">${zoneData.titel}</h1>
          <p class="subtitle">${zoneData.undertitel}</p>

          <div class="divider"></div>

          <div class="intro-text">
            <p>${zoneData.intro}</p>
          </div>

          <div class="cards-container">
        `;

        // Render subsections as collapsible cards
        if (Object.keys(sections).length > 0) {
          Object.keys(sections).forEach(sectionTitle => {
            html += `
              <div class="card">
                <div class="card-header" onclick="toggleCard(this)">
                  <span class="card-marker"></span>
                  <span class="card-title">${sectionTitle}</span>
                  <span class="chevron">▾</span>
                </div>
                <div class="card-content">
                  ${marked.parse(sections[sectionTitle])}
                </div>
              </div>
            `;
          });
        } else {
          // TODO: verificér med Niklas — placeholder hvis ingen markdown-indhold
          html += `
            <div class="card">
              <div class="card-header" onclick="toggleCard(this)">
                <span class="card-marker"></span>
                <span class="card-title">Indhold kommer snart</span>
                <span class="chevron">▾</span>
              </div>
              <div class="card-content">
                <p style="color: var(--text-secondary); font-style: italic;">Detaljeret indhold for denne zone er under udarbejdelse.</p>
              </div>
            </div>
          `;
        }

        html += '</div>';

        // Bottom navigation
        html += `
          <nav class="bottom-nav">
            <button class="nav-tab" onclick="window.location.href='begreber.html'">
              <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                <circle cx="12" cy="12" r="3"/>
                <circle cx="6" cy="6" r="1.5"/>
                <circle cx="18" cy="6" r="1.5"/>
                <circle cx="6" cy="18" r="1.5"/>
                <circle cx="18" cy="18" r="1.5"/>
              </svg>
              <span class="nav-label">Modellen</span>
            </button>

            <button class="nav-tab nav-tab-active" onclick="window.location.href='zoner.html'">
              <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                <circle cx="12" cy="12" r="6"/>
                <circle cx="12" cy="12" r="2"/>
              </svg>
              <span class="nav-label">Behandleren</span>
            </button>

            <button class="nav-tab" onclick="window.location.href='rejsen.html'">
              <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                <path d="M3 18 Q 6 15, 9 12 T 15 9 T 21 6"/>
              </svg>
              <span class="nav-label">Rejsen</span>
            </button>

            <button class="nav-tab" onclick="window.location.href='index.html'">
              <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                <circle cx="10" cy="12" r="4"/>
                <circle cx="14" cy="12" r="4"/>
                <circle cx="12" cy="9" r="4"/>
              </svg>
              <span class="nav-label">Inspiration</span>
            </button>
          </nav>
        `;

        document.title = `Zone ${zoneData.letter} — Den Biodynamiske App`;
        container.innerHTML = html;

      } catch (error) {
        console.error('Fejl ved indlæsning:', error);
        container.innerHTML = `
          <div style="text-align: center; padding: 60px 20px;">
            <h1 style="font-family: var(--font-display); font-size: 24px; color: var(--text-primary); margin-bottom: 12px;">
              ZONE IKKE FUNDET
            </h1>
            <p style="font-family: var(--font-body); font-size: 17px; color: var(--text-secondary); line-height: 1.75; margin-bottom: 24px;">
              Zonen med id <strong>${zoneId}</strong> kunne ikke indlæses.
            </p>
            <button onclick="window.location.href='zoner.html'"
                    style="font-family: var(--font-body); font-size: 14px; font-style: italic;
                           color: var(--text-secondary); background: none; border: 1px solid var(--border-card);
                           border-radius: 8px; padding: 10px 20px; cursor: pointer;">
              Tilbage til Zoner
            </button>
          </div>
        `;
      }
    }

    // Card toggle function
    function toggleCard(header) {
      const card = header.parentElement;
      const content = card.querySelector('.card-content');
      const chevron = header.querySelector('.chevron');

      card.classList.toggle('open');

      if (card.classList.contains('open')) {
        chevron.style.transform = 'rotate(180deg)';
        content.style.maxHeight = content.scrollHeight + 'px';
      } else {
        chevron.style.transform = 'rotate(0deg)';
        content.style.maxHeight = '0';
      }
    }

    // Get zone ID from URL and render
    const urlParams = new URLSearchParams(window.location.search);
    const zoneId = urlParams.get('id');

    if (!zoneId) {
      document.getElementById('app-container').innerHTML = `
        <div style="text-align: center; padding: 60px 20px;">
          <h1 style="font-family: var(--font-display); font-size: 24px; color: var(--text-primary); margin-bottom: 12px;">
            INGEN ZONE VALGT
          </h1>
          <p style="font-family: var(--font-body); font-size: 17px; color: var(--text-secondary); line-height: 1.75;">
            Tilføj <code>?id=a-fysisk-krop</code> til URL'en.
          </p>
        </div>
      `;
    } else {
      renderZone(zoneId);
    }
  </script>

  <script src="js/theme-toggle.js"></script>
</body>
</html>
