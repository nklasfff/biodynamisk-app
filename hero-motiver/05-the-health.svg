<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 80 380 380" role="img" aria-label="The Health">
<defs>
<style>
@keyframes core-r { 0%, 100% { r: 36px; } 50% { r: 46px; } }
@keyframes aura-r { 0%, 100% { rx: 158px; ry: 158px; } 50% { rx: 182px; ry: 182px; } }
@keyframes dot-r { 0%, 100% { r: 0.6px; } 50% { r: 1.3px; } }
/* Prikkerne bevæger sig ind mod midten og udefter igen i samme rytme som auraen */
@keyframes dots-radiate {
  0%, 100% { transform: scale(0.86); }
  50% { transform: scale(1.15); }
}
.core { animation: core-r 8s ease-in-out infinite; }
.aura { animation: aura-r 8s ease-in-out infinite; }
.d { animation: dot-r 8s ease-in-out infinite; }
.dots-group {
  animation: dots-radiate 8s ease-in-out infinite;
  transform-origin: 190px 270px;
  transform-box: view-box;
}
@media (prefers-reduced-motion: reduce) {
  .core, .aura, .d, .dots-group { animation: none; }
}
</style>
<radialGradient id="well" cx="50%" cy="42%" r="65%">
<stop offset="0%" stop-color="#1f2a35"/>
<stop offset="55%" stop-color="#131a22"/>
<stop offset="100%" stop-color="#0c1218"/>
</radialGradient>
<radialGradient id="core-g" cx="50%" cy="50%" r="50%">
<stop offset="0%" stop-color="#f8f8f8" stop-opacity="1"/>
<stop offset="30%" stop-color="#e0e0e0" stop-opacity="0.6"/>
<stop offset="70%" stop-color="#b0b0b0" stop-opacity="0.15"/>
<stop offset="100%" stop-color="#b0b0b0" stop-opacity="0"/>
</radialGradient>
<radialGradient id="aura-g" cx="50%" cy="50%" r="50%">
<stop offset="0%" stop-color="#dcdcdc" stop-opacity="0.28"/>
<stop offset="55%" stop-color="#909090" stop-opacity="0.07"/>
<stop offset="100%" stop-color="#909090" stop-opacity="0"/>
</radialGradient>
</defs>

<rect x="0" y="0" width="380" height="640" fill="url(#well)"/>

<ellipse class="aura" cx="190" cy="270" rx="170" ry="170" fill="url(#aura-g)"/>

<g class="dots-group" fill="#f8f8f8" opacity="0.75">
<circle class="d" cx="190" cy="185" r="1"/>
<circle class="d" cx="250" cy="210" r="1"/>
<circle class="d" cx="275" cy="270" r="1"/>
<circle class="d" cx="250" cy="330" r="1"/>
<circle class="d" cx="190" cy="355" r="1"/>
<circle class="d" cx="130" cy="330" r="1"/>
<circle class="d" cx="105" cy="270" r="1"/>
<circle class="d" cx="130" cy="210" r="1"/>
<circle class="d" cx="190" cy="150" r="0.9"/>
<circle class="d" cx="250" cy="166" r="0.9"/>
<circle class="d" cx="294" cy="210" r="0.9"/>
<circle class="d" cx="310" cy="270" r="0.9"/>
<circle class="d" cx="294" cy="330" r="0.9"/>
<circle class="d" cx="250" cy="374" r="0.9"/>
<circle class="d" cx="190" cy="390" r="0.9"/>
<circle class="d" cx="130" cy="374" r="0.9"/>
<circle class="d" cx="86" cy="330" r="0.9"/>
<circle class="d" cx="70" cy="270" r="0.9"/>
<circle class="d" cx="86" cy="210" r="0.9"/>
<circle class="d" cx="130" cy="166" r="0.9"/>
</g>

<circle class="core" cx="190" cy="270" r="42" fill="url(#core-g)"/>

<line x1="140" y1="520" x2="240" y2="520" stroke="#b0b0b0" stroke-width="0.5" opacity="0.5"/>
<text x="190" y="555" text-anchor="middle" font-family="Cinzel, serif" font-size="12" letter-spacing="4" fill="#e0e0e0" opacity="0.95">THE HEALTH</text>
<text x="190" y="580" text-anchor="middle" font-family="Cormorant Garamond, Georgia, serif" font-size="13" font-style="italic" fill="#b0b0b0" opacity="0.8">den umistelige sundhed</text>
</svg>
