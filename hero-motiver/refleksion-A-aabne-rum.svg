<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 380 640" role="img" aria-label="Refleksion - det åbne rum">
<defs>
<style>
@keyframes ring-breathe {
  0%, 100% { r: 88px; opacity: 0.45; }
  50% { r: 102px; opacity: 0.65; }
}
@keyframes mark-breathe {
  0%, 100% { transform: scale(1); opacity: 0.65; }
  50% { transform: scale(1.18); opacity: 0.85; }
}
@keyframes inner-glow {
  0%, 100% { rx: 65px; ry: 65px; opacity: 0.18; }
  50% { rx: 78px; ry: 78px; opacity: 0.28; }
}
@keyframes aura-r { 0%, 100% { rx: 158px; ry: 158px; } 50% { rx: 182px; ry: 182px; } }

.ring { animation: ring-breathe 8s ease-in-out infinite; }
.mark { 
  animation: mark-breathe 8s ease-in-out infinite;
  transform-origin: 190px 270px;
  transform-box: view-box;
}
.glow { animation: inner-glow 8s ease-in-out infinite; }
.aura { animation: aura-r 8s ease-in-out infinite; }

@media (prefers-reduced-motion: reduce) {
  .ring, .mark, .glow, .aura { animation: none; }
}
</style>
<radialGradient id="well" cx="50%" cy="42%" r="65%">
<stop offset="0%" stop-color="#2a3847"/>
<stop offset="55%" stop-color="#1d2731"/>
<stop offset="100%" stop-color="#141b22"/>
</radialGradient>
<radialGradient id="glow-g" cx="50%" cy="50%" r="50%">
<stop offset="0%" stop-color="#d8c8e0" stop-opacity="0"/>
<stop offset="60%" stop-color="#b8a8c8" stop-opacity="0.15"/>
<stop offset="100%" stop-color="#9888a8" stop-opacity="0"/>
</radialGradient>
<radialGradient id="aura-g" cx="50%" cy="50%" r="50%">
<stop offset="0%" stop-color="#c8b8d0" stop-opacity="0.22"/>
<stop offset="55%" stop-color="#7a6c8c" stop-opacity="0.06"/>
<stop offset="100%" stop-color="#7a6c8c" stop-opacity="0"/>
</radialGradient>
</defs>

<rect width="380" height="640" fill="url(#well)"/>

<ellipse class="aura" cx="190" cy="270" rx="170" ry="170" fill="url(#aura-g)"/>

<ellipse class="glow" cx="190" cy="270" rx="65" ry="65" fill="url(#glow-g)" opacity="0.18"/>

<circle class="ring" cx="190" cy="270" r="88" stroke="#c8b8d0" stroke-width="0.8" fill="none" opacity="0.45"/>

<!-- Abstrakt tegn -->
<g class="mark">
  <!-- Bue der ender med lille lodret forlængelse - alt i én sammenhængende path.
       Buen kommer ned mod midten ved (188, 274) og fortsætter lige ned til (188, 277.5) -->
  <path d="M 190 252 Q 202 254 200 264 Q 197 273 188 274 L 188 277.5"
        stroke="#d8c8e0" stroke-width="1.2" stroke-linecap="round" fill="none" opacity="0.65"/>
  <!-- Punktet -->
  <circle cx="190" cy="285" r="1.6" fill="#d8c8e0" opacity="0.75"/>
</g>

<line x1="140" y1="520" x2="240" y2="520" stroke="#9888a8" stroke-width="0.5" opacity="0.55"/>
<text x="190" y="555" text-anchor="middle" font-family="Cinzel, serif" font-size="12" letter-spacing="4" fill="#d8c8e0" opacity="0.95">REFLEKSION</text>
<text x="190" y="580" text-anchor="middle" font-family="Cormorant Garamond, Georgia, serif" font-size="13" font-style="italic" fill="#b8a8c8" opacity="0.85">det åbne rum</text>
</svg>
