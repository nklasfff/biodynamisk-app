<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 380 380" role="img" aria-label="Ubalancen breder sig">
<defs>
<radialGradient id="well-h3" cx="50%" cy="50%" r="65%">
<stop offset="0%" stop-color="#2a3847"/>
<stop offset="55%" stop-color="#1d2731"/>
<stop offset="100%" stop-color="#141b22"/>
</radialGradient>
<radialGradient id="core-g-h3" cx="50%" cy="50%" r="50%">
<stop offset="0%" stop-color="#faf4e8" stop-opacity="0.8"/>
<stop offset="30%" stop-color="#f0e2c8" stop-opacity="0.5"/>
<stop offset="70%" stop-color="#d4b98f" stop-opacity="0.13"/>
<stop offset="100%" stop-color="#c9b8a0" stop-opacity="0"/>
</radialGradient>
<radialGradient id="orb-g-h3" cx="50%" cy="50%" r="50%">
<stop offset="0%" stop-color="#faf4e8" stop-opacity="0.78"/>
<stop offset="40%" stop-color="#f0e2c8" stop-opacity="0.42"/>
<stop offset="100%" stop-color="#c9b8a0" stop-opacity="0"/>
</radialGradient>
<radialGradient id="strain-g-h3" cx="50%" cy="50%" r="50%">
<stop offset="0%" stop-color="#ecdcb8" stop-opacity="0.85"/>
<stop offset="45%" stop-color="#c8a878" stop-opacity="0.45"/>
<stop offset="100%" stop-color="#806848" stop-opacity="0"/>
</radialGradient>
<radialGradient id="aura-g-h3" cx="50%" cy="50%" r="50%">
<stop offset="0%" stop-color="#e8dfcf" stop-opacity="0.18"/>
<stop offset="55%" stop-color="#a89880" stop-opacity="0.05"/>
<stop offset="100%" stop-color="#a89880" stop-opacity="0"/>
</radialGradient>
</defs>

<rect x="0" y="0" width="380" height="380" fill="url(#well-h3)"/>

<!-- Aura tydeligt skæv — stor ujævn ånding -->
<ellipse cx="172" cy="208" rx="128" ry="115" fill="url(#aura-g-h3)">
  <animate attributeName="rx" values="128;152;128" dur="8s" repeatCount="indefinite" calcMode="spline" keyTimes="0;0.5;1" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
  <animate attributeName="ry" values="115;138;115" dur="8s" repeatCount="indefinite" calcMode="spline" keyTimes="0;0.5;1" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
</ellipse>

<!-- Forbindelseslinjer — markant ujævne længder -->
<g stroke="#a89880" stroke-width="0.4" opacity="0.32">
  <line x1="190" y1="190" x2="195" y2="98"/>
  <line x1="190" y1="190" x2="278" y2="172"/>
  <line x1="190" y1="190" x2="232" y2="258"/>
  <line x1="190" y1="190" x2="148" y2="234"/>
  <line x1="190" y1="190" x2="92" y2="180"/>
</g>

<!-- 5 zone-orber — flere markant forskudt, P4 mest belastet -->
<ellipse cx="195" cy="98" rx="8.5" ry="11" fill="url(#orb-g-h3)">
  <animate attributeName="rx" values="8.5;12.5;8.5" dur="8s" repeatCount="indefinite" calcMode="spline" keyTimes="0;0.5;1" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
  <animate attributeName="ry" values="11;16;11" dur="8s" repeatCount="indefinite" calcMode="spline" keyTimes="0;0.5;1" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
</ellipse>
<ellipse cx="278" cy="172" rx="8.5" ry="11" fill="url(#orb-g-h3)">
  <animate attributeName="rx" values="8.5;12.5;8.5" dur="8s" repeatCount="indefinite" calcMode="spline" keyTimes="0;0.5;1" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
  <animate attributeName="ry" values="11;16;11" dur="8s" repeatCount="indefinite" calcMode="spline" keyTimes="0;0.5;1" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
</ellipse>
<ellipse cx="232" cy="258" rx="8.5" ry="11" fill="url(#orb-g-h3)">
  <animate attributeName="rx" values="8.5;12.5;8.5" dur="8s" repeatCount="indefinite" calcMode="spline" keyTimes="0;0.5;1" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
  <animate attributeName="ry" values="11;16;11" dur="8s" repeatCount="indefinite" calcMode="spline" keyTimes="0;0.5;1" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
</ellipse>
<ellipse cx="148" cy="234" rx="11" ry="14" fill="url(#strain-g-h3)">
  <animate attributeName="rx" values="11;16;11" dur="8s" repeatCount="indefinite" calcMode="spline" keyTimes="0;0.5;1" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
  <animate attributeName="ry" values="14;19;14" dur="8s" repeatCount="indefinite" calcMode="spline" keyTimes="0;0.5;1" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
</ellipse>
<ellipse cx="92" cy="180" rx="8.5" ry="11" fill="url(#orb-g-h3)">
  <animate attributeName="rx" values="8.5;12.5;8.5" dur="8s" repeatCount="indefinite" calcMode="spline" keyTimes="0;0.5;1" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
  <animate attributeName="ry" values="11;16;11" dur="8s" repeatCount="indefinite" calcMode="spline" keyTimes="0;0.5;1" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
</ellipse>

<!-- Kerne — dæmpet men synlig pulseren -->
<ellipse cx="190" cy="190" rx="20" ry="26" fill="url(#core-g-h3)">
  <animate attributeName="rx" values="20;27;20" dur="8s" repeatCount="indefinite" calcMode="spline" keyTimes="0;0.5;1" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
  <animate attributeName="ry" values="26;34;26" dur="8s" repeatCount="indefinite" calcMode="spline" keyTimes="0;0.5;1" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
</ellipse>
</svg>
