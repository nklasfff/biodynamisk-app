<stop offset="100%" stop-color="#0c1218"/>
</radialGradient>
<radialGradient id="core-g-h3" cx="50%" cy="50%" r="50%">
<stop offset="0%" stop-color="#faf4e8" stop-opacity="0.8"/>
<stop offset="30%" stop-color="#f0e2c8" stop-opacity="0.5"/>
<stop offset="70%" stop-color="#d4b98f" stop-opacity="0.13"/>
<stop offset="100%" stop-color="#c9b8a0" stop-opacity="0"/>
</radialGradient>
<radialGradient id="orb-g-h3" cx="50%" cy="50%" r="50%">
