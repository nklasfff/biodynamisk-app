<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 380 640" role="img" aria-label="Zone B - Væskekroppen">
<defs>
<style>
@keyframes core-rx { 0%, 100% { rx: 28px; ry: 58px; } 50% { rx: 34px; ry: 70px; } }
@keyframes aura-r { 0%, 100% { rx: 168px; ry: 168px; } 50% { rx: 192px; ry: 192px; } }
@keyframes side-core { 0%, 100% { rx: 13px; ry: 26px; } 50% { rx: 16px; ry: 32px; } }
.core { animation: core-rx 8s ease-in-out infinite; }
.aura { animation: aura-r 8s ease-in-out infinite; }
.side-core { animation: side-core 8s ease-in-out infinite; }
@media (prefers-reduced-motion: reduce) {
  .core, .aura, .side-core { animation: none; }
}
</style>
<radialGradient id="well" cx="50%" cy="42%" r="65%">
<stop offset="0%" stop-color="#2a3847"/>
<stop offset="55%" stop-color="#1d2731"/>
<stop offset="100%" stop-color="#141b22"/>
</radialGradient>
<radialGradient id="core-g" cx="50%" cy="50%" r="50%">
<stop offset="0%" stop-color="#f2f7fb" stop-opacity="1"/>
<stop offset="30%" stop-color="#c4d0dc" stop-opacity="0.7"/>
<stop offset="70%" stop-color="#8fa3b8" stop-opacity="0.2"/>
<stop offset="100%" stop-color="#5e748a" stop-opacity="0"/>
</radialGradient>
<radialGradient id="side-g" cx="50%" cy="50%" r="50%">
<stop offset="0%" stop-color="#f2f7fb" stop-opacity="0.85"/>
<stop offset="40%" stop-color="#c4d0dc" stop-opacity="0.5"/>
<stop offset="100%" stop-color="#5e748a" stop-opacity="0"/>
</radialGradient>
<radialGradient id="aura-g" cx="50%" cy="50%" r="50%">
<stop offset="0%" stop-color="#b8c5d3" stop-opacity="0.25"/>
<stop offset="55%" stop-color="#7a8b9c" stop-opacity="0.07"/>
<stop offset="100%" stop-color="#7a8b9c" stop-opacity="0"/>
</radialGradient>
<radialGradient id="fluid-fill" cx="50%" cy="50%" r="60%">
<stop offset="0%" stop-color="#c4d0dc" stop-opacity="0.1"/>
<stop offset="100%" stop-color="#7a8b9c" stop-opacity="0"/>
</radialGradient>
</defs>

<rect x="0" y="0" width="380" height="640" fill="url(#well)"/>

<ellipse class="aura" cx="190" cy="280" rx="180" ry="170" fill="url(#aura-g)"/>

<!-- VENSTRE: medbragt tilstand - bølger af TYDELIGT FORSKELLIGE LÆNGDER, ASYNKRONE bevægelser -->
<g transform="translate(65, 280)">
  <!-- Kort bølge, 6s cyklus -->
  <path d="M -18 -42 Q -8 -46 2 -42" stroke="#c4d0dc" stroke-width="0.55" fill="none" opacity="0.5">
    <animate attributeName="d" values="M -18 -42 Q -8 -38 2 -42;M -18 -42 Q -8 -46 2 -42;M -18 -42 Q -8 -38 2 -42" dur="6s" repeatCount="indefinite" calcMode="spline" keyTimes="0;0.5;1" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
  </path>
  
  <!-- Lang bølge, 11s cyklus - tydeligt anderledes tempo -->
  <path d="M -32 -22 Q -16 -28 0 -22 Q 16 -16 32 -22" stroke="#c4d0dc" stroke-width="0.55" fill="none" opacity="0.5">
    <animate attributeName="d" values="M -32 -22 Q -16 -16 0 -22 Q 16 -28 32 -22;M -32 -22 Q -16 -28 0 -22 Q 16 -16 32 -22;M -32 -22 Q -16 -16 0 -22 Q 16 -28 32 -22" dur="11s" repeatCount="indefinite" calcMode="spline" keyTimes="0;0.5;1" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
  </path>
  
  <!-- Mellem bølge, 8s cyklus, start-forskudt -->
  <path d="M -12 -2 Q 0 -6 12 -2 Q 22 2 30 -2" stroke="#c4d0dc" stroke-width="0.5" fill="none" opacity="0.45">
    <animate attributeName="d" values="M -12 -2 Q 0 2 12 -2 Q 22 -6 30 -2;M -12 -2 Q 0 -6 12 -2 Q 22 2 30 -2;M -12 -2 Q 0 2 12 -2 Q 22 -6 30 -2" dur="8s" begin="-3s" repeatCount="indefinite" calcMode="spline" keyTimes="0;0.5;1" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
  </path>
  
  <!-- Læsion i væsken -->
  <circle cx="0" cy="0" r="5" fill="#5e748a" opacity="0.4"/>
  
  <!-- Ekstra kort bølge, 5s cyklus -->
  <path d="M -28 22 Q -18 18 -8 22" stroke="#c4d0dc" stroke-width="0.5" fill="none" opacity="0.45">
    <animate attributeName="d" values="M -28 22 Q -18 26 -8 22;M -28 22 Q -18 18 -8 22;M -28 22 Q -18 26 -8 22" dur="5s" repeatCount="indefinite" calcMode="spline" keyTimes="0;0.5;1" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
  </path>
  
  <!-- Lang bølge bunden, 10s cyklus -->
  <path d="M -30 42 Q -14 46 2 42 Q 18 38 32 42" stroke="#c4d0dc" stroke-width="0.55" fill="none" opacity="0.5">
    <animate attributeName="d" values="M -30 42 Q -14 38 2 42 Q 18 46 32 42;M -30 42 Q -14 46 2 42 Q 18 38 32 42;M -30 42 Q -14 38 2 42 Q 18 46 32 42" dur="10s" begin="-4s" repeatCount="indefinite" calcMode="spline" keyTimes="0;0.5;1" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
  </path>
  
  <ellipse class="side-core" cx="2" cy="0" rx="14" ry="28" fill="url(#side-g)"/>
</g>

<!-- MIDTEN: væskekroppens vågnende respons - koncentriske bølger, simultan respons -->
<g transform="translate(190, 270)">
  <ellipse cx="0" cy="0" rx="68" ry="118" stroke="#c4d0dc" stroke-width="0.55" fill="url(#fluid-fill)" opacity="0.55">
    <animate attributeName="rx" values="68;82;68" dur="8s" repeatCount="indefinite" calcMode="spline" keyTimes="0;0.5;1" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
    <animate attributeName="ry" values="118;140;118" dur="8s" repeatCount="indefinite" calcMode="spline" keyTimes="0;0.5;1" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
  </ellipse>
  <ellipse cx="0" cy="0" rx="92" ry="148" stroke="#c4d0dc" stroke-width="0.45" fill="none" opacity="0.35">
    <animate attributeName="rx" values="92;108;92" dur="8s" repeatCount="indefinite" calcMode="spline" keyTimes="0;0.5;1" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
    <animate attributeName="ry" values="148;170;148" dur="8s" repeatCount="indefinite" calcMode="spline" keyTimes="0;0.5;1" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
  </ellipse>
  <g stroke="#c4d0dc" stroke-width="0.5" fill="none" opacity="0.5">
    <path d="M -70 -85 Q -35 -92 0 -85 Q 35 -78 70 -85">
      <animate attributeName="d" values="M -70 -85 Q -35 -92 0 -85 Q 35 -78 70 -85;M -80 -95 Q -40 -88 0 -95 Q 40 -102 80 -95;M -70 -85 Q -35 -92 0 -85 Q 35 -78 70 -85" dur="8s" repeatCount="indefinite" calcMode="spline" keyTimes="0;0.5;1" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
    </path>
    <path d="M -62 85 Q -31 78 0 85 Q 31 92 62 85">
      <animate attributeName="d" values="M -62 85 Q -31 78 0 85 Q 31 92 62 85;M -72 95 Q -36 102 0 95 Q 36 88 72 95;M -62 85 Q -31 78 0 85 Q 31 92 62 85" dur="8s" repeatCount="indefinite" calcMode="spline" keyTimes="0;0.5;1" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
    </path>
  </g>
  <ellipse class="core" cx="0" cy="0" rx="28" ry="58" fill="url(#core-g)"/>
</g>

<!-- HØJRE: åbningen mod det relationelle - 5 ENS bølger med SAMME længde, SYNKRONE bevægelser -->
<g transform="translate(315, 280)">
  <!-- Alle 5 bølger: samme længde (60 bred), samme amplitude, samme 8s rytme, samme retning -->
  <path d="M -30 -40 Q -15 -44 0 -40 Q 15 -36 30 -40" stroke="#c4d0dc" stroke-width="0.55" fill="none" opacity="0.55">
    <animate attributeName="d" values="M -30 -40 Q -15 -36 0 -40 Q 15 -44 30 -40;M -30 -40 Q -15 -44 0 -40 Q 15 -36 30 -40;M -30 -40 Q -15 -36 0 -40 Q 15 -44 30 -40" dur="8s" repeatCount="indefinite" calcMode="spline" keyTimes="0;0.5;1" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
  </path>
  <path d="M -30 -20 Q -15 -24 0 -20 Q 15 -16 30 -20" stroke="#c4d0dc" stroke-width="0.55" fill="none" opacity="0.55">
    <animate attributeName="d" values="M -30 -20 Q -15 -16 0 -20 Q 15 -24 30 -20;M -30 -20 Q -15 -24 0 -20 Q 15 -16 30 -20;M -30 -20 Q -15 -16 0 -20 Q 15 -24 30 -20" dur="8s" repeatCount="indefinite" calcMode="spline" keyTimes="0;0.5;1" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
  </path>
  <path d="M -30 0 Q -15 -4 0 0 Q 15 4 30 0" stroke="#c4d0dc" stroke-width="0.55" fill="none" opacity="0.55">
    <animate attributeName="d" values="M -30 0 Q -15 4 0 0 Q 15 -4 30 0;M -30 0 Q -15 -4 0 0 Q 15 4 30 0;M -30 0 Q -15 4 0 0 Q 15 -4 30 0" dur="8s" repeatCount="indefinite" calcMode="spline" keyTimes="0;0.5;1" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
  </path>
  <path d="M -30 20 Q -15 16 0 20 Q 15 24 30 20" stroke="#c4d0dc" stroke-width="0.55" fill="none" opacity="0.55">
    <animate attributeName="d" values="M -30 20 Q -15 24 0 20 Q 15 16 30 20;M -30 20 Q -15 16 0 20 Q 15 24 30 20;M -30 20 Q -15 24 0 20 Q 15 16 30 20" dur="8s" repeatCount="indefinite" calcMode="spline" keyTimes="0;0.5;1" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
  </path>
  <path d="M -30 40 Q -15 36 0 40 Q 15 44 30 40" stroke="#c4d0dc" stroke-width="0.55" fill="none" opacity="0.55">
    <animate attributeName="d" values="M -30 40 Q -15 44 0 40 Q 15 36 30 40;M -30 40 Q -15 36 0 40 Q 15 44 30 40;M -30 40 Q -15 44 0 40 Q 15 36 30 40" dur="8s" repeatCount="indefinite" calcMode="spline" keyTimes="0;0.5;1" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
  </path>
  <ellipse class="side-core" cx="0" cy="0" rx="14" ry="28" fill="url(#side-g)"/>
</g>

<line x1="95" y1="280" x2="145" y2="275" stroke="#7a8b9c" stroke-width="0.3" opacity="0.4"/>
<line x1="235" y1="275" x2="285" y2="280" stroke="#7a8b9c" stroke-width="0.3" opacity="0.4"/>

<line x1="140" y1="520" x2="240" y2="520" stroke="#7a8b9c" stroke-width="0.5" opacity="0.55"/>
<text x="190" y="555" text-anchor="middle" font-family="Cinzel, serif" font-size="12" letter-spacing="4" fill="#c4d0dc" opacity="0.95">ZONE B</text>
<text x="190" y="580" text-anchor="middle" font-family="Cormorant Garamond, Georgia, serif" font-size="13" font-style="italic" fill="#8fa3b8" opacity="0.9">væskekroppen</text>
</svg>
