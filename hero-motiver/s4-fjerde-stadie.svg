<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 80 380 380" role="img" aria-label="Det Fjerde Stadie">
<defs>
<style>
@keyframes core-r { 0%, 100% { r: 36px; } 50% { r: 46px; } }
@keyframes aura-r { 0%, 100% { rx: 158px; ry: 158px; } 50% { rx: 182px; ry: 182px; } }
/* Long Tide: 16-sekunders cyklus - dobbelt så langsom som alt andet. 
   Strømmene trækker sig lidt ind og ud i samme langsomme rytme */
@keyframes tide-pulse {
  0%, 100% { transform: scale(0.95); opacity: 0.55; }
  50% { transform: scale(1.08); opacity: 0.85; }
}
.core { animation: core-r 8s ease-in-out infinite; }
.aura { animation: aura-r 8s ease-in-out infinite; }
.tide { animation: tide-pulse 16s ease-in-out infinite; transform-origin: 190px 270px; transform-box: view-box; }

@media (prefers-reduced-motion: reduce) {
  .core, .aura, .tide { animation: none; }
}
</style>
<radialGradient id="well" cx="50%" cy="42%" r="65%">
<stop offset="0%" stop-color="#2a3847"/>
<stop offset="55%" stop-color="#1d2731"/>
<stop offset="100%" stop-color="#141b22"/>
</radialGradient>
<radialGradient id="core-g" cx="50%" cy="50%" r="50%">
<stop offset="0%" stop-color="#fce8ec" stop-opacity="1"/>
<stop offset="30%" stop-color="#e8c4d0" stop-opacity="0.75"/>
<stop offset="70%" stop-color="#b880a0" stop-opacity="0.25"/>
<stop offset="100%" stop-color="#7a5270" stop-opacity="0"/>
</radialGradient>
<radialGradient id="aura-g" cx="50%" cy="50%" r="50%">
<stop offset="0%" stop-color="#d8a0b8" stop-opacity="0.3"/>
<stop offset="55%" stop-color="#8a5878" stop-opacity="0.1"/>
<stop offset="100%" stop-color="#8a5878" stop-opacity="0"/>
</radialGradient>
</defs>

<rect width="380" height="640" fill="url(#well)"/>
<ellipse class="aura" cx="190" cy="270" rx="170" ry="170" fill="url(#aura-g)"/>

<!-- 8 krummende strømme fra periferien mod midten - The Long Tide 
     ruller ind fra horisonten som havbølger mod kysten. -->
<g class="tide" fill="none" stroke="#d8a0b8" stroke-width="0.55" stroke-linecap="round">
  <path d="M 190 90 Q 215 140 200 180 Q 192 215 190 230" opacity="0.7"/>
  <path d="M 300 130 Q 275 175 255 200 Q 232 220 218 228" opacity="0.65"/>
  <path d="M 340 270 Q 285 260 255 265 Q 235 268 232 270" opacity="0.6"/>
  <path d="M 300 410 Q 275 365 255 340 Q 232 320 218 312" opacity="0.65"/>
  <path d="M 190 450 Q 215 400 200 360 Q 192 325 190 310" opacity="0.7"/>
  <path d="M 80 410 Q 105 365 125 340 Q 148 320 162 312" opacity="0.65"/>
  <path d="M 40 270 Q 95 260 125 265 Q 145 268 148 270" opacity="0.6"/>
  <path d="M 80 130 Q 105 175 125 200 Q 148 220 162 228" opacity="0.65"/>
</g>

<circle class="core" cx="190" cy="270" r="42" fill="url(#core-g)"/>

<line x1="140" y1="520" x2="240" y2="520" stroke="#7a5270" stroke-width="0.5" opacity="0.55"/>
<text x="190" y="555" text-anchor="middle" font-family="Cinzel, serif" font-size="12" letter-spacing="4" fill="#e8c4d0" opacity="0.95">FJERDE STADIE</text>
<text x="190" y="580" text-anchor="middle" font-family="Cormorant Garamond, Georgia, serif" font-size="13" font-style="italic" fill="#b880a0" opacity="0.85">the long tide</text>
</svg>
