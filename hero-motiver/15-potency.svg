<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 80 380 380" role="img" aria-label="Potency">
<defs>
<style>
@keyframes core-r { 0%, 100% { r: 36px; } 50% { r: 46px; } }
@keyframes aura-r { 0%, 100% { rx: 158px; ry: 158px; } 50% { rx: 182px; ry: 182px; } }

/* Lysperler der kondenserer - fra små og spredte til tætte og kraftige */
@keyframes pearl-a { 
  0%, 100% { r: 1.2px; } 
  50% { r: 2.8px; } 
}
@keyframes pearl-b { 
  0%, 100% { r: 1px; } 
  50% { r: 2.4px; } 
}
@keyframes pearl-c { 
  0%, 100% { r: 0.9px; } 
  50% { r: 2px; } 
}

.core { animation: core-r 8s ease-in-out infinite; }
.aura { animation: aura-r 8s ease-in-out infinite; }
.p-a { animation: pearl-a 8s ease-in-out infinite; }
.p-b { animation: pearl-b 8s ease-in-out infinite; }
.p-c { animation: pearl-c 8s ease-in-out infinite; }
@media (prefers-reduced-motion: reduce) {
  .core, .aura, .p-a, .p-b, .p-c { animation: none; }
}
</style>
<radialGradient id="well" cx="50%" cy="42%" r="65%">
<stop offset="0%" stop-color="#1f2a35"/>
<stop offset="55%" stop-color="#131a22"/>
<stop offset="100%" stop-color="#0c1218"/>
</radialGradient>
<radialGradient id="core-g" cx="50%" cy="50%" r="50%">
<stop offset="0%" stop-color="#f8f8f8" stop-opacity="1"/>
<stop offset="30%" stop-color="#e0e0e0" stop-opacity="0.6"/>
<stop offset="70%" stop-color="#b0b0b0" stop-opacity="0.15"/>
<stop offset="100%" stop-color="#b0b0b0" stop-opacity="0"/>
</radialGradient>
<radialGradient id="aura-g" cx="50%" cy="50%" r="50%">
<stop offset="0%" stop-color="#dcdcdc" stop-opacity="0.28"/>
<stop offset="55%" stop-color="#909090" stop-opacity="0.07"/>
<stop offset="100%" stop-color="#909090" stop-opacity="0"/>
</radialGradient>
<radialGradient id="pearl-g" cx="50%" cy="50%" r="50%">
<stop offset="0%" stop-color="#ffffff" stop-opacity="1"/>
<stop offset="50%" stop-color="#f8f8f8" stop-opacity="0.7"/>
<stop offset="100%" stop-color="#e0e0e0" stop-opacity="0"/>
</radialGradient>
</defs>

<rect x="0" y="0" width="380" height="640" fill="url(#well)"/>

<ellipse class="aura" cx="190" cy="270" rx="170" ry="170" fill="url(#aura-g)"/>

<!-- 8 lysperler tæt omkring kernen - den samlede essens i koncentreret form -->
<g fill="url(#pearl-g)">
<!-- Indre ring af perler tæt om kernen, r=62 -->
<circle class="p-a" cx="190" cy="208" r="1.2" opacity="0.95"/>
<circle class="p-a" cx="234" cy="226" r="1.2" opacity="0.95"/>
<circle class="p-a" cx="252" cy="270" r="1.2" opacity="0.95"/>
<circle class="p-a" cx="234" cy="314" r="1.2" opacity="0.95"/>
<circle class="p-a" cx="190" cy="332" r="1.2" opacity="0.95"/>
<circle class="p-a" cx="146" cy="314" r="1.2" opacity="0.95"/>
<circle class="p-a" cx="128" cy="270" r="1.2" opacity="0.95"/>
<circle class="p-a" cx="146" cy="226" r="1.2" opacity="0.95"/>

<!-- Mellemring: 8 mindre perler, r=92 -->
<circle class="p-b" cx="190" cy="178" r="1" opacity="0.8"/>
<circle class="p-b" cx="255" cy="205" r="1" opacity="0.8"/>
<circle class="p-b" cx="282" cy="270" r="1" opacity="0.8"/>
<circle class="p-b" cx="255" cy="335" r="1" opacity="0.8"/>
<circle class="p-b" cx="190" cy="362" r="1" opacity="0.8"/>
<circle class="p-b" cx="125" cy="335" r="1" opacity="0.8"/>
<circle class="p-b" cx="98" cy="270" r="1" opacity="0.8"/>
<circle class="p-b" cx="125" cy="205" r="1" opacity="0.8"/>

<!-- Yderste ring: 8 spredte perler, r=125 -->
<circle class="p-c" cx="190" cy="145" r="0.9" opacity="0.65"/>
<circle class="p-c" cx="278" cy="182" r="0.9" opacity="0.65"/>
<circle class="p-c" cx="315" cy="270" r="0.9" opacity="0.65"/>
<circle class="p-c" cx="278" cy="358" r="0.9" opacity="0.65"/>
<circle class="p-c" cx="190" cy="395" r="0.9" opacity="0.65"/>
<circle class="p-c" cx="102" cy="358" r="0.9" opacity="0.65"/>
<circle class="p-c" cx="65" cy="270" r="0.9" opacity="0.65"/>
<circle class="p-c" cx="102" cy="182" r="0.9" opacity="0.65"/>
</g>

<circle class="core" cx="190" cy="270" r="42" fill="url(#core-g)"/>

<line x1="140" y1="520" x2="240" y2="520" stroke="#b0b0b0" stroke-width="0.5" opacity="0.5"/>
<text x="190" y="555" text-anchor="middle" font-family="Cinzel, serif" font-size="12" letter-spacing="4" fill="#e0e0e0" opacity="0.95">POTENCY</text>
<text x="190" y="580" text-anchor="middle" font-family="Cormorant Garamond, Georgia, serif" font-size="13" font-style="italic" fill="#b0b0b0" opacity="0.8">den koncentrerede essens</text>
</svg>
