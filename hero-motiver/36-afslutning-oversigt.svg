  <circle class="star star-12" cx="69.26" cy="302.35" r="1.6" fill="url(#star-g)" opacity="0.5"/>
  <circle class="star star-1" cx="65.00" cy="270.00" r="1.6" fill="url(#star-g)" opacity="0.5"/>
  <circle class="star star-2" cx="69.26" cy="237.65" r="1.6" fill="url(#star-g)" opacity="0.5"/>
  <circle class="star star-3" cx="81.75" cy="207.50" r="1.6" fill="url(#star-g)" opacity="0.5"/>
  <circle class="star star-4" cx="101.61" cy="181.61" r="1.6" fill="url(#star-g)" opacity="0.5"/>
  <circle class="star star-5" cx="127.50" cy="161.75" r="1.6" fill="url(#star-g)" opacity="0.5"/>
  <circle class="star star-6" cx="157.65" cy="149.26" r="1.6" fill="url(#star-g)" opacity="0.5"/>
  <circle class="star star-7" cx="190.00" cy="145.00" r="1.6" fill="url(#star-g)" opacity="0.5"/>
  <circle class="star star-8" cx="222.35" cy="149.26" r="1.6" fill="url(#star-g)" opacity="0.5"/>
  <circle class="star star-9" cx="252.50" cy="161.75" r="1.6" fill="url(#star-g)" opacity="0.5"/>
  <circle class="star star-10" cx="278.39" cy="181.61" r="1.6" fill="url(#star-g)" opacity="0.5"/>
  <circle class="star star-11" cx="298.25" cy="207.50" r="1.6" fill="url(#star-g)" opacity="0.5"/>
  <circle class="star star-12" cx="310.74" cy="237.65" r="1.6" fill="url(#star-g)" opacity="0.5"/>
</g>

<circle class="core" cx="190" cy="270" r="42" fill="url(#core-g)"/>

<line x1="140" y1="520" x2="240" y2="520" stroke="#6a8a7e" stroke-width="0.5" opacity="0.55"/>
<text x="190" y="555" text-anchor="middle" font-family="Cinzel, serif" font-size="12" letter-spacing="4" fill="#d8e8e0" opacity="0.95">AFSLUTNING</text>
<text x="190" y="580" text-anchor="middle" font-family="Cormorant Garamond, Georgia, serif" font-size="13" font-style="italic" fill="#8aa89c" opacity="0.85">hvor alle tråde samles</text>
</svg>
