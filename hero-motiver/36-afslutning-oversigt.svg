  <line x1="151.11" y1="231.11" x2="101.61" y2="181.61" stroke-width="0.35" opacity="0.45"/>
  <line x1="162.50" y1="222.37" x2="127.50" y2="161.75" stroke-width="0.35" opacity="0.45"/>
  <line x1="175.76" y1="216.87" x2="157.65" y2="149.26" stroke-width="0.35" opacity="0.45"/>
  <line x1="190.00" y1="215.00" x2="190.00" y2="145.00" stroke-width="0.35" opacity="0.45"/>
  <line x1="204.24" y1="216.87" x2="222.35" y2="149.26" stroke-width="0.35" opacity="0.45"/>
  <line x1="217.50" y1="222.37" x2="252.50" y2="161.75" stroke-width="0.35" opacity="0.45"/>
  <line x1="228.89" y1="231.11" x2="278.39" y2="181.61" stroke-width="0.35" opacity="0.45"/>
  <line x1="237.63" y1="242.50" x2="298.25" y2="207.50" stroke-width="0.35" opacity="0.45"/>
  <line x1="243.13" y1="255.76" x2="310.74" y2="237.65" stroke-width="0.35" opacity="0.45"/>
  
  <!-- Svag ydre cirkel der binder trådene sammen - horisontens antydning -->
  <circle cx="190" cy="270" r="125" stroke="#d8e8e0" stroke-width="0.25" opacity="0.2"/>
  
  <!-- 24 lyspunkter på den ydre cirkel - alle bogens temaer samlet som en konstellation.
       Blinker svagt forskudt - som stjerner der vågner -->
  <circle class="star star-1" cx="315.00" cy="270.00" r="1.6" fill="url(#star-g)" opacity="0.5"/>
  <circle class="star star-2" cx="310.74" cy="302.35" r="1.6" fill="url(#star-g)" opacity="0.5"/>
