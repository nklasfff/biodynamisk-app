<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 80 380 380" role="img" aria-label="The Neutral">
<title>The Neutral</title>
<desc>Tre subtile prikkede cirkler omkring kerne og aura. Efter 3 sekunder smelter de over 4 sekunder sammen til én hel cirkel uden prikker — derefter forfra.</desc>

<defs>
<style>
@keyframes core-r { 0%, 100% { r: 36px; } 50% { r: 46px; } }
@keyframes aura-r { 0%, 100% { rx: 158px; ry: 158px; } 50% { rx: 182px; ry: 182px; } }

/* 10s cyklus:
   0-3s (0-30%): tre subtile prikkede cirkler ved forskellige radii
   3-7s (30-70%): de smelter sammen — radius konvergerer mod 95, prikkerne fader
   7-10s (70-100%): hel cirkel synlig, derefter blender tilbage til de tre prikkede

   Den indre dotted cirkel (r=65) udvider sig udefter til r=95.
   Den ydre dotted cirkel (r=125) trækker sig sammen mod r=95.
   Den midterste dotted cirkel (r=95) bliver hvor den er.
   Alle tre fader ud, mens den hele cirkel (r=95) fader ind. */

@keyframes vessel-d-inner {
  0%, 30% { r: 65px; opacity: 0.32; }
  70% { r: 95px; opacity: 0; }
  100% { r: 65px; opacity: 0.32; }
}
@keyframes vessel-d-mid {
  0%, 30% { r: 95px; opacity: 0.32; }
  70% { r: 95px; opacity: 0; }
  100% { r: 95px; opacity: 0.32; }
}
@keyframes vessel-d-outer {
  0%, 30% { r: 125px; opacity: 0.32; }
  70% { r: 95px; opacity: 0; }
  100% { r: 125px; opacity: 0.32; }
}
@keyframes vessel-solid-cycle {
  0%, 30% { opacity: 0; }
  70% { opacity: 0.6; }
  100% { opacity: 0; }
}

.core { animation: core-r 8s ease-in-out infinite; }
.aura { animation: aura-r 8s ease-in-out infinite; }
.vessel-d-inner { animation: vessel-d-inner 10s ease-in-out infinite; }
.vessel-d-mid { animation: vessel-d-mid 10s ease-in-out infinite; }
.vessel-d-outer { animation: vessel-d-outer 10s ease-in-out infinite; }
.vessel-solid { animation: vessel-solid-cycle 10s ease-in-out infinite; }

@media (prefers-reduced-motion: reduce) {
  .core, .aura, .vessel-d-inner, .vessel-d-mid, .vessel-d-outer, .vessel-solid { animation: none; }
}
</style>
<radialGradient id="well" cx="50%" cy="42%" r="65%">
<stop offset="0%" stop-color="#1f2a35"/>
<stop offset="55%" stop-color="#131a22"/>
<stop offset="100%" stop-color="#0c1218"/>
</radialGradient>
<radialGradient id="core-g" cx="50%" cy="50%" r="50%">
<stop offset="0%" stop-color="#f8f8f8" stop-opacity="1"/>
<stop offset="30%" stop-color="#e0e0e0" stop-opacity="0.6"/>
<stop offset="70%" stop-color="#b0b0b0" stop-opacity="0.15"/>
<stop offset="100%" stop-color="#b0b0b0" stop-opacity="0"/>
</radialGradient>
<radialGradient id="aura-g" cx="50%" cy="50%" r="50%">
<stop offset="0%" stop-color="#dcdcdc" stop-opacity="0.28"/>
<stop offset="55%" stop-color="#909090" stop-opacity="0.07"/>
<stop offset="100%" stop-color="#909090" stop-opacity="0"/>
</radialGradient>
</defs>

<rect x="0" y="0" width="380" height="640" fill="url(#well)"/>

<ellipse class="aura" cx="190" cy="270" rx="170" ry="170" fill="url(#aura-g)"/>

<!-- Tre subtile prikkede cirkler — forskellige radii. Konvergerer og fader.  -->
<circle class="vessel-d-inner" cx="190" cy="270" r="65" stroke="#dcdcdc" stroke-width="0.9" fill="none" opacity="0.32" stroke-dasharray="1.5 6" stroke-linecap="round"/>
<circle class="vessel-d-mid" cx="190" cy="270" r="95" stroke="#dcdcdc" stroke-width="0.9" fill="none" opacity="0.32" stroke-dasharray="1.5 6" stroke-linecap="round"/>
<circle class="vessel-d-outer" cx="190" cy="270" r="125" stroke="#dcdcdc" stroke-width="0.9" fill="none" opacity="0.32" stroke-dasharray="1.5 6" stroke-linecap="round"/>

<!-- Den hele cirkel der træder frem når de tre smelter sammen -->
<circle class="vessel-solid" cx="190" cy="270" r="95" stroke="#e8e8e8" stroke-width="0.8" fill="none" opacity="0"/>

<circle class="core" cx="190" cy="270" r="42" fill="url(#core-g)"/>

<line x1="140" y1="520" x2="240" y2="520" stroke="#b0b0b0" stroke-width="0.5" opacity="0.5"/>
<text x="190" y="555" text-anchor="middle" font-family="Cinzel, serif" font-size="12" letter-spacing="4" fill="#e0e0e0" opacity="0.95">THE NEUTRAL</text>
<text x="190" y="580" text-anchor="middle" font-family="Cormorant Garamond, Georgia, serif" font-size="13" font-style="italic" fill="#b0b0b0" opacity="0.8">den åbne opmærksomhed</text>
</svg>
