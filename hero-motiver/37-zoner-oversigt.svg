<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 80 380 380" role="img" aria-label="De 5 Zoner">
<defs>
<style>
@keyframes core-r { 0%, 100% { r: 28px; } 50% { r: 36px; } }
@keyframes aura-r { 0%, 100% { rx: 158px; ry: 158px; } 50% { rx: 182px; ry: 182px; } }
@keyframes zones-breathe {
  0%, 100% { transform: scale(1); }
  50% { transform: scale(1.1); }
}
.core { animation: core-r 8s ease-in-out infinite; }
.aura { animation: aura-r 8s ease-in-out infinite; }
.zones-group {
  animation: zones-breathe 8s ease-in-out infinite;
  transform-origin: 190px 270px;
  transform-box: view-box;
}

/* 5 markører træder frem på skift - 20s cyklus, 4s per zone */
@keyframes marker-highlight {
  0%, 100% { r: 2.2px; opacity: 0.65; }
  10% { r: 4px; opacity: 1; }
  20% { r: 2.2px; opacity: 0.65; }
}
.m-a { animation: marker-highlight 20s ease-in-out infinite 0s; }
.m-b { animation: marker-highlight 20s ease-in-out infinite -4s; }
.m-c { animation: marker-highlight 20s ease-in-out infinite -8s; }
.m-d { animation: marker-highlight 20s ease-in-out infinite -12s; }
.m-e { animation: marker-highlight 20s ease-in-out infinite -16s; }

@media (prefers-reduced-motion: reduce) {
  .core, .aura, .zones-group, .m-a, .m-b, .m-c, .m-d, .m-e { animation: none; }
}
</style>
<radialGradient id="well" cx="50%" cy="42%" r="65%">
<stop offset="0%" stop-color="#1f2a35"/>
<stop offset="55%" stop-color="#131a22"/>
<stop offset="100%" stop-color="#0c1218"/>
</radialGradient>
<radialGradient id="core-g" cx="50%" cy="50%" r="50%">
<stop offset="0%" stop-color="#f2f7fb" stop-opacity="1"/>
<stop offset="30%" stop-color="#c4d0dc" stop-opacity="0.75"/>
<stop offset="70%" stop-color="#8fa3b8" stop-opacity="0.25"/>
<stop offset="100%" stop-color="#5e748a" stop-opacity="0"/>
</radialGradient>
<radialGradient id="aura-g" cx="50%" cy="50%" r="50%">
<stop offset="0%" stop-color="#b8c5d3" stop-opacity="0.28"/>
<stop offset="55%" stop-color="#7a8b9c" stop-opacity="0.08"/>
<stop offset="100%" stop-color="#7a8b9c" stop-opacity="0"/>
</radialGradient>
<radialGradient id="marker-g" cx="50%" cy="50%" r="50%">
<stop offset="0%" stop-color="#f2f7fb" stop-opacity="1"/>
<stop offset="50%" stop-color="#c4d0dc" stop-opacity="0.85"/>
<stop offset="100%" stop-color="#8fa3b8" stop-opacity="0"/>
</radialGradient>
</defs>

<rect x="0" y="0" width="380" height="640" fill="url(#well)"/>

<ellipse class="aura" cx="190" cy="270" rx="170" ry="170" fill="url(#aura-g)"/>

<!-- 5 ligestillede ringe + 5 lyspunkter - hver er en zone -->
<g class="zones-group">
  <!-- Zone A - yderst (r=158) -->
  <circle cx="190" cy="270" r="158" stroke="#c4d0dc" stroke-width="0.5" fill="none" opacity="0.28"/>
  <circle class="m-a" cx="190.00" cy="112.00" r="2.2" fill="url(#marker-g)" opacity="0.65"/>
  
  <!-- Zone B (r=132) -->
  <circle cx="190" cy="270" r="132" stroke="#c4d0dc" stroke-width="0.5" fill="none" opacity="0.34"/>
  <circle class="m-b" cx="301.94" cy="200.05" r="2.2" fill="url(#marker-g)" opacity="0.65"/>
  
  <!-- Zone C (r=105) -->
  <circle cx="190" cy="270" r="105" stroke="#c4d0dc" stroke-width="0.5" fill="none" opacity="0.4"/>
  <circle class="m-c" cx="272.74" cy="334.64" r="2.2" fill="url(#marker-g)" opacity="0.65"/>
  
  <!-- Zone D (r=80) -->
  <circle cx="190" cy="270" r="80" stroke="#c4d0dc" stroke-width="0.5" fill="none" opacity="0.46"/>
  <circle class="m-d" cx="156.19" cy="342.50" r="2.2" fill="url(#marker-g)" opacity="0.65"/>
  
  <!-- Zone E - inderst (r=58) -->
  <circle cx="190" cy="270" r="58" stroke="#c4d0dc" stroke-width="0.5" fill="none" opacity="0.52"/>
  <circle class="m-e" cx="133.98" cy="254.99" r="2.2" fill="url(#marker-g)" opacity="0.65"/>
</g>

<!-- Fælles kerne (motiv-element, ikke en zone) - mindre end før så ringene har plads -->
<circle class="core" cx="190" cy="270" r="28" fill="url(#core-g)"/>

<line x1="140" y1="520" x2="240" y2="520" stroke="#7a8b9c" stroke-width="0.5" opacity="0.55"/>
<text x="190" y="555" text-anchor="middle" font-family="Cinzel, serif" font-size="12" letter-spacing="4" fill="#c4d0dc" opacity="0.95">DE 5 ZONER</text>
<text x="190" y="580" text-anchor="middle" font-family="Cormorant Garamond, Georgia, serif" font-size="13" font-style="italic" fill="#8fa3b8" opacity="0.85">fra overfladen til kilden</text>
</svg>
