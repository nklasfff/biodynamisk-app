<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 380 380" role="img" aria-label="Mit Spejl">
<defs>
<radialGradient id="well-spe" cx="50%" cy="50%" r="65%">
<stop offset="0%" stop-color="#1f2a35"/>
<stop offset="55%" stop-color="#131a22"/>
<stop offset="100%" stop-color="#0c1218"/>
</radialGradient>
<radialGradient id="sun-g-spe" cx="50%" cy="50%" r="50%">
<stop offset="0%" stop-color="#fce8ec" stop-opacity="1"/>
<stop offset="30%" stop-color="#e8c4d0" stop-opacity="0.7"/>
<stop offset="70%" stop-color="#b880a0" stop-opacity="0.2"/>
<stop offset="100%" stop-color="#7a5270" stop-opacity="0"/>
</radialGradient>
<radialGradient id="aura-g-spe" cx="50%" cy="50%" r="50%">
<stop offset="0%" stop-color="#d8a0b8" stop-opacity="0.28"/>
<stop offset="55%" stop-color="#8a5878" stop-opacity="0.08"/>
<stop offset="100%" stop-color="#8a5878" stop-opacity="0"/>
</radialGradient>
<radialGradient id="orb-g-spe" cx="50%" cy="50%" r="50%">
<stop offset="0%" stop-color="#fce8ec" stop-opacity="0.85"/>
<stop offset="50%" stop-color="#e8c4d0" stop-opacity="0.5"/>
<stop offset="100%" stop-color="#8a5878" stop-opacity="0"/>
</radialGradient>
</defs>

<rect x="0" y="0" width="380" height="380" fill="url(#well-spe)"/>

<!-- Soft aura bag det hele -->
<ellipse cx="190" cy="200" rx="158" ry="148" fill="url(#aura-g-spe)">
  <animate attributeName="rx" values="158;180;158" dur="8s" repeatCount="indefinite" calcMode="spline" keyTimes="0;0.5;1" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
  <animate attributeName="ry" values="148;168;148" dur="8s" repeatCount="indefinite" calcMode="spline" keyTimes="0;0.5;1" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
</ellipse>

<!-- Rejsens bue — fladere, mere horisontal, men stadig dynamisk -->
<path d="M 50 290 Q 190 210 330 290" stroke="#e8c4d0" stroke-width="0.8" fill="none" opacity="0.6">
  <animate attributeName="d" values="M 50 290 Q 190 210 330 290;M 50 290 Q 190 194 330 290;M 50 290 Q 190 210 330 290" dur="8s" repeatCount="indefinite" calcMode="spline" keyTimes="0;0.5;1" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
</path>

<!-- 5 prikker på buen — fordelt jævnt mellem x=80 og x=300 (55px afstand) -->
<!-- Stadie 1: venstre -->
<circle cx="80" cy="275" r="3.5" fill="url(#orb-g-spe)" opacity="0.7">
  <animate attributeName="cy" values="275;271;275" dur="8s" repeatCount="indefinite" calcMode="spline" keyTimes="0;0.5;1" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
  <animate attributeName="r" values="3.5;5;3.5" dur="8s" repeatCount="indefinite" calcMode="spline" keyTimes="0;0.5;1" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
</circle>
<!-- Stadie 2 -->
<circle cx="135" cy="256" r="3.5" fill="url(#orb-g-spe)" opacity="0.78">
  <animate attributeName="cy" values="256;248;256" dur="8s" repeatCount="indefinite" calcMode="spline" keyTimes="0;0.5;1" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
  <animate attributeName="r" values="3.5;5;3.5" dur="8s" repeatCount="indefinite" calcMode="spline" keyTimes="0;0.5;1" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
</circle>
<!-- Stadie 3 — central prik på buen -->
<circle cx="190" cy="250" r="3.7" fill="url(#orb-g-spe)" opacity="0.85">
  <animate attributeName="cy" values="250;240;250" dur="8s" repeatCount="indefinite" calcMode="spline" keyTimes="0;0.5;1" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
  <animate attributeName="r" values="3.7;5.2;3.7" dur="8s" repeatCount="indefinite" calcMode="spline" keyTimes="0;0.5;1" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
</circle>
<!-- Sol over buen — fokuspunkt -->
<ellipse cx="190" cy="190" rx="22" ry="22" fill="url(#sun-g-spe)">
  <animate attributeName="rx" values="22;30;22" dur="8s" repeatCount="indefinite" calcMode="spline" keyTimes="0;0.5;1" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
  <animate attributeName="ry" values="22;30;22" dur="8s" repeatCount="indefinite" calcMode="spline" keyTimes="0;0.5;1" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
  <animate attributeName="cy" values="190;180;190" dur="8s" repeatCount="indefinite" calcMode="spline" keyTimes="0;0.5;1" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
</ellipse>
<!-- Stadie 4 -->
<circle cx="245" cy="256" r="3.5" fill="url(#orb-g-spe)" opacity="0.78">
  <animate attributeName="cy" values="256;248;256" dur="8s" repeatCount="indefinite" calcMode="spline" keyTimes="0;0.5;1" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
  <animate attributeName="r" values="3.5;5;3.5" dur="8s" repeatCount="indefinite" calcMode="spline" keyTimes="0;0.5;1" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
</circle>
<!-- Stadie 5 -->
<circle cx="300" cy="275" r="3.5" fill="url(#orb-g-spe)" opacity="0.7">
  <animate attributeName="cy" values="275;271;275" dur="8s" repeatCount="indefinite" calcMode="spline" keyTimes="0;0.5;1" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
  <animate attributeName="r" values="3.5;5;3.5" dur="8s" repeatCount="indefinite" calcMode="spline" keyTimes="0;0.5;1" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
</circle>

<!-- 8 mindre satellit-orbs over buen — egenskaberne, spredt -->
<g opacity="0.55">
  <circle cx="100" cy="170" r="1.6" fill="url(#orb-g-spe)">
    <animate attributeName="cy" values="170;162;170" dur="8s" repeatCount="indefinite" calcMode="spline" keyTimes="0;0.5;1" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
  </circle>
  <circle cx="142" cy="138" r="1.6" fill="url(#orb-g-spe)">
    <animate attributeName="cy" values="138;128;138" dur="8s" repeatCount="indefinite" calcMode="spline" keyTimes="0;0.5;1" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
  </circle>
  <circle cx="170" cy="118" r="1.6" fill="url(#orb-g-spe)">
    <animate attributeName="cy" values="118;108;118" dur="8s" repeatCount="indefinite" calcMode="spline" keyTimes="0;0.5;1" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
  </circle>
  <circle cx="210" cy="118" r="1.6" fill="url(#orb-g-spe)">
    <animate attributeName="cy" values="118;108;118" dur="8s" repeatCount="indefinite" calcMode="spline" keyTimes="0;0.5;1" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
  </circle>
  <circle cx="238" cy="138" r="1.6" fill="url(#orb-g-spe)">
    <animate attributeName="cy" values="138;128;138" dur="8s" repeatCount="indefinite" calcMode="spline" keyTimes="0;0.5;1" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
  </circle>
  <circle cx="280" cy="170" r="1.6" fill="url(#orb-g-spe)">
    <animate attributeName="cy" values="170;162;170" dur="8s" repeatCount="indefinite" calcMode="spline" keyTimes="0;0.5;1" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
  </circle>
  <circle cx="195" cy="100" r="1.4" fill="url(#orb-g-spe)">
    <animate attributeName="cy" values="100;90;100" dur="8s" repeatCount="indefinite" calcMode="spline" keyTimes="0;0.5;1" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
  </circle>
  <circle cx="155" cy="155" r="1.4" fill="url(#orb-g-spe)">
    <animate attributeName="cy" values="155;145;155" dur="8s" repeatCount="indefinite" calcMode="spline" keyTimes="0;0.5;1" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
  </circle>
</g>

<!-- Lille horisontlinje under -->
<line x1="60" y1="320" x2="320" y2="320" stroke="#8a5878" stroke-width="0.3" opacity="0.4"/>
</svg>
