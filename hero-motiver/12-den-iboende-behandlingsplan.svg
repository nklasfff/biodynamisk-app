<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 80 380 380" role="img" aria-label="Den Iboende Behandlingsplan">
<defs>
<style>
@keyframes core-r { 0%, 100% { r: 36px; } 50% { r: 46px; } }
@keyframes aura-r { 0%, 100% { rx: 158px; ry: 158px; } 50% { rx: 182px; ry: 182px; } }

/* Krumme veje der udfolder sig fra kernen - enden strækker sig længere ud */
@keyframes path-a {
  0%, 100% { d: path("M 210 250 Q 240 200 250 160"); }
  50%     { d: path("M 215 245 Q 260 185 280 130"); }
}
@keyframes path-b {
  0%, 100% { d: path("M 220 270 Q 270 265 300 240"); }
  50%     { d: path("M 225 268 Q 300 260 340 230"); }
}
@keyframes path-c {
  0%, 100% { d: path("M 215 290 Q 250 330 255 365"); }
  50%     { d: path("M 218 295 Q 265 355 280 405"); }
}
@keyframes path-d {
  0%, 100% { d: path("M 170 290 Q 135 330 130 365"); }
  50%     { d: path("M 167 295 Q 120 355 105 405"); }
}
@keyframes path-e {
  0%, 100% { d: path("M 160 270 Q 115 265 85 240"); }
  50%     { d: path("M 155 268 Q 85 260 45 230"); }
}
@keyframes path-f {
  0%, 100% { d: path("M 165 250 Q 140 200 130 160"); }
  50%     { d: path("M 160 245 Q 120 185 105 130"); }
}

.core { animation: core-r 8s ease-in-out infinite; }
.aura { animation: aura-r 8s ease-in-out infinite; }
.p-a { animation: path-a 8s ease-in-out infinite; }
.p-b { animation: path-b 8s ease-in-out infinite; }
.p-c { animation: path-c 8s ease-in-out infinite; }
.p-d { animation: path-d 8s ease-in-out infinite; }
.p-e { animation: path-e 8s ease-in-out infinite; }
.p-f { animation: path-f 8s ease-in-out infinite; }
@media (prefers-reduced-motion: reduce) {
  .core, .aura, .p-a, .p-b, .p-c, .p-d, .p-e, .p-f { animation: none; }
}
</style>
<radialGradient id="well" cx="50%" cy="42%" r="65%">
<stop offset="0%" stop-color="#1f2a35"/>
<stop offset="55%" stop-color="#131a22"/>
<stop offset="100%" stop-color="#0c1218"/>
</radialGradient>
<radialGradient id="core-g" cx="50%" cy="50%" r="50%">
<stop offset="0%" stop-color="#faf4e8" stop-opacity="1"/>
<stop offset="30%" stop-color="#f0e2c8" stop-opacity="0.6"/>
<stop offset="70%" stop-color="#d4b98f" stop-opacity="0.15"/>
<stop offset="100%" stop-color="#c9b8a0" stop-opacity="0"/>
</radialGradient>
<radialGradient id="aura-g" cx="50%" cy="50%" r="50%">
<stop offset="0%" stop-color="#e8dfcf" stop-opacity="0.28"/>
<stop offset="55%" stop-color="#a89880" stop-opacity="0.07"/>
<stop offset="100%" stop-color="#a89880" stop-opacity="0"/>
</radialGradient>
<radialGradient id="plan-line" cx="50%" cy="50%" r="50%">
<stop offset="0%" stop-color="#faf4e8" stop-opacity="1"/>
<stop offset="70%" stop-color="#e8dfcf" stop-opacity="0.6"/>
<stop offset="100%" stop-color="#c9b8a0" stop-opacity="0"/>
</radialGradient>
</defs>

<rect x="0" y="0" width="380" height="640" fill="url(#well)"/>

<ellipse class="aura" cx="190" cy="270" rx="170" ry="170" fill="url(#aura-g)"/>

<g fill="none" stroke="#e8dfcf" stroke-width="0.9" stroke-linecap="round" opacity="0.7">
<path class="p-a" d="M 210 250 Q 240 200 250 160"/>
<path class="p-b" d="M 220 270 Q 270 265 300 240"/>
<path class="p-c" d="M 215 290 Q 250 330 255 365"/>
<path class="p-d" d="M 170 290 Q 135 330 130 365"/>
<path class="p-e" d="M 160 270 Q 115 265 85 240"/>
<path class="p-f" d="M 165 250 Q 140 200 130 160"/>
</g>

<circle class="core" cx="190" cy="270" r="42" fill="url(#core-g)"/>

<line x1="140" y1="520" x2="240" y2="520" stroke="#c9b8a0" stroke-width="0.5" opacity="0.5"/>
<text x="190" y="555" text-anchor="middle" font-family="Cinzel, serif" font-size="12" letter-spacing="4" fill="#f0e2c8" opacity="0.95">DEN IBOENDE BEHANDLINGSPLAN</text>
<text x="190" y="580" text-anchor="middle" font-family="Cormorant Garamond, Georgia, serif" font-size="13" font-style="italic" fill="#c9b8a0" opacity="0.8">kroppens egen visdom</text>
</svg>
