<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 80 380 380" role="img" aria-label="Det Tredje Stadie">
<defs>
<style>
@keyframes core-r { 0%, 100% { r: 32px; } 50% { r: 40px; } }
@keyframes aura-r { 0%, 100% { rx: 158px; ry: 158px; } 50% { rx: 182px; ry: 182px; } }
/* Anden kerne pulserer i SAMME rytme - synkron co-regulering */
@keyframes core2-r { 0%, 100% { r: 28px; } 50% { r: 36px; } }
@keyframes group-breathe {
  0%, 100% { transform: scale(1); }
  50% { transform: scale(1.1); }
}
.core { animation: core-r 8s ease-in-out infinite; }
.core2 { animation: core2-r 8s ease-in-out infinite; }
.aura { animation: aura-r 8s ease-in-out infinite; }
.sg { animation: group-breathe 8s ease-in-out infinite; transform-origin: 190px 270px; transform-box: view-box; }

@media (prefers-reduced-motion: reduce) {
  .core, .core2, .aura, .sg { animation: none; }
}
</style>
<radialGradient id="well" cx="50%" cy="42%" r="65%">
<stop offset="0%" stop-color="#1f2a35"/>
<stop offset="55%" stop-color="#131a22"/>
<stop offset="100%" stop-color="#0c1218"/>
</radialGradient>
<radialGradient id="core-g" cx="50%" cy="50%" r="50%">
<stop offset="0%" stop-color="#fce8ec" stop-opacity="1"/>
<stop offset="30%" stop-color="#e8c4d0" stop-opacity="0.75"/>
<stop offset="70%" stop-color="#b880a0" stop-opacity="0.25"/>
<stop offset="100%" stop-color="#7a5270" stop-opacity="0"/>
</radialGradient>
<radialGradient id="core2-g" cx="50%" cy="50%" r="50%">
<stop offset="0%" stop-color="#fce8ec" stop-opacity="0.9"/>
<stop offset="40%" stop-color="#d8a0b8" stop-opacity="0.55"/>
<stop offset="100%" stop-color="#7a5270" stop-opacity="0"/>
</radialGradient>
<radialGradient id="aura-g" cx="50%" cy="50%" r="50%">
<stop offset="0%" stop-color="#d8a0b8" stop-opacity="0.28"/>
<stop offset="55%" stop-color="#8a5878" stop-opacity="0.08"/>
<stop offset="100%" stop-color="#8a5878" stop-opacity="0"/>
</radialGradient>
</defs>

<rect width="380" height="640" fill="url(#well)"/>
<ellipse class="aura" cx="190" cy="270" rx="170" ry="170" fill="url(#aura-g)"/>

<!-- To kerner i resonans - egen midte + anden (klient) - samme rytme, samme puls.
     Forbundet med en svag mandorla-form der antyder det fælles felt -->
<g class="sg">
  <!-- Det fælles felt - mandorla/overlappende ellipser mellem de to -->
  <ellipse cx="190" cy="270" rx="90" ry="55" stroke="#d8a0b8" stroke-width="0.5" fill="none" opacity="0.35"/>
  <ellipse cx="190" cy="270" rx="112" ry="42" stroke="#d8a0b8" stroke-width="0.4" fill="none" opacity="0.22"/>
  
  <!-- Anden kerne - klient-systemet der er i resonans med egen -->
  <circle class="core2" cx="258" cy="270" r="28" fill="url(#core2-g)"/>
</g>

<!-- Egen kerne - centrum -->
<circle class="core" cx="122" cy="270" r="32" fill="url(#core-g)"/>

<line x1="140" y1="520" x2="240" y2="520" stroke="#7a5270" stroke-width="0.5" opacity="0.55"/>
<text x="190" y="555" text-anchor="middle" font-family="Cinzel, serif" font-size="12" letter-spacing="4" fill="#e8c4d0" opacity="0.95">TREDJE STADIE</text>
<text x="190" y="580" text-anchor="middle" font-family="Cormorant Garamond, Georgia, serif" font-size="13" font-style="italic" fill="#b880a0" opacity="0.85">den relationelle udvidelse</text>
</svg>
