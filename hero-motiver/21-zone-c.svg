<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 80 380 380" role="img" aria-label="Zone C - Det Relationelle Felt">
<defs>
<style>
@keyframes aura-r { 0%, 100% { rx: 168px; ry: 168px; } 50% { rx: 192px; ry: 192px; } }
.aura { animation: aura-r 8s ease-in-out infinite; }
@media (prefers-reduced-motion: reduce) {
  .aura { animation: none; }
}
</style>
<radialGradient id="well" cx="50%" cy="42%" r="65%">
<stop offset="0%" stop-color="#2a3847"/>
<stop offset="55%" stop-color="#1d2731"/>
<stop offset="100%" stop-color="#141b22"/>
</radialGradient>
<radialGradient id="core-g" cx="50%" cy="50%" r="50%">
<stop offset="0%" stop-color="#f2f7fb" stop-opacity="1"/>
<stop offset="30%" stop-color="#c4d0dc" stop-opacity="0.7"/>
<stop offset="70%" stop-color="#8fa3b8" stop-opacity="0.2"/>
<stop offset="100%" stop-color="#5e748a" stop-opacity="0"/>
</radialGradient>
<radialGradient id="side-g" cx="50%" cy="50%" r="50%">
<stop offset="0%" stop-color="#f2f7fb" stop-opacity="0.8"/>
<stop offset="40%" stop-color="#c4d0dc" stop-opacity="0.45"/>
<stop offset="100%" stop-color="#5e748a" stop-opacity="0"/>
</radialGradient>
<radialGradient id="aura-g" cx="50%" cy="50%" r="50%">
<stop offset="0%" stop-color="#b8c5d3" stop-opacity="0.25"/>
<stop offset="55%" stop-color="#7a8b9c" stop-opacity="0.07"/>
<stop offset="100%" stop-color="#7a8b9c" stop-opacity="0"/>
</radialGradient>
<radialGradient id="vesica-g" cx="50%" cy="50%" r="50%">
<stop offset="0%" stop-color="#f2f7fb" stop-opacity="0.7"/>
<stop offset="60%" stop-color="#c4d0dc" stop-opacity="0.35"/>
<stop offset="100%" stop-color="#7a8b9c" stop-opacity="0"/>
</radialGradient>
<radialGradient id="field-fill" cx="50%" cy="50%" r="60%">
<stop offset="0%" stop-color="#c4d0dc" stop-opacity="0.08"/>
<stop offset="100%" stop-color="#7a8b9c" stop-opacity="0"/>
</radialGradient>
</defs>

<rect x="0" y="0" width="380" height="640" fill="url(#well)"/>

<ellipse class="aura" cx="190" cy="280" rx="180" ry="170" fill="url(#aura-g)"/>

<!-- VENSTRE: to felter tæt på hinanden men IKKE overlappende - mødet er ikke sket endnu -->
<g transform="translate(65, 280)">
  <circle cx="0" cy="-24" r="18" stroke="#c4d0dc" stroke-width="0.55" fill="url(#field-fill)" opacity="0.5">
    <animate attributeName="r" values="18;21;18" dur="8s" repeatCount="indefinite" calcMode="spline" keyTimes="0;0.5;1" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
    <animate attributeName="cy" values="-24;-27;-24" dur="8s" repeatCount="indefinite" calcMode="spline" keyTimes="0;0.5;1" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
  </circle>
  <circle cx="0" cy="-24" r="6" fill="url(#side-g)">
    <animate attributeName="r" values="6;7.5;6" dur="8s" repeatCount="indefinite" calcMode="spline" keyTimes="0;0.5;1" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
    <animate attributeName="cy" values="-24;-27;-24" dur="8s" repeatCount="indefinite" calcMode="spline" keyTimes="0;0.5;1" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
  </circle>
  <circle cx="0" cy="24" r="18" stroke="#c4d0dc" stroke-width="0.55" fill="url(#field-fill)" opacity="0.5">
    <animate attributeName="r" values="18;21;18" dur="8s" repeatCount="indefinite" calcMode="spline" keyTimes="0;0.5;1" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
    <animate attributeName="cy" values="24;27;24" dur="8s" repeatCount="indefinite" calcMode="spline" keyTimes="0;0.5;1" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
  </circle>
  <circle cx="0" cy="24" r="6" fill="url(#side-g)">
    <animate attributeName="r" values="6;7.5;6" dur="8s" repeatCount="indefinite" calcMode="spline" keyTimes="0;0.5;1" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
    <animate attributeName="cy" values="24;27;24" dur="8s" repeatCount="indefinite" calcMode="spline" keyTimes="0;0.5;1" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
  </circle>
</g>

<!-- MIDTEN: to felter der overlapper - SKALERET NED: max radius 62 ved indånding (som Zone D) -->
<g transform="translate(190, 270)">
  <!-- Venstre felt: cx=-20, r=40 (max r=50, cx=-24) => yderste kant x = -74, indenfor max 62+12 -->
  <!-- Egentlig: cx=-20, r=40 => yderste = -60. Ved indånding cx=-24, r=48 => yderste = -72. Stadig OK -->
  <circle cx="-20" cy="0" r="40" stroke="#c4d0dc" stroke-width="0.55" fill="url(#field-fill)" opacity="0.6">
    <animate attributeName="r" values="40;48;40" dur="8s" repeatCount="indefinite" calcMode="spline" keyTimes="0;0.5;1" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
    <animate attributeName="cx" values="-20;-24;-20" dur="8s" repeatCount="indefinite" calcMode="spline" keyTimes="0;0.5;1" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
  </circle>
  
  <!-- Højre felt -->
  <circle cx="20" cy="0" r="40" stroke="#c4d0dc" stroke-width="0.55" fill="url(#field-fill)" opacity="0.6">
    <animate attributeName="r" values="40;48;40" dur="8s" repeatCount="indefinite" calcMode="spline" keyTimes="0;0.5;1" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
    <animate attributeName="cx" values="20;24;20" dur="8s" repeatCount="indefinite" calcMode="spline" keyTimes="0;0.5;1" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
  </circle>
  
  <!-- Vesica piscis i overlap - det fælles felt -->
  <ellipse cx="0" cy="0" rx="14" ry="40" fill="url(#vesica-g)" opacity="0.8">
    <animate attributeName="rx" values="14;18;14" dur="8s" repeatCount="indefinite" calcMode="spline" keyTimes="0;0.5;1" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
    <animate attributeName="ry" values="40;48;40" dur="8s" repeatCount="indefinite" calcMode="spline" keyTimes="0;0.5;1" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
  </ellipse>
  
  <!-- De to kerner -->
  <ellipse cx="-20" cy="0" rx="11" ry="24" fill="url(#core-g)" opacity="0.9">
    <animate attributeName="rx" values="11;14;11" dur="8s" repeatCount="indefinite" calcMode="spline" keyTimes="0;0.5;1" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
    <animate attributeName="ry" values="24;30;24" dur="8s" repeatCount="indefinite" calcMode="spline" keyTimes="0;0.5;1" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
    <animate attributeName="cx" values="-20;-24;-20" dur="8s" repeatCount="indefinite" calcMode="spline" keyTimes="0;0.5;1" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
  </ellipse>
  <ellipse cx="20" cy="0" rx="11" ry="24" fill="url(#core-g)" opacity="0.9">
    <animate attributeName="rx" values="11;14;11" dur="8s" repeatCount="indefinite" calcMode="spline" keyTimes="0;0.5;1" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
    <animate attributeName="ry" values="24;30;24" dur="8s" repeatCount="indefinite" calcMode="spline" keyTimes="0;0.5;1" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
    <animate attributeName="cx" values="20;24;20" dur="8s" repeatCount="indefinite" calcMode="spline" keyTimes="0;0.5;1" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
  </ellipse>
</g>

<!-- HØJRE: opløst i større felt -->
<g transform="translate(315, 280)">
  <ellipse cx="0" cy="0" rx="38" ry="52" stroke="#c4d0dc" stroke-width="0.55" fill="url(#field-fill)" opacity="0.6">
    <animate attributeName="rx" values="38;46;38" dur="8s" repeatCount="indefinite" calcMode="spline" keyTimes="0;0.5;1" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
    <animate attributeName="ry" values="52;62;52" dur="8s" repeatCount="indefinite" calcMode="spline" keyTimes="0;0.5;1" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
  </ellipse>
  <circle cx="0" cy="-18" r="13" stroke="#c4d0dc" stroke-width="0.35" fill="none" opacity="0.35">
    <animate attributeName="r" values="13;16;13" dur="8s" repeatCount="indefinite" calcMode="spline" keyTimes="0;0.5;1" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
  </circle>
  <circle cx="0" cy="-18" r="5" fill="url(#side-g)" opacity="0.7">
    <animate attributeName="r" values="5;6.5;5" dur="8s" repeatCount="indefinite" calcMode="spline" keyTimes="0;0.5;1" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
  </circle>
  <circle cx="0" cy="18" r="13" stroke="#c4d0dc" stroke-width="0.35" fill="none" opacity="0.35">
    <animate attributeName="r" values="13;16;13" dur="8s" repeatCount="indefinite" calcMode="spline" keyTimes="0;0.5;1" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
  </circle>
  <circle cx="0" cy="18" r="5" fill="url(#side-g)" opacity="0.7">
    <animate attributeName="r" values="5;6.5;5" dur="8s" repeatCount="indefinite" calcMode="spline" keyTimes="0;0.5;1" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
  </circle>
</g>

<line x1="100" y1="280" x2="135" y2="275" stroke="#7a8b9c" stroke-width="0.3" opacity="0.4"/>
<line x1="245" y1="275" x2="280" y2="280" stroke="#7a8b9c" stroke-width="0.3" opacity="0.4"/>

<line x1="140" y1="520" x2="240" y2="520" stroke="#7a8b9c" stroke-width="0.5" opacity="0.55"/>
<text x="190" y="555" text-anchor="middle" font-family="Cinzel, serif" font-size="12" letter-spacing="4" fill="#c4d0dc" opacity="0.95">ZONE C</text>
<text x="190" y="580" text-anchor="middle" font-family="Cormorant Garamond, Georgia, serif" font-size="13" font-style="italic" fill="#8fa3b8" opacity="0.9">det relationelle felt</text>
</svg>
