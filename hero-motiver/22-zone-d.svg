<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 80 380 380" role="img" aria-label="Zone D - The Long Tide">
<defs>
<style>
@keyframes core-rx { 0%, 100% { rx: 28px; ry: 58px; } 50% { rx: 34px; ry: 70px; } }
@keyframes aura-r { 0%, 100% { rx: 168px; ry: 168px; } 50% { rx: 192px; ry: 192px; } }
.core { animation: core-rx 8s ease-in-out infinite; }
.aura { animation: aura-r 8s ease-in-out infinite; }
@media (prefers-reduced-motion: reduce) {
  .core, .aura { animation: none; }
}
</style>
<radialGradient id="well" cx="50%" cy="42%" r="65%">
<stop offset="0%" stop-color="#2a3847"/>
<stop offset="55%" stop-color="#1d2731"/>
<stop offset="100%" stop-color="#141b22"/>
</radialGradient>
<radialGradient id="core-g" cx="50%" cy="50%" r="50%">
<stop offset="0%" stop-color="#f2f7fb" stop-opacity="1"/>
<stop offset="30%" stop-color="#c4d0dc" stop-opacity="0.7"/>
<stop offset="70%" stop-color="#8fa3b8" stop-opacity="0.2"/>
<stop offset="100%" stop-color="#5e748a" stop-opacity="0"/>
</radialGradient>
<radialGradient id="side-g" cx="50%" cy="50%" r="50%">
<stop offset="0%" stop-color="#f2f7fb" stop-opacity="0.85"/>
<stop offset="40%" stop-color="#c4d0dc" stop-opacity="0.5"/>
<stop offset="100%" stop-color="#5e748a" stop-opacity="0"/>
</radialGradient>
<radialGradient id="aura-g" cx="50%" cy="50%" r="50%">
<stop offset="0%" stop-color="#b8c5d3" stop-opacity="0.25"/>
<stop offset="55%" stop-color="#7a8b9c" stop-opacity="0.07"/>
<stop offset="100%" stop-color="#7a8b9c" stop-opacity="0"/>
</radialGradient>
</defs>

<rect x="0" y="0" width="380" height="640" fill="url(#well)"/>

<ellipse class="aura" cx="190" cy="280" rx="180" ry="170" fill="url(#aura-g)"/>

<!-- VENSTRE: det relationelle felt båret af én langsom bevægelse - tydeligere åndedrag -->
<g transform="translate(65, 280)">
  <!-- Horisontale bærelinjer - strækker sig tydeligt ud -->
  <line x1="-32" y1="-38" x2="32" y2="-38" stroke="#c4d0dc" stroke-width="0.45" opacity="0.5">
    <animate attributeName="x1" values="-32;-42;-32" dur="8s" repeatCount="indefinite" calcMode="spline" keyTimes="0;0.5;1" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
    <animate attributeName="x2" values="32;42;32" dur="8s" repeatCount="indefinite" calcMode="spline" keyTimes="0;0.5;1" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
  </line>
  <line x1="-32" y1="38" x2="32" y2="38" stroke="#c4d0dc" stroke-width="0.45" opacity="0.5">
    <animate attributeName="x1" values="-32;-42;-32" dur="8s" repeatCount="indefinite" calcMode="spline" keyTimes="0;0.5;1" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
    <animate attributeName="x2" values="32;42;32" dur="8s" repeatCount="indefinite" calcMode="spline" keyTimes="0;0.5;1" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
  </line>
  <!-- De to kerner ånder tydeligt -->
  <circle cx="0" cy="-18" r="10" fill="url(#side-g)" opacity="0.8">
    <animate attributeName="r" values="10;13;10" dur="8s" repeatCount="indefinite" calcMode="spline" keyTimes="0;0.5;1" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
  </circle>
  <circle cx="0" cy="18" r="10" fill="url(#side-g)" opacity="0.8">
    <animate attributeName="r" values="10;13;10" dur="8s" repeatCount="indefinite" calcMode="spline" keyTimes="0;0.5;1" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
  </circle>
  <!-- Omfavnende ring - udvider sig tydeligt -->
  <ellipse cx="0" cy="0" rx="34" ry="52" stroke="#c4d0dc" stroke-width="0.4" fill="none" opacity="0.4">
    <animate attributeName="rx" values="34;42;34" dur="8s" repeatCount="indefinite" calcMode="spline" keyTimes="0;0.5;1" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
    <animate attributeName="ry" values="52;64;52" dur="8s" repeatCount="indefinite" calcMode="spline" keyTimes="0;0.5;1" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
  </ellipse>
</g>

<!-- MIDTEN: The Long Tide - stråler der ankommer mod kernen, tydelig længde-animation -->
<g transform="translate(190, 270)">
  <!-- 4 kardinale stråler: strækker sig synligt fra horisonten -->
  <line x1="0" y1="-62" x2="0" y2="-40" stroke="#c4d0dc" stroke-width="0.6" opacity="0.65">
    <animate attributeName="y1" values="-62;-78;-62" dur="8s" repeatCount="indefinite" calcMode="spline" keyTimes="0;0.5;1" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
  </line>
  <line x1="0" y1="40" x2="0" y2="62" stroke="#c4d0dc" stroke-width="0.6" opacity="0.65">
    <animate attributeName="y2" values="62;78;62" dur="8s" repeatCount="indefinite" calcMode="spline" keyTimes="0;0.5;1" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
  </line>
  <line x1="-62" y1="0" x2="-30" y2="0" stroke="#c4d0dc" stroke-width="0.6" opacity="0.65">
    <animate attributeName="x1" values="-62;-78;-62" dur="8s" repeatCount="indefinite" calcMode="spline" keyTimes="0;0.5;1" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
  </line>
  <line x1="30" y1="0" x2="62" y2="0" stroke="#c4d0dc" stroke-width="0.6" opacity="0.65">
    <animate attributeName="x2" values="62;78;62" dur="8s" repeatCount="indefinite" calcMode="spline" keyTimes="0;0.5;1" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
  </line>
  
  <!-- 4 diagonale stråler: strækker sig tydeligt -->
  <line x1="-42" y1="-42" x2="-22" y2="-22" stroke="#c4d0dc" stroke-width="0.55" opacity="0.6">
    <animate attributeName="x1" values="-42;-54;-42" dur="8s" repeatCount="indefinite" calcMode="spline" keyTimes="0;0.5;1" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
    <animate attributeName="y1" values="-42;-54;-42" dur="8s" repeatCount="indefinite" calcMode="spline" keyTimes="0;0.5;1" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
  </line>
  <line x1="42" y1="-42" x2="22" y2="-22" stroke="#c4d0dc" stroke-width="0.55" opacity="0.6">
    <animate attributeName="x1" values="42;54;42" dur="8s" repeatCount="indefinite" calcMode="spline" keyTimes="0;0.5;1" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
    <animate attributeName="y1" values="-42;-54;-42" dur="8s" repeatCount="indefinite" calcMode="spline" keyTimes="0;0.5;1" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
  </line>
  <line x1="-42" y1="42" x2="-22" y2="22" stroke="#c4d0dc" stroke-width="0.55" opacity="0.6">
    <animate attributeName="x1" values="-42;-54;-42" dur="8s" repeatCount="indefinite" calcMode="spline" keyTimes="0;0.5;1" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
    <animate attributeName="y1" values="42;54;42" dur="8s" repeatCount="indefinite" calcMode="spline" keyTimes="0;0.5;1" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
  </line>
  <line x1="42" y1="42" x2="22" y2="22" stroke="#c4d0dc" stroke-width="0.55" opacity="0.6">
    <animate attributeName="x1" values="42;54;42" dur="8s" repeatCount="indefinite" calcMode="spline" keyTimes="0;0.5;1" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
    <animate attributeName="y1" values="42;54;42" dur="8s" repeatCount="indefinite" calcMode="spline" keyTimes="0;0.5;1" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
  </line>
  
  <ellipse class="core" cx="0" cy="0" rx="28" ry="58" fill="url(#core-g)"/>
</g>

<!-- HØJRE: bevægelsen konvergerer - tydelig åndedrag -->
<g transform="translate(315, 280)">
  <!-- Stråler trækker sig ind mod kernen ved indånding -->
  <line x1="0" y1="-38" x2="0" y2="-14" stroke="#c4d0dc" stroke-width="0.55" opacity="0.55">
    <animate attributeName="y1" values="-38;-30;-38" dur="8s" repeatCount="indefinite" calcMode="spline" keyTimes="0;0.5;1" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
    <animate attributeName="opacity" values="0.55;0.3;0.55" dur="8s" repeatCount="indefinite" calcMode="spline" keyTimes="0;0.5;1" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
  </line>
  <line x1="0" y1="14" x2="0" y2="38" stroke="#c4d0dc" stroke-width="0.55" opacity="0.55">
    <animate attributeName="y2" values="38;30;38" dur="8s" repeatCount="indefinite" calcMode="spline" keyTimes="0;0.5;1" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
    <animate attributeName="opacity" values="0.55;0.3;0.55" dur="8s" repeatCount="indefinite" calcMode="spline" keyTimes="0;0.5;1" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
  </line>
  <line x1="-38" y1="0" x2="-16" y2="0" stroke="#c4d0dc" stroke-width="0.55" opacity="0.55">
    <animate attributeName="x1" values="-38;-30;-38" dur="8s" repeatCount="indefinite" calcMode="spline" keyTimes="0;0.5;1" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
    <animate attributeName="opacity" values="0.55;0.3;0.55" dur="8s" repeatCount="indefinite" calcMode="spline" keyTimes="0;0.5;1" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
  </line>
  <line x1="16" y1="0" x2="38" y2="0" stroke="#c4d0dc" stroke-width="0.55" opacity="0.55">
    <animate attributeName="x2" values="38;30;38" dur="8s" repeatCount="indefinite" calcMode="spline" keyTimes="0;0.5;1" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
    <animate attributeName="opacity" values="0.55;0.3;0.55" dur="8s" repeatCount="indefinite" calcMode="spline" keyTimes="0;0.5;1" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
  </line>
  
  <!-- Stilhedens stiplede ring - pulserer tydeligt -->
  <circle cx="0" cy="0" r="45" stroke="#c4d0dc" stroke-width="0.35" fill="none" opacity="0.35" stroke-dasharray="1 3">
    <animate attributeName="r" values="45;52;45" dur="8s" repeatCount="indefinite" calcMode="spline" keyTimes="0;0.5;1" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
    <animate attributeName="opacity" values="0.35;0.55;0.35" dur="8s" repeatCount="indefinite" calcMode="spline" keyTimes="0;0.5;1" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
  </circle>
  
  <!-- Kernen ånder tydeligt -->
  <ellipse cx="0" cy="0" rx="14" ry="28" fill="url(#side-g)">
    <animate attributeName="rx" values="14;17;14" dur="8s" repeatCount="indefinite" calcMode="spline" keyTimes="0;0.5;1" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
    <animate attributeName="ry" values="28;34;28" dur="8s" repeatCount="indefinite" calcMode="spline" keyTimes="0;0.5;1" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
  </ellipse>
</g>

<line x1="100" y1="280" x2="135" y2="275" stroke="#7a8b9c" stroke-width="0.3" opacity="0.4"/>
<line x1="245" y1="275" x2="280" y2="280" stroke="#7a8b9c" stroke-width="0.3" opacity="0.4"/>

<line x1="140" y1="520" x2="240" y2="520" stroke="#7a8b9c" stroke-width="0.5" opacity="0.55"/>
<text x="190" y="555" text-anchor="middle" font-family="Cinzel, serif" font-size="12" letter-spacing="4" fill="#c4d0dc" opacity="0.95">ZONE D</text>
<text x="190" y="580" text-anchor="middle" font-family="Cormorant Garamond, Georgia, serif" font-size="13" font-style="italic" fill="#8fa3b8" opacity="0.9">the long tide</text>
</svg>
