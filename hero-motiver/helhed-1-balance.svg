<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 380 380" role="img" aria-label="Helheden i balance">
<defs>
<radialGradient id="well-h1" cx="50%" cy="50%" r="65%">
<stop offset="0%" stop-color="#2a3847"/>
<stop offset="55%" stop-color="#1d2731"/>
<stop offset="100%" stop-color="#141b22"/>
</radialGradient>
<radialGradient id="core-g-h1" cx="50%" cy="50%" r="50%">
<stop offset="0%" stop-color="#faf4e8" stop-opacity="1"/>
<stop offset="30%" stop-color="#f0e2c8" stop-opacity="0.6"/>
<stop offset="70%" stop-color="#d4b98f" stop-opacity="0.15"/>
<stop offset="100%" stop-color="#c9b8a0" stop-opacity="0"/>
</radialGradient>
<radialGradient id="orb-g-h1" cx="50%" cy="50%" r="50%">
<stop offset="0%" stop-color="#faf4e8" stop-opacity="0.85"/>
<stop offset="40%" stop-color="#f0e2c8" stop-opacity="0.5"/>
<stop offset="100%" stop-color="#c9b8a0" stop-opacity="0"/>
</radialGradient>
<radialGradient id="aura-g-h1" cx="50%" cy="50%" r="50%">
<stop offset="0%" stop-color="#e8dfcf" stop-opacity="0.28"/>
<stop offset="55%" stop-color="#a89880" stop-opacity="0.07"/>
<stop offset="100%" stop-color="#a89880" stop-opacity="0"/>
</radialGradient>
</defs>

<rect x="0" y="0" width="380" height="380" fill="url(#well-h1)"/>

<!-- Aura ånder synkront -->
<ellipse cx="190" cy="190" rx="140" ry="140" fill="url(#aura-g-h1)">
  <animate attributeName="rx" values="140;172;140" dur="8s" repeatCount="indefinite" calcMode="spline" keyTimes="0;0.5;1" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
  <animate attributeName="ry" values="140;172;140" dur="8s" repeatCount="indefinite" calcMode="spline" keyTimes="0;0.5;1" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
</ellipse>

<!-- Helheds-ringen vokser/mindskes -->
<circle cx="190" cy="190" r="128" stroke="#e8dfcf" stroke-width="0.5" fill="none" opacity="0.35">
  <animate attributeName="r" values="128;150;128" dur="8s" repeatCount="indefinite" calcMode="spline" keyTimes="0;0.5;1" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
</circle>

<!-- 5 forbindelseslinjer — ender ekspanderer/trækker sig sammen -->
<line x1="190" y1="190" x2="190" y2="60" stroke="#a89880" stroke-width="0.4" opacity="0.4">
  <animate attributeName="y2" values="60;40;60" dur="8s" repeatCount="indefinite" calcMode="spline" keyTimes="0;0.5;1" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
</line>
<line x1="190" y1="190" x2="313.6" y2="149.8" stroke="#a89880" stroke-width="0.4" opacity="0.4">
  <animate attributeName="x2" values="313.6;334;313.6" dur="8s" repeatCount="indefinite" calcMode="spline" keyTimes="0;0.5;1" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
  <animate attributeName="y2" values="149.8;143;149.8" dur="8s" repeatCount="indefinite" calcMode="spline" keyTimes="0;0.5;1" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
</line>
<line x1="190" y1="190" x2="266.4" y2="295.2" stroke="#a89880" stroke-width="0.4" opacity="0.4">
  <animate attributeName="x2" values="266.4;279;266.4" dur="8s" repeatCount="indefinite" calcMode="spline" keyTimes="0;0.5;1" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
  <animate attributeName="y2" values="295.2;313;295.2" dur="8s" repeatCount="indefinite" calcMode="spline" keyTimes="0;0.5;1" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
</line>
<line x1="190" y1="190" x2="113.6" y2="295.2" stroke="#a89880" stroke-width="0.4" opacity="0.4">
  <animate attributeName="x2" values="113.6;101;113.6" dur="8s" repeatCount="indefinite" calcMode="spline" keyTimes="0;0.5;1" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
  <animate attributeName="y2" values="295.2;313;295.2" dur="8s" repeatCount="indefinite" calcMode="spline" keyTimes="0;0.5;1" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
</line>
<line x1="190" y1="190" x2="66.4" y2="149.8" stroke="#a89880" stroke-width="0.4" opacity="0.4">
  <animate attributeName="x2" values="66.4;46;66.4" dur="8s" repeatCount="indefinite" calcMode="spline" keyTimes="0;0.5;1" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
  <animate attributeName="y2" values="149.8;143;149.8" dur="8s" repeatCount="indefinite" calcMode="spline" keyTimes="0;0.5;1" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
</line>

<!-- 5 orbs — bevæger sig udad på pentagon + pulserer -->
<ellipse cx="190" cy="60" rx="9" ry="12" fill="url(#orb-g-h1)">
  <animate attributeName="cy" values="60;40;60" dur="8s" repeatCount="indefinite" calcMode="spline" keyTimes="0;0.5;1" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
  <animate attributeName="rx" values="9;14;9" dur="8s" repeatCount="indefinite" calcMode="spline" keyTimes="0;0.5;1" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
  <animate attributeName="ry" values="12;18;12" dur="8s" repeatCount="indefinite" calcMode="spline" keyTimes="0;0.5;1" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
</ellipse>
<ellipse cx="313.6" cy="149.8" rx="9" ry="12" fill="url(#orb-g-h1)">
  <animate attributeName="cx" values="313.6;334;313.6" dur="8s" repeatCount="indefinite" calcMode="spline" keyTimes="0;0.5;1" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
  <animate attributeName="cy" values="149.8;143;149.8" dur="8s" repeatCount="indefinite" calcMode="spline" keyTimes="0;0.5;1" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
  <animate attributeName="rx" values="9;14;9" dur="8s" repeatCount="indefinite" calcMode="spline" keyTimes="0;0.5;1" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
  <animate attributeName="ry" values="12;18;12" dur="8s" repeatCount="indefinite" calcMode="spline" keyTimes="0;0.5;1" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
</ellipse>
<ellipse cx="266.4" cy="295.2" rx="9" ry="12" fill="url(#orb-g-h1)">
  <animate attributeName="cx" values="266.4;279;266.4" dur="8s" repeatCount="indefinite" calcMode="spline" keyTimes="0;0.5;1" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
  <animate attributeName="cy" values="295.2;313;295.2" dur="8s" repeatCount="indefinite" calcMode="spline" keyTimes="0;0.5;1" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
  <animate attributeName="rx" values="9;14;9" dur="8s" repeatCount="indefinite" calcMode="spline" keyTimes="0;0.5;1" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
  <animate attributeName="ry" values="12;18;12" dur="8s" repeatCount="indefinite" calcMode="spline" keyTimes="0;0.5;1" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
</ellipse>
<ellipse cx="113.6" cy="295.2" rx="9" ry="12" fill="url(#orb-g-h1)">
  <animate attributeName="cx" values="113.6;101;113.6" dur="8s" repeatCount="indefinite" calcMode="spline" keyTimes="0;0.5;1" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
  <animate attributeName="cy" values="295.2;313;295.2" dur="8s" repeatCount="indefinite" calcMode="spline" keyTimes="0;0.5;1" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
  <animate attributeName="rx" values="9;14;9" dur="8s" repeatCount="indefinite" calcMode="spline" keyTimes="0;0.5;1" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
  <animate attributeName="ry" values="12;18;12" dur="8s" repeatCount="indefinite" calcMode="spline" keyTimes="0;0.5;1" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
</ellipse>
<ellipse cx="66.4" cy="149.8" rx="9" ry="12" fill="url(#orb-g-h1)">
  <animate attributeName="cx" values="66.4;46;66.4" dur="8s" repeatCount="indefinite" calcMode="spline" keyTimes="0;0.5;1" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
  <animate attributeName="cy" values="149.8;143;149.8" dur="8s" repeatCount="indefinite" calcMode="spline" keyTimes="0;0.5;1" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
  <animate attributeName="rx" values="9;14;9" dur="8s" repeatCount="indefinite" calcMode="spline" keyTimes="0;0.5;1" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
  <animate attributeName="ry" values="12;18;12" dur="8s" repeatCount="indefinite" calcMode="spline" keyTimes="0;0.5;1" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
</ellipse>

<!-- Central kerne pulserer -->
<ellipse cx="190" cy="190" rx="26" ry="34" fill="url(#core-g-h1)">
  <animate attributeName="rx" values="26;34;26" dur="8s" repeatCount="indefinite" calcMode="spline" keyTimes="0;0.5;1" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
  <animate attributeName="ry" values="34;46;34" dur="8s" repeatCount="indefinite" calcMode="spline" keyTimes="0;0.5;1" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
</ellipse>
</svg>
