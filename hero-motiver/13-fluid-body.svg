<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 380 640" role="img" aria-label="Fluid Body">
<defs>
<style>
@keyframes core-r { 0%, 100% { r: 36px; } 50% { r: 46px; } }
@keyframes aura-r { 0%, 100% { rx: 158px; ry: 158px; } 50% { rx: 182px; ry: 182px; } }

/* Ovale konturer der følger kroppens form - fyldes og tømmes */
@keyframes oval-a { 0%, 100% { rx: 55px; ry: 115px; } 50% { rx: 65px; ry: 135px; } }
@keyframes oval-b { 0%, 100% { rx: 72px; ry: 138px; } 50% { rx: 84px; ry: 158px; } }
@keyframes oval-c { 0%, 100% { rx: 90px; ry: 162px; } 50% { rx: 104px; ry: 182px; } }
@keyframes oval-d { 0%, 100% { rx: 108px; ry: 185px; } 50% { rx: 124px; ry: 205px; } }

.core { animation: core-r 8s ease-in-out infinite; }
.aura { animation: aura-r 8s ease-in-out infinite; }
.o-a { animation: oval-a 8s ease-in-out infinite; }
.o-b { animation: oval-b 8s ease-in-out infinite; }
.o-c { animation: oval-c 8s ease-in-out infinite; }
.o-d { animation: oval-d 8s ease-in-out infinite; }
@media (prefers-reduced-motion: reduce) {
  .core, .aura, .o-a, .o-b, .o-c, .o-d { animation: none; }
}
</style>
<radialGradient id="well" cx="50%" cy="42%" r="65%">
<stop offset="0%" stop-color="#2a3847"/>
<stop offset="55%" stop-color="#1d2731"/>
<stop offset="100%" stop-color="#141b22"/>
</radialGradient>
<radialGradient id="core-g" cx="50%" cy="50%" r="50%">
<stop offset="0%" stop-color="#faf4e8" stop-opacity="1"/>
<stop offset="30%" stop-color="#f0e2c8" stop-opacity="0.6"/>
<stop offset="70%" stop-color="#d4b98f" stop-opacity="0.15"/>
<stop offset="100%" stop-color="#c9b8a0" stop-opacity="0"/>
</radialGradient>
<radialGradient id="aura-g" cx="50%" cy="50%" r="50%">
<stop offset="0%" stop-color="#e8dfcf" stop-opacity="0.28"/>
<stop offset="55%" stop-color="#a89880" stop-opacity="0.07"/>
<stop offset="100%" stop-color="#a89880" stop-opacity="0"/>
</radialGradient>
<radialGradient id="fluid-fill" cx="50%" cy="50%" r="60%">
<stop offset="0%" stop-color="#e8dfcf" stop-opacity="0.15"/>
<stop offset="50%" stop-color="#c9b8a0" stop-opacity="0.05"/>
<stop offset="100%" stop-color="#a89880" stop-opacity="0"/>
</radialGradient>
</defs>

<rect x="0" y="0" width="380" height="640" fill="url(#well)"/>

<ellipse class="aura" cx="190" cy="270" rx="170" ry="170" fill="url(#aura-g)"/>

<!-- Ovale konturer der følger kroppens lodrette form - koncentriske lag af væske -->
<ellipse class="o-d" cx="190" cy="270" rx="108" ry="185" stroke="#e8dfcf" stroke-width="0.55" fill="none" opacity="0.35"/>
<ellipse class="o-c" cx="190" cy="270" rx="90" ry="162" stroke="#e8dfcf" stroke-width="0.6" fill="url(#fluid-fill)" opacity="0.5"/>
<ellipse class="o-b" cx="190" cy="270" rx="72" ry="138" stroke="#e8dfcf" stroke-width="0.65" fill="none" opacity="0.6"/>
<ellipse class="o-a" cx="190" cy="270" rx="55" ry="115" stroke="#e8dfcf" stroke-width="0.7" fill="none" opacity="0.75"/>

<circle class="core" cx="190" cy="270" r="42" fill="url(#core-g)"/>

<line x1="140" y1="520" x2="240" y2="520" stroke="#c9b8a0" stroke-width="0.5" opacity="0.5"/>
<text x="190" y="555" text-anchor="middle" font-family="Cinzel, serif" font-size="12" letter-spacing="4" fill="#f0e2c8" opacity="0.95">FLUID BODY</text>
<text x="190" y="580" text-anchor="middle" font-family="Cormorant Garamond, Georgia, serif" font-size="13" font-style="italic" fill="#c9b8a0" opacity="0.8">kroppens væskefelt</text>
</svg>
