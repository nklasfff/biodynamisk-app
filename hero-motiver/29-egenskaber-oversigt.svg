<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 80 380 380" role="img" aria-label="De 8 Essentielle Egenskaber">
<defs>
<style>
@keyframes core-r { 0%, 100% { r: 36px; } 50% { r: 46px; } }
@keyframes aura-r { 0%, 100% { rx: 158px; ry: 158px; } 50% { rx: 182px; ry: 182px; } }
@keyframes ring-r { 0%, 100% { r: 118px; } 50% { r: 138px; } }
.core { animation: core-r 8s ease-in-out infinite; }
.aura { animation: aura-r 8s ease-in-out infinite; }
.ring { animation: ring-r 8s ease-in-out infinite; }
@media (prefers-reduced-motion: reduce) {
  .core, .aura, .ring { animation: none; }
}
</style>
<radialGradient id="well" cx="50%" cy="42%" r="65%">
<stop offset="0%" stop-color="#2a3847"/>
<stop offset="55%" stop-color="#1d2731"/>
<stop offset="100%" stop-color="#141b22"/>
</radialGradient>
<!-- Egenskabs-seriens farvepalet: perle-silver -->
<radialGradient id="core-g" cx="50%" cy="50%" r="50%">
<stop offset="0%" stop-color="#f5f2ee" stop-opacity="1"/>
<stop offset="30%" stop-color="#d8d2c8" stop-opacity="0.7"/>
<stop offset="70%" stop-color="#a89e92" stop-opacity="0.2"/>
<stop offset="100%" stop-color="#7a7168" stop-opacity="0"/>
</radialGradient>
<radialGradient id="aura-g" cx="50%" cy="50%" r="50%">
<stop offset="0%" stop-color="#d8d2c8" stop-opacity="0.28"/>
<stop offset="55%" stop-color="#a89e92" stop-opacity="0.07"/>
<stop offset="100%" stop-color="#a89e92" stop-opacity="0"/>
</radialGradient>
<radialGradient id="dot-g" cx="50%" cy="50%" r="50%">
<stop offset="0%" stop-color="#f5f2ee" stop-opacity="1"/>
<stop offset="50%" stop-color="#d8d2c8" stop-opacity="0.7"/>
<stop offset="100%" stop-color="#a89e92" stop-opacity="0"/>
</radialGradient>
</defs>

<rect x="0" y="0" width="380" height="640" fill="url(#well)"/>

<ellipse class="aura" cx="190" cy="270" rx="170" ry="170" fill="url(#aura-g)"/>

<!-- Fine radiale linjer fra kernen til hvert punkt - de otte kvaliteter som stråler der modnes -->
<!-- Linjerne vokser synligt ud sammen med ringen -->
<g stroke="#d8d2c8" stroke-width="0.35" opacity="0.35">
  <line x1="190" y1="308" x2="190" y2="152">
    <animate attributeName="y2" values="152;132;152" dur="8s" repeatCount="indefinite" calcMode="spline" keyTimes="0;0.5;1" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
  </line>
  <line x1="217" y1="297" x2="273.4" y2="186.6">
    <animate attributeName="x2" values="273.4;287.6;273.4" dur="8s" repeatCount="indefinite" calcMode="spline" keyTimes="0;0.5;1" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
    <animate attributeName="y2" values="186.6;172.4;186.6" dur="8s" repeatCount="indefinite" calcMode="spline" keyTimes="0;0.5;1" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
  </line>
  <line x1="228" y1="270" x2="308" y2="270">
    <animate attributeName="x2" values="308;328;308" dur="8s" repeatCount="indefinite" calcMode="spline" keyTimes="0;0.5;1" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
  </line>
  <line x1="217" y1="243" x2="273.4" y2="353.4">
    <animate attributeName="x2" values="273.4;287.6;273.4" dur="8s" repeatCount="indefinite" calcMode="spline" keyTimes="0;0.5;1" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
    <animate attributeName="y2" values="353.4;367.6;353.4" dur="8s" repeatCount="indefinite" calcMode="spline" keyTimes="0;0.5;1" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
  </line>
  <line x1="190" y1="232" x2="190" y2="388">
    <animate attributeName="y2" values="388;408;388" dur="8s" repeatCount="indefinite" calcMode="spline" keyTimes="0;0.5;1" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
  </line>
  <line x1="163" y1="243" x2="106.6" y2="353.4">
    <animate attributeName="x2" values="106.6;92.4;106.6" dur="8s" repeatCount="indefinite" calcMode="spline" keyTimes="0;0.5;1" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
    <animate attributeName="y2" values="353.4;367.6;353.4" dur="8s" repeatCount="indefinite" calcMode="spline" keyTimes="0;0.5;1" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
  </line>
  <line x1="152" y1="270" x2="72" y2="270">
    <animate attributeName="x2" values="72;52;72" dur="8s" repeatCount="indefinite" calcMode="spline" keyTimes="0;0.5;1" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
  </line>
  <line x1="163" y1="297" x2="106.6" y2="186.6">
    <animate attributeName="x2" values="106.6;92.4;106.6" dur="8s" repeatCount="indefinite" calcMode="spline" keyTimes="0;0.5;1" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
    <animate attributeName="y2" values="186.6;172.4;186.6" dur="8s" repeatCount="indefinite" calcMode="spline" keyTimes="0;0.5;1" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
  </line>
</g>

<!-- Ringen der bærer de 8 egenskaber -->
<circle class="ring" cx="190" cy="270" r="118" stroke="#d8d2c8" stroke-width="0.7" fill="none" opacity="0.55"/>

<!-- 8 egenskabs-punkter - hver repræsenterer en af de otte essentielle kvaliteter -->
<!-- Lidt større end begrebs-oversigten for at markere deres særlige vigtighed -->
<circle cx="190.0" cy="152.0" r="2.2" fill="url(#dot-g)" opacity="0.95">
  <animate attributeName="cx" values="190.0;190.0;190.0" dur="8s" repeatCount="indefinite" calcMode="spline" keyTimes="0;0.5;1" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
  <animate attributeName="cy" values="152.0;132.0;152.0" dur="8s" repeatCount="indefinite" calcMode="spline" keyTimes="0;0.5;1" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
  <animate attributeName="r" values="2.2;3;2.2" dur="8s" repeatCount="indefinite" calcMode="spline" keyTimes="0;0.5;1" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
</circle>
<circle cx="273.4" cy="186.6" r="2.2" fill="url(#dot-g)" opacity="0.95">
  <animate attributeName="cx" values="273.4;287.6;273.4" dur="8s" repeatCount="indefinite" calcMode="spline" keyTimes="0;0.5;1" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
  <animate attributeName="cy" values="186.6;172.4;186.6" dur="8s" repeatCount="indefinite" calcMode="spline" keyTimes="0;0.5;1" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
  <animate attributeName="r" values="2.2;3;2.2" dur="8s" repeatCount="indefinite" calcMode="spline" keyTimes="0;0.5;1" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
</circle>
<circle cx="308.0" cy="270.0" r="2.2" fill="url(#dot-g)" opacity="0.95">
  <animate attributeName="cx" values="308.0;328.0;308.0" dur="8s" repeatCount="indefinite" calcMode="spline" keyTimes="0;0.5;1" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
  <animate attributeName="cy" values="270.0;270.0;270.0" dur="8s" repeatCount="indefinite" calcMode="spline" keyTimes="0;0.5;1" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
  <animate attributeName="r" values="2.2;3;2.2" dur="8s" repeatCount="indefinite" calcMode="spline" keyTimes="0;0.5;1" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
</circle>
<circle cx="273.4" cy="353.4" r="2.2" fill="url(#dot-g)" opacity="0.95">
  <animate attributeName="cx" values="273.4;287.6;273.4" dur="8s" repeatCount="indefinite" calcMode="spline" keyTimes="0;0.5;1" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
  <animate attributeName="cy" values="353.4;367.6;353.4" dur="8s" repeatCount="indefinite" calcMode="spline" keyTimes="0;0.5;1" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
  <animate attributeName="r" values="2.2;3;2.2" dur="8s" repeatCount="indefinite" calcMode="spline" keyTimes="0;0.5;1" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
</circle>
<circle cx="190.0" cy="388.0" r="2.2" fill="url(#dot-g)" opacity="0.95">
  <animate attributeName="cx" values="190.0;190.0;190.0" dur="8s" repeatCount="indefinite" calcMode="spline" keyTimes="0;0.5;1" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
  <animate attributeName="cy" values="388.0;408.0;388.0" dur="8s" repeatCount="indefinite" calcMode="spline" keyTimes="0;0.5;1" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
  <animate attributeName="r" values="2.2;3;2.2" dur="8s" repeatCount="indefinite" calcMode="spline" keyTimes="0;0.5;1" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
</circle>
<circle cx="106.6" cy="353.4" r="2.2" fill="url(#dot-g)" opacity="0.95">
  <animate attributeName="cx" values="106.6;92.4;106.6" dur="8s" repeatCount="indefinite" calcMode="spline" keyTimes="0;0.5;1" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
  <animate attributeName="cy" values="353.4;367.6;353.4" dur="8s" repeatCount="indefinite" calcMode="spline" keyTimes="0;0.5;1" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
  <animate attributeName="r" values="2.2;3;2.2" dur="8s" repeatCount="indefinite" calcMode="spline" keyTimes="0;0.5;1" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
</circle>
<circle cx="72.0" cy="270.0" r="2.2" fill="url(#dot-g)" opacity="0.95">
  <animate attributeName="cx" values="72.0;52.0;72.0" dur="8s" repeatCount="indefinite" calcMode="spline" keyTimes="0;0.5;1" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
  <animate attributeName="cy" values="270.0;270.0;270.0" dur="8s" repeatCount="indefinite" calcMode="spline" keyTimes="0;0.5;1" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
  <animate attributeName="r" values="2.2;3;2.2" dur="8s" repeatCount="indefinite" calcMode="spline" keyTimes="0;0.5;1" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
</circle>
<circle cx="106.6" cy="186.6" r="2.2" fill="url(#dot-g)" opacity="0.95">
  <animate attributeName="cx" values="106.6;92.4;106.6" dur="8s" repeatCount="indefinite" calcMode="spline" keyTimes="0;0.5;1" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
  <animate attributeName="cy" values="186.6;172.4;186.6" dur="8s" repeatCount="indefinite" calcMode="spline" keyTimes="0;0.5;1" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
  <animate attributeName="r" values="2.2;3;2.2" dur="8s" repeatCount="indefinite" calcMode="spline" keyTimes="0;0.5;1" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
</circle>

<circle class="core" cx="190" cy="270" r="42" fill="url(#core-g)"/>

<line x1="140" y1="520" x2="240" y2="520" stroke="#a89e92" stroke-width="0.5" opacity="0.5"/>
<text x="190" y="555" text-anchor="middle" font-family="Cinzel, serif" font-size="12" letter-spacing="4" fill="#d8d2c8" opacity="0.95">EGENSKABER</text>
<text x="190" y="580" text-anchor="middle" font-family="Cormorant Garamond, Georgia, serif" font-size="13" font-style="italic" fill="#a89e92" opacity="0.85">otte kvaliteter der modnes</text>
</svg>
