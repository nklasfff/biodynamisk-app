<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 380 640" role="img" aria-label="Den Levende Spiral">
<defs>
<style>
@keyframes core-r { 0%, 100% { r: 28px; } 50% { r: 36px; } }
@keyframes aura-r { 0%, 100% { rx: 158px; ry: 158px; } 50% { rx: 182px; ry: 182px; } }
/* Spiralen drejer langsomt - 30s for én rotation. Cirkulær bevægelse 
   gennem stadierne, dybere niveauer over tid */
@keyframes spiral-rotate {
  0% { transform: rotate(0deg); }
  100% { transform: rotate(360deg); }
}
@keyframes spiral-breathe {
  0%, 100% { transform: scale(1); }
  50% { transform: scale(1.06); }
}

.core { animation: core-r 8s ease-in-out infinite; }
.aura { animation: aura-r 8s ease-in-out infinite; }
.spiral-rot {
  animation: spiral-rotate 30s linear infinite;
  transform-origin: 190px 270px;
  transform-box: view-box;
}
.spiral-breath {
  animation: spiral-breathe 8s ease-in-out infinite;
  transform-origin: 190px 270px;
  transform-box: view-box;
}

/* Hvert af de 5 lyspunkter træder frem på skift - 20s cyklus */
@keyframes marker-highlight {
  0%, 100% { r: 2.4px; opacity: 0.7; }
  10% { r: 4.5px; opacity: 1; }
  20% { r: 2.4px; opacity: 0.7; }
}
.m-1 { animation: marker-highlight 20s ease-in-out infinite 0s; }
.m-2 { animation: marker-highlight 20s ease-in-out infinite -4s; }
.m-3 { animation: marker-highlight 20s ease-in-out infinite -8s; }
.m-4 { animation: marker-highlight 20s ease-in-out infinite -12s; }
.m-5 { animation: marker-highlight 20s ease-in-out infinite -16s; }

@media (prefers-reduced-motion: reduce) {
  .core, .aura, .spiral-rot, .spiral-breath, .m-1, .m-2, .m-3, .m-4, .m-5 { animation: none; }
}
</style>
<radialGradient id="well" cx="50%" cy="42%" r="65%">
<stop offset="0%" stop-color="#2a3847"/>
<stop offset="55%" stop-color="#1d2731"/>
<stop offset="100%" stop-color="#141b22"/>
</radialGradient>
<radialGradient id="core-g" cx="50%" cy="50%" r="50%">
<stop offset="0%" stop-color="#fce8ec" stop-opacity="1"/>
<stop offset="30%" stop-color="#e8c4d0" stop-opacity="0.75"/>
<stop offset="70%" stop-color="#b880a0" stop-opacity="0.25"/>
<stop offset="100%" stop-color="#7a5270" stop-opacity="0"/>
</radialGradient>
<radialGradient id="aura-g" cx="50%" cy="50%" r="50%">
<stop offset="0%" stop-color="#d8a0b8" stop-opacity="0.28"/>
<stop offset="55%" stop-color="#8a5878" stop-opacity="0.08"/>
<stop offset="100%" stop-color="#8a5878" stop-opacity="0"/>
</radialGradient>
<radialGradient id="marker-g" cx="50%" cy="50%" r="50%">
<stop offset="0%" stop-color="#fce8ec" stop-opacity="1"/>
<stop offset="50%" stop-color="#e8c4d0" stop-opacity="0.85"/>
<stop offset="100%" stop-color="#b880a0" stop-opacity="0"/>
</radialGradient>
</defs>

<rect x="0" y="0" width="380" height="640" fill="url(#well)"/>

<ellipse class="aura" cx="190" cy="270" rx="170" ry="170" fill="url(#aura-g)"/>

<!-- Spiralen + lyspunkter - drejer langsomt og ånder med pulsen.
     Dobbelt animation: rotation (30s) og åndedrag (8s) -->
<g class="spiral-rot">
  <g class="spiral-breath">
    <!-- Spiral-tråden -->
    <path d="M 332.0,270.0 L 328.9,292.0 L 322.4,313.0 L 312.8,332.6 L 300.3,350.2 L 285.5,365.5 L 268.5,378.1 L 250.0,387.8 L 230.4,394.4 L 210.2,397.8 L 190.0,398.0 L 170.2,395.0 L 151.3,389.1 L 133.8,380.3 L 118.1,369.0 L 104.4,355.6 L 93.2,340.3 L 84.7,323.7 L 78.9,306.1 L 76.0,288.1 L 76.0,270.0 L 78.8,252.4 L 84.2,235.6 L 92.2,220.2 L 102.3,206.3 L 114.3,194.3 L 127.9,184.6 L 142.7,177.2 L 158.2,172.2 L 174.1,169.8 L 190.0,170.0 L 205.4,172.6 L 220.0,177.6 L 233.5,184.6 L 245.5,193.6 L 255.8,204.2 L 264.1,216.2 L 270.4,229.1 L 274.5,242.6 L 276.3,256.3 L 276.0,270.0 L 273.6,283.2 L 269.1,295.7 L 262.9,307.1 L 255.0,317.3 L 245.9,325.9 L 235.6,332.8 L 224.6,337.9 L 213.1,341.1 L 201.5,342.5 L 190.0,342.0 L 179.0,339.7 L 168.6,335.8 L 159.2,330.4 L 151.0,323.7 L 144.0,316.0 L 138.5,307.4 L 134.6,298.2 L 132.2,288.8 L 131.3,279.3 L 132.0,270.0"
          stroke="#d8a0b8" stroke-width="0.7" fill="none" opacity="0.55" stroke-linecap="round"/>
    
    <!-- 5 lyspunkter langs spiralen - fra ydre Stadie 1 til indre Stadie 5 -->
    <circle class="m-1" cx="332.00" cy="270.00" r="2.4" fill="url(#marker-g)" opacity="0.7"/>
    <circle class="m-2" cx="104.44" cy="355.56" r="2.4" fill="url(#marker-g)" opacity="0.7"/>
    <circle class="m-3" cx="190.00" cy="170.00" r="2.4" fill="url(#marker-g)" opacity="0.7"/>
    <circle class="m-4" cx="245.86" cy="325.86" r="2.4" fill="url(#marker-g)" opacity="0.7"/>
    <circle class="m-5" cx="132.00" cy="270.00" r="2.4" fill="url(#marker-g)" opacity="0.7"/>
  </g>
</g>

<!-- Kerne i centrum - hvor spiralen ender, det dybeste niveau -->
<circle class="core" cx="190" cy="270" r="28" fill="url(#core-g)"/>

<line x1="140" y1="520" x2="240" y2="520" stroke="#7a5270" stroke-width="0.5" opacity="0.55"/>
<text x="190" y="555" text-anchor="middle" font-family="Cinzel, serif" font-size="12" letter-spacing="4" fill="#e8c4d0" opacity="0.95">DEN LEVENDE SPIRAL</text>
<text x="190" y="580" text-anchor="middle" font-family="Cormorant Garamond, Georgia, serif" font-size="13" font-style="italic" fill="#b880a0" opacity="0.85">de fem stadiers indbyrdes dynamik</text>
</svg>
