<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 380 640" role="img" aria-label="Blechschmidts Biodynamiske Embryologi">
<defs>
<style>
@keyframes core-r { 0%, 100% { r: 36px; } 50% { r: 46px; } }
@keyframes aura-r { 0%, 100% { rx: 158px; ry: 158px; } 50% { rx: 182px; ry: 182px; } }
/* Strømmene skalerer synkront fra centrum - væskestrømme der ånder */
@keyframes streams-breathe {
  0%, 100% { transform: scale(1); }
  50% { transform: scale(1.12); }
}
.core { animation: core-r 8s ease-in-out infinite; }
.aura { animation: aura-r 8s ease-in-out infinite; }
.streams-group {
  animation: streams-breathe 8s ease-in-out infinite;
  transform-origin: 190px 270px;
  transform-box: view-box;
}
@media (prefers-reduced-motion: reduce) {
  .core, .aura, .streams-group { animation: none; }
}
</style>
<radialGradient id="well" cx="50%" cy="42%" r="65%">
<stop offset="0%" stop-color="#2a3847"/>
<stop offset="55%" stop-color="#1d2731"/>
<stop offset="100%" stop-color="#141b22"/>
</radialGradient>
<!-- Blechschmidts farvepalet: varm fersken-creme - fostervandets farve, det embryonale -->
<radialGradient id="core-g" cx="50%" cy="50%" r="50%">
<stop offset="0%" stop-color="#fdf2e8" stop-opacity="1"/>
<stop offset="30%" stop-color="#f0d8c0" stop-opacity="0.75"/>
<stop offset="70%" stop-color="#c89e80" stop-opacity="0.25"/>
<stop offset="100%" stop-color="#8a6850" stop-opacity="0"/>
</radialGradient>
<radialGradient id="aura-g" cx="50%" cy="50%" r="50%">
<stop offset="0%" stop-color="#e8c8a8" stop-opacity="0.28"/>
<stop offset="55%" stop-color="#a8806a" stop-opacity="0.08"/>
<stop offset="100%" stop-color="#a8806a" stop-opacity="0"/>
</radialGradient>
</defs>

<rect x="0" y="0" width="380" height="640" fill="url(#well)"/>

<ellipse class="aura" cx="190" cy="270" rx="170" ry="170" fill="url(#aura-g)"/>

<!-- 8 væskestrømme - Blechschmidts otte mekanismer der former embryonet.
     Strømmene kurver fra periferi mod kerne - "fra ydre til indre udvikling".
     De roterer alle med samme retning og skaber en dynamisk vortex omkring kernen -->
<g class="streams-group" stroke="#f0d8c0" stroke-width="0.7" fill="none" opacity="0.7">
  <path d="M 190.00 170.00 Q 221.70 202.03 229.83 236.58"/>
  <path d="M 260.71 199.29 Q 260.48 244.35 241.80 274.53"/>
  <path d="M 290.00 270.00 Q 257.97 301.70 223.42 309.83"/>
  <path d="M 260.71 340.71 Q 215.65 340.48 185.47 321.80"/>
  <path d="M 190.00 370.00 Q 158.30 337.97 150.17 303.42"/>
  <path d="M 119.29 340.71 Q 119.52 295.65 138.20 265.47"/>
  <path d="M 90.00 270.00 Q 122.03 238.30 156.58 230.17"/>
  <path d="M 119.29 199.29 Q 164.35 199.52 194.53 218.20"/>
</g>

<!-- Ekstra indre lag af strømme - dybden af de metaboliske felter -->
<g class="streams-group" stroke="#e8c8a8" stroke-width="0.45" fill="none" opacity="0.38">
  <path d="M 190.00 200.00 Q 212.13 222.13 217.80 246.22"/>
  <path d="M 239.50 220.50 Q 239.33 252.04 226.26 273.17"/>
  <path d="M 260.00 270.00 Q 237.87 292.13 213.78 297.80"/>
  <path d="M 239.50 319.50 Q 207.96 319.33 186.83 306.26"/>
  <path d="M 190.00 340.00 Q 167.87 317.87 162.20 293.78"/>
  <path d="M 140.50 319.50 Q 140.67 287.96 153.74 266.83"/>
  <path d="M 120.00 270.00 Q 142.13 247.87 166.22 242.20"/>
  <path d="M 140.50 220.50 Q 172.04 220.67 193.17 233.74"/>
</g>

<circle class="core" cx="190" cy="270" r="42" fill="url(#core-g)"/>

<line x1="140" y1="520" x2="240" y2="520" stroke="#a8806a" stroke-width="0.5" opacity="0.55"/>
<text x="190" y="555" text-anchor="middle" font-family="Cinzel, serif" font-size="12" letter-spacing="4" fill="#f0d8c0" opacity="0.95">BLECHSCHMIDT</text>
<text x="190" y="580" text-anchor="middle" font-family="Cormorant Garamond, Georgia, serif" font-size="13" font-style="italic" fill="#c89e80" opacity="0.85">form fra bevægelse</text>
</svg>
