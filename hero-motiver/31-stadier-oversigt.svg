<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 380 640" role="img" aria-label="De 5 Stadier">
<defs>
<style>
@keyframes core-r { 0%, 100% { r: 36px; } 50% { r: 46px; } }
@keyframes aura-r { 0%, 100% { rx: 158px; ry: 158px; } 50% { rx: 182px; ry: 182px; } }
/* Lotus-bladene udfolder sig synkront fra centrum - alle 5 stadier til stede samtidig */
@keyframes petals-breathe {
  0%, 100% { transform: scale(1); }
  50% { transform: scale(1.12); }
}
.core { animation: core-r 8s ease-in-out infinite; }
.aura { animation: aura-r 8s ease-in-out infinite; }
.petals-group {
  animation: petals-breathe 8s ease-in-out infinite;
  transform-origin: 190px 270px;
  transform-box: view-box;
}

/* Hvert stadie's "hjerte" træder frem på skift - 20s cyklus, 4s per stadie */
@keyframes petal-highlight {
  0%, 100% { opacity: 0.5; }
  8% { opacity: 1; }
  16% { opacity: 0.5; }
}
@keyframes dot-highlight {
  0%, 100% { r: 2.2px; opacity: 0.7; }
  8% { r: 4px; opacity: 1; }
  16% { r: 2.2px; opacity: 0.7; }
}
.petal-1, .dot-1 { animation: petal-highlight 20s ease-in-out infinite 0s; }
.petal-2, .dot-2 { animation: petal-highlight 20s ease-in-out infinite -4s; }
.petal-3, .dot-3 { animation: petal-highlight 20s ease-in-out infinite -8s; }
.petal-4, .dot-4 { animation: petal-highlight 20s ease-in-out infinite -12s; }
.petal-5, .dot-5 { animation: petal-highlight 20s ease-in-out infinite -16s; }
.dot-1 { animation: dot-highlight 20s ease-in-out infinite 0s; }
.dot-2 { animation: dot-highlight 20s ease-in-out infinite -4s; }
.dot-3 { animation: dot-highlight 20s ease-in-out infinite -8s; }
.dot-4 { animation: dot-highlight 20s ease-in-out infinite -12s; }
.dot-5 { animation: dot-highlight 20s ease-in-out infinite -16s; }

@media (prefers-reduced-motion: reduce) {
  .core, .aura, .petals-group,
  .petal-1, .petal-2, .petal-3, .petal-4, .petal-5,
  .dot-1, .dot-2, .dot-3, .dot-4, .dot-5 { animation: none; }
}
</style>
<radialGradient id="well" cx="50%" cy="42%" r="65%">
<stop offset="0%" stop-color="#2a3847"/>
<stop offset="55%" stop-color="#1d2731"/>
<stop offset="100%" stop-color="#141b22"/>
</radialGradient>
<!-- Rose-violet palette - hænger sammen med Rejsen-skærmen som de 5 stadier hører under -->
<radialGradient id="core-g" cx="50%" cy="50%" r="50%">
<stop offset="0%" stop-color="#fce8ec" stop-opacity="1"/>
<stop offset="30%" stop-color="#e8c4d0" stop-opacity="0.75"/>
<stop offset="70%" stop-color="#b880a0" stop-opacity="0.25"/>
<stop offset="100%" stop-color="#7a5270" stop-opacity="0"/>
</radialGradient>
<radialGradient id="aura-g" cx="50%" cy="50%" r="50%">
<stop offset="0%" stop-color="#d8a0b8" stop-opacity="0.3"/>
<stop offset="55%" stop-color="#8a5878" stop-opacity="0.08"/>
<stop offset="100%" stop-color="#8a5878" stop-opacity="0"/>
</radialGradient>
<radialGradient id="petal-fill" cx="50%" cy="50%" r="50%">
<stop offset="0%" stop-color="#e8c4d0" stop-opacity="0.15"/>
<stop offset="100%" stop-color="#8a5878" stop-opacity="0"/>
</radialGradient>
<radialGradient id="dot-g" cx="50%" cy="50%" r="50%">
<stop offset="0%" stop-color="#fce8ec" stop-opacity="1"/>
<stop offset="50%" stop-color="#e8c4d0" stop-opacity="0.8"/>
<stop offset="100%" stop-color="#b880a0" stop-opacity="0"/>
</radialGradient>
</defs>

<rect x="0" y="0" width="380" height="640" fill="url(#well)"/>

<ellipse class="aura" cx="190" cy="270" rx="170" ry="170" fill="url(#aura-g)"/>

<!-- 5 lotus-blade - de fem stadier der udfolder sig fra kernen -->
<g class="petals-group">
  <!-- Stadie 1 - peger opad (begyndelsen) -->
  <path class="petal-1" d="M 190.00 230.00 Q 212.00 200.00 190.00 170.00 Q 168.00 200.00 190.00 230.00 Z" 
        stroke="#e8c4d0" stroke-width="0.65" fill="url(#petal-fill)"/>
  
  <!-- Stadie 2 - peger mod øst-nord-øst -->
  <path class="petal-2" d="M 228.04 257.64 Q 263.37 269.29 285.11 239.10 Q 249.78 227.45 228.04 257.64 Z"
        stroke="#e8c4d0" stroke-width="0.65" fill="url(#petal-fill)"/>
  
  <!-- Stadie 3 - peger mod syd-øst (relationelle) -->
  <path class="petal-3" d="M 213.51 302.36 Q 213.35 339.56 248.78 350.90 Q 248.94 313.70 213.51 302.36 Z"
        stroke="#e8c4d0" stroke-width="0.65" fill="url(#petal-fill)"/>
  
  <!-- Stadie 4 - peger mod syd-vest (long tide) -->
  <path class="petal-4" d="M 166.49 302.36 Q 131.06 313.70 131.22 350.90 Q 166.65 339.56 166.49 302.36 Z"
        stroke="#e8c4d0" stroke-width="0.65" fill="url(#petal-fill)"/>
  
  <!-- Stadie 5 - peger mod vest-nord-vest (dynamisk stilhed) -->
  <path class="petal-5" d="M 151.96 257.64 Q 130.22 227.45 94.89 239.10 Q 116.63 269.29 151.96 257.64 Z"
        stroke="#e8c4d0" stroke-width="0.65" fill="url(#petal-fill)"/>
  
  <!-- Et lille hjerte-punkt på spidsen af hvert blad - stadiets "lys" -->
  <circle class="dot-1" cx="190.00" cy="170.00" r="2.2" fill="url(#dot-g)"/>
  <circle class="dot-2" cx="285.11" cy="239.10" r="2.2" fill="url(#dot-g)"/>
  <circle class="dot-3" cx="248.78" cy="350.90" r="2.2" fill="url(#dot-g)"/>
  <circle class="dot-4" cx="131.22" cy="350.90" r="2.2" fill="url(#dot-g)"/>
  <circle class="dot-5" cx="94.89" cy="239.10" r="2.2" fill="url(#dot-g)"/>
</g>

<circle class="core" cx="190" cy="270" r="42" fill="url(#core-g)"/>

<line x1="140" y1="520" x2="240" y2="520" stroke="#8a5878" stroke-width="0.5" opacity="0.55"/>
<text x="190" y="555" text-anchor="middle" font-family="Cinzel, serif" font-size="12" letter-spacing="4" fill="#e8c4d0" opacity="0.95">DE 5 STADIER</text>
<text x="190" y="580" text-anchor="middle" font-family="Cormorant Garamond, Georgia, serif" font-size="13" font-style="italic" fill="#b880a0" opacity="0.85">spiralens fem blomstringer</text>
</svg>
