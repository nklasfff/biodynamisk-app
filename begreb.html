<!DOCTYPE html>
<html lang="da">
<head>
  <meta http-equiv="Cache-Control" content="no-store" />
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Den Biodynamiske App</title>

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=Cinzel:wght@300;400&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="css/style.css">

  <!-- Marked.js from CDN -->
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>
<body>

  <!-- Dark mode toggle -->
  <button class="theme-toggle" aria-label="Skift tema"></button>

  <div class="container" id="app-container">
    <!-- Content loaded dynamically via JavaScript -->
    <div style="text-align: center; padding: 60px 20px; color: var(--text-secondary);">
      <p>Indlæser...</p>
    </div>
  </div>

  <script>
    const id = new URLSearchParams(window.location.search).get('id');
    const container = document.getElementById('app-container');

    (async () => {
      const md = await (await fetch(`content/begreber/${id}.md`)).text();
      const svg = await (await fetch(`hero-motiver/${id}.svg`)).text();
      const body = md.replace(/^---[\s\S]*?---\n/, '');
      container.innerHTML = svg + marked.parse(body);
    })();
  </script>

  <script src="js/theme-toggle.js"></script>
</body>
</html>
