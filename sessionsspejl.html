<!DOCTYPE html>
<html lang="da">
<head>
  <meta http-equiv="Cache-Control" content="no-store" />
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- PWA / iOS standalone-mode -->
  <link rel="manifest" href="manifest.json">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Biodynamisk">
  <meta name="theme-color" content="#131a22">
  <link rel="apple-touch-icon" href="apple-touch-icon.png">
  <link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
  <title>Sessionsspejl — Den Biodynamiske App</title>

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=Cinzel:wght@300;400&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="container">

    <!-- Top navigation -->
    <header class="top-nav">
      <button class="back-btn" onclick="window.location.href='behandleren.html'">‹ Behandleren</button>
      <span class="category-label">SESSIONSSPEJL</span>
    </header>

    <!-- Main title -->
    <h1 class="main-title" style="margin-top: 24px;">SESSIONSSPEJL</h1>
    <p class="subtitle">stille refleksion mellem sessioner</p>

    <!-- Hero illustration: stille pool — kerne i centrum, ringe og genklang-orber omkring -->
    <div class="hero-container" style="max-width: 360px; margin: 24px auto 8px auto;">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 380 380" role="img" aria-label="Sessionsspejl — stille refleksion">
        <defs>
          <style>
            @keyframes ss-core-r { 0%, 100% { r: 28px; } 50% { r: 36px; } }
            @keyframes ss-aura-r { 0%, 100% { rx: 152px; ry: 152px; } 50% { rx: 174px; ry: 174px; } }
            @keyframes ss-ring-out { 0% { r: 42px; opacity: 0.5; } 100% { r: 152px; opacity: 0; } }
            @keyframes ss-echo-1 { 0%, 100% { r: 1.8px; opacity: 0.35; } 50% { r: 2.8px; opacity: 0.9; } }
            @keyframes ss-echo-2 { 0%, 100% { r: 2.8px; opacity: 0.9; } 50% { r: 1.8px; opacity: 0.35; } }
            @keyframes ss-echo-3 { 0%, 100% { r: 2.2px; opacity: 0.55; } 33% { r: 3px; opacity: 0.95; } 66% { r: 1.6px; opacity: 0.3; } }
            .ss-core { animation: ss-core-r 8s ease-in-out infinite; }
            .ss-aura { animation: ss-aura-r 8s ease-in-out infinite; }
            .ss-ring-1 { animation: ss-ring-out 8s ease-out infinite; animation-delay: 0s; }
            .ss-ring-2 { animation: ss-ring-out 8s ease-out infinite; animation-delay: 2.7s; }
            .ss-ring-3 { animation: ss-ring-out 8s ease-out infinite; animation-delay: 5.3s; }
            .ss-echo-a { animation: ss-echo-1 8s ease-in-out infinite; }
            .ss-echo-b { animation: ss-echo-2 8s ease-in-out infinite; }
            .ss-echo-c { animation: ss-echo-3 9s ease-in-out infinite; }
            @media (prefers-reduced-motion: reduce) {
              .ss-core, .ss-aura, .ss-ring-1, .ss-ring-2, .ss-ring-3,
              .ss-echo-a, .ss-echo-b, .ss-echo-c { animation: none; }
            }
          </style>
          <radialGradient id="well-ss" cx="50%" cy="50%" r="65%">
            <stop offset="0%" stop-color="#1f2a35"/>
            <stop offset="55%" stop-color="#131a22"/>
            <stop offset="100%" stop-color="#0c1218"/>
          </radialGradient>
          <radialGradient id="core-g-ss" cx="50%" cy="50%" r="50%">
            <stop offset="0%" stop-color="#f2f7fb" stop-opacity="1"/>
            <stop offset="30%" stop-color="#c4d0dc" stop-opacity="0.7"/>
            <stop offset="70%" stop-color="#8fa3b8" stop-opacity="0.2"/>
            <stop offset="100%" stop-color="#5e748a" stop-opacity="0"/>
          </radialGradient>
          <radialGradient id="aura-g-ss" cx="50%" cy="50%" r="50%">
            <stop offset="0%" stop-color="#c4d0dc" stop-opacity="0.28"/>
            <stop offset="55%" stop-color="#8fa3b8" stop-opacity="0.07"/>
            <stop offset="100%" stop-color="#8fa3b8" stop-opacity="0"/>
          </radialGradient>
          <radialGradient id="dot-g-ss" cx="50%" cy="50%" r="50%">
            <stop offset="0%" stop-color="#f2f7fb" stop-opacity="1"/>
            <stop offset="50%" stop-color="#c4d0dc" stop-opacity="0.7"/>
            <stop offset="100%" stop-color="#8fa3b8" stop-opacity="0"/>
          </radialGradient>
        </defs>

        <rect x="0" y="0" width="380" height="380" fill="url(#well-ss)"/>

        <!-- Aura -->
        <ellipse class="ss-aura" cx="190" cy="190" rx="152" ry="152" fill="url(#aura-g-ss)"/>

        <!-- Ekspanderende ringe — genklangene der breder sig udad fra centrum -->
        <g fill="none" stroke="#c4d0dc">
          <circle class="ss-ring-1" cx="190" cy="190" r="42" stroke-width="0.5"/>
          <circle class="ss-ring-2" cx="190" cy="190" r="42" stroke-width="0.5"/>
          <circle class="ss-ring-3" cx="190" cy="190" r="42" stroke-width="0.5"/>
        </g>

        <!-- Stille indre cirkler — stadig nærvær -->
        <circle cx="190" cy="190" r="62" fill="none" stroke="#8fa3b8" stroke-width="0.4" opacity="0.30"/>
        <circle cx="190" cy="190" r="84" fill="none" stroke="#8fa3b8" stroke-width="0.35" opacity="0.20"/>

        <!-- 8 genklang-orber radielt fordelt om kernen, blandede faser -->
        <circle class="ss-echo-a" cx="190" cy="92" r="2.2" fill="url(#dot-g-ss)"/>
        <circle class="ss-echo-b" cx="259.3" cy="120.7" r="2.2" fill="url(#dot-g-ss)"/>
        <circle class="ss-echo-c" cx="288" cy="190" r="2.2" fill="url(#dot-g-ss)"/>
        <circle class="ss-echo-a" cx="259.3" cy="259.3" r="2.2" fill="url(#dot-g-ss)"/>
        <circle class="ss-echo-b" cx="190" cy="288" r="2.2" fill="url(#dot-g-ss)"/>
        <circle class="ss-echo-c" cx="120.7" cy="259.3" r="2.2" fill="url(#dot-g-ss)"/>
        <circle class="ss-echo-a" cx="92" cy="190" r="2.2" fill="url(#dot-g-ss)"/>
        <circle class="ss-echo-b" cx="120.7" cy="120.7" r="2.2" fill="url(#dot-g-ss)"/>

        <!-- 4 ydre, mindre orber — fjernere genklange -->
        <circle class="ss-echo-c" cx="232" cy="64" r="1.5" fill="url(#dot-g-ss)" opacity="0.7"/>
        <circle class="ss-echo-a" cx="316" cy="232" r="1.5" fill="url(#dot-g-ss)" opacity="0.7"/>
        <circle class="ss-echo-b" cx="148" cy="316" r="1.5" fill="url(#dot-g-ss)" opacity="0.7"/>
        <circle class="ss-echo-c" cx="64" cy="148" r="1.5" fill="url(#dot-g-ss)" opacity="0.7"/>

        <!-- Central kerne — det nuværende øjeblik -->
        <circle class="ss-core" cx="190" cy="190" r="32" fill="url(#core-g-ss)"/>
      </svg>
    </div>

    <div class="divider"></div>

    <!-- App content (rendered by sessionsspejl.js based on state) -->
    <main id="sessionsspejl-app"></main>

    <!-- Bottom navigation -->
    <nav class="bottom-nav" data-active="behandleren"></nav>

  </div>

  <script src="js/theme-toggle.js"></script>
  <script src="js/bottom-nav.js"></script>
  <script src="js/sessionsspejl.js"></script>
</body>
</html>
