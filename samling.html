<!DOCTYPE html>
<html lang="da">
<head>
  <meta http-equiv="Cache-Control" content="no-store" />
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- PWA / iOS standalone-mode -->
  <link rel="manifest" href="manifest.json">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Biodynamisk">
  <meta name="theme-color" content="#131a22">
  <link rel="apple-touch-icon" href="apple-touch-icon.png">
  <link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
  <title>Mine Koans — Den Biodynamiske App</title>

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=Cinzel:wght@300;400&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <div class="container">

    <!-- Top navigation -->
    <header class="top-nav">
      <button class="back-btn" onclick="window.location.href='index.html'">‹ Hjem</button>
      <span class="category-label">MINE KOANS</span>
    </header>

    <!-- Main title -->
    <h1 class="main-title" style="margin-top: 24px;">MINE KOANS</h1>
    <p class="subtitle">invitationer der blev levende koans</p>

    <!-- Hero illustration: stille konstellation af koans der orbiterer den stille midte -->
    <div class="hero-container" style="max-width: 360px; margin: 24px auto 8px auto;">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 80 380 380" role="img" aria-label="Mine Koans — samlede øjeblikke der lever videre">
        <defs>
          <style>
            /* Konstellationen orbiterer langsomt om midten — koans der lever videre i tid.
               Hver enkelt ember pulserer med egen rytme indeni rotationen. */
            @keyframes mk-orbit { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
            @keyframes mk-orbit-rev { from { transform: rotate(0deg); } to { transform: rotate(-360deg); } }
            @keyframes mk-aura-r {
              0%, 100% { rx: 145px; ry: 145px; opacity: 0.7; }
              50% { rx: 178px; ry: 178px; opacity: 1; }
            }
            @keyframes mk-aura-inner {
              0%, 100% { rx: 80px; ry: 80px; opacity: 0.55; }
              50% { rx: 110px; ry: 110px; opacity: 0.95; }
            }
            @keyframes mk-ember-1 {
              0%, 100% { r: 2.6px; opacity: 0.35; }
              50% { r: 4.4px; opacity: 1; }
            }
            @keyframes mk-ember-2 {
              0%, 100% { r: 2.8px; opacity: 0.95; }
              50% { r: 1.8px; opacity: 0.35; }
            }
            @keyframes mk-ember-3 {
              0%, 100% { r: 1.8px; opacity: 0.4; }
              33% { r: 3.4px; opacity: 0.95; }
              66% { r: 1.4px; opacity: 0.25; }
            }
            @keyframes mk-thread { 0%, 100% { opacity: 0.10; } 50% { opacity: 0.30; } }
            @keyframes mk-anchor {
              0%, 100% { r: 3.5px; opacity: 0.55; }
              50% { r: 5.2px; opacity: 0.92; }
            }

            .mk-aura { animation: mk-aura-r 8s ease-in-out infinite; }
            .mk-aura-inner { animation: mk-aura-inner 8s ease-in-out infinite; }

            /* To koncentriske rotationer ved forskellig hastighed — giver tydelig
               bevægelse uden at være kaotisk */
            .mk-orbit-outer {
              animation: mk-orbit 90s linear infinite;
              transform-origin: 190px 270px;
              transform-box: view-box;
            }
            .mk-orbit-inner {
              animation: mk-orbit-rev 60s linear infinite;
              transform-origin: 190px 270px;
              transform-box: view-box;
            }

            .mk-e1 { animation: mk-ember-1 12s ease-in-out infinite; }
            .mk-e2 { animation: mk-ember-2 14s ease-in-out infinite; }
            .mk-e3 { animation: mk-ember-3 13s ease-in-out infinite; }
            .mk-thread { animation: mk-thread 11s ease-in-out infinite; }
            .mk-anchor { animation: mk-anchor 9s ease-in-out infinite; }

            @media (prefers-reduced-motion: reduce) {
              .mk-aura, .mk-aura-inner, .mk-orbit-outer, .mk-orbit-inner,
              .mk-e1, .mk-e2, .mk-e3, .mk-thread, .mk-anchor { animation: none; }
            }
          </style>
          <radialGradient id="mk-well" cx="50%" cy="42%" r="65%">
            <stop offset="0%" stop-color="#1f2a35"/>
            <stop offset="55%" stop-color="#131a22"/>
            <stop offset="100%" stop-color="#0c1218"/>
          </radialGradient>
          <!-- Monokrom palet — samme univers som DAGENS INVITATION -->
          <radialGradient id="mk-aura-outer" cx="50%" cy="50%" r="50%">
            <stop offset="0%" stop-color="#d8d8d8" stop-opacity="0.32"/>
            <stop offset="55%" stop-color="#888888" stop-opacity="0.09"/>
            <stop offset="100%" stop-color="#666666" stop-opacity="0"/>
          </radialGradient>
          <radialGradient id="mk-aura-inner-g" cx="50%" cy="50%" r="50%">
            <stop offset="0%" stop-color="#f0f0f0" stop-opacity="0.42"/>
            <stop offset="55%" stop-color="#b0b0b0" stop-opacity="0.13"/>
            <stop offset="100%" stop-color="#808080" stop-opacity="0"/>
          </radialGradient>
          <radialGradient id="mk-ember-g" cx="50%" cy="50%" r="50%">
            <stop offset="0%" stop-color="#ffffff" stop-opacity="1"/>
            <stop offset="30%" stop-color="#e8e8e8" stop-opacity="0.75"/>
            <stop offset="70%" stop-color="#a8a8a8" stop-opacity="0.25"/>
            <stop offset="100%" stop-color="#787878" stop-opacity="0"/>
          </radialGradient>
        </defs>

        <rect x="0" y="0" width="380" height="640" fill="url(#mk-well)"/>

        <!-- Ydre aura — det store felt, ånder synkront med dagens-invitation rytmen -->
        <ellipse class="mk-aura" cx="190" cy="270" rx="145" ry="145" fill="url(#mk-aura-outer)"/>

        <!-- Indre aura — tættere lys omkring kernen -->
        <ellipse class="mk-aura-inner" cx="190" cy="270" rx="80" ry="80" fill="url(#mk-aura-inner-g)"/>

        <!-- Ydre orbit (90s med uret) — fjernere koans og tråde -->
        <g class="mk-orbit-outer">
          <!-- Tynde tråde der forbinder de ydre embers -->
          <g class="mk-thread" stroke="#c8c8c8" stroke-width="0.4" fill="none" opacity="0.15">
            <path d="M 110 200 Q 175 168 240 195"/>
            <path d="M 240 195 Q 295 250 272 320"/>
            <path d="M 272 320 Q 200 360 128 322"/>
            <path d="M 128 322 Q 92 252 110 200"/>
          </g>

          <!-- 8 hovedembers i den ydre orbit -->
          <circle class="mk-e1" cx="110" cy="200" r="2.6" fill="url(#mk-ember-g)"/>
          <circle class="mk-e2" cx="175" cy="172" r="2.8" fill="url(#mk-ember-g)" style="animation-delay: -2s"/>
          <circle class="mk-e3" cx="240" cy="195" r="2.0" fill="url(#mk-ember-g)" style="animation-delay: -4s"/>
          <circle class="mk-e1" cx="295" cy="250" r="2.8" fill="url(#mk-ember-g)" style="animation-delay: -3s"/>
          <circle class="mk-e2" cx="272" cy="320" r="2.4" fill="url(#mk-ember-g)" style="animation-delay: -5s"/>
          <circle class="mk-e3" cx="200" cy="358" r="2.2" fill="url(#mk-ember-g)" style="animation-delay: -1s"/>
          <circle class="mk-e1" cx="128" cy="322" r="2.6" fill="url(#mk-ember-g)" style="animation-delay: -7s"/>
          <circle class="mk-e2" cx="92" cy="252" r="2.2" fill="url(#mk-ember-g)" style="animation-delay: -8s"/>

          <!-- Mindre fjerne fragmenter -->
          <circle class="mk-e3" cx="60" cy="170" r="1.4" fill="url(#mk-ember-g)" opacity="0.55" style="animation-delay: -9s"/>
          <circle class="mk-e3" cx="320" cy="180" r="1.4" fill="url(#mk-ember-g)" opacity="0.55" style="animation-delay: -6s"/>
          <circle class="mk-e3" cx="335" cy="308" r="1.3" fill="url(#mk-ember-g)" opacity="0.5" style="animation-delay: -10s"/>
          <circle class="mk-e3" cx="48" cy="338" r="1.3" fill="url(#mk-ember-g)" opacity="0.5" style="animation-delay: -2.5s"/>
        </g>

        <!-- Indre orbit (60s mod uret, modsat retning) — nære koans tæt på centrum -->
        <g class="mk-orbit-inner">
          <circle cx="190" cy="270" r="58" fill="none" stroke="#b0b0b0" stroke-width="0.4" opacity="0.20"/>
          <circle class="mk-e2" cx="232" cy="248" r="1.7" fill="url(#mk-ember-g)" opacity="0.7" style="animation-delay: -2s"/>
          <circle class="mk-e1" cx="232" cy="292" r="1.6" fill="url(#mk-ember-g)" opacity="0.7" style="animation-delay: -5s"/>
          <circle class="mk-e3" cx="148" cy="248" r="1.5" fill="url(#mk-ember-g)" opacity="0.65" style="animation-delay: -3s"/>
          <circle class="mk-e2" cx="148" cy="292" r="1.6" fill="url(#mk-ember-g)" opacity="0.65" style="animation-delay: -8s"/>
        </g>

        <!-- Stille anker i midten — det stille punkt orbitterne lever omkring -->
        <circle class="mk-anchor" cx="190" cy="270" r="3.5" fill="url(#mk-ember-g)"/>
      </svg>
    </div>

    <div class="divider"></div>

    <p class="samling-intro">
      Her samles de invitationer du har markeret som <em>dagens levende koan</em>. De ligger i den rækkefølge du gemte dem.
    </p>

    <div id="samling-slot"></div>

    <!-- Bottom navigation -->
    <nav class="bottom-nav" data-active=""></nav>

  </div>

  <script src="js/theme-toggle.js"></script>
  <script src="js/bottom-nav.js"></script>
  <script>
    (function () {
      'use strict';

      const STORAGE_KEY = 'biodynamisk-daglig-draw';
      const POOL_URL = 'content/daglig-draw/mikrotekster.json';

      function loadStorage() {
        try {
          const raw = localStorage.getItem(STORAGE_KEY);
          if (!raw) return null;
          return JSON.parse(raw);
        } catch (e) {
          return null;
        }
      }

      function formatDanishDate(dateKey) {
        const months = ['januar', 'februar', 'marts', 'april', 'maj', 'juni',
          'juli', 'august', 'september', 'oktober', 'november', 'december'];
        const d = new Date(dateKey);
        return d.getDate() + '. ' + months[d.getMonth()] + ' ' + d.getFullYear();
      }

      function escapeHtml(str) {
        if (!str) return '';
        return String(str)
          .replace(/&/g, '&amp;')
          .replace(/</g, '&lt;')
          .replace(/>/g, '&gt;')
          .replace(/"/g, '&quot;')
          .replace(/'/g, '&#39;');
      }

      function renderEmpty(slot) {
        slot.innerHTML = `
          <p class="samling-empty">
            Når du markerer en dagens invitation som <em>dagens levende koan</em>, vil den dukke op her —
            som en stille række af det, der har talt til dig.
          </p>
        `;
      }

      function renderList(slot, items) {
        // Nyeste øverst
        const sorted = items.slice().sort((a, b) => b.date.localeCompare(a.date));
        const html = sorted.map(item => `
          <li class="samling-item">
            <div class="samling-item-header">
              <span class="samling-item-type">${escapeHtml(item.kategori_label || '')}</span>
              <span class="samling-item-date">${escapeHtml(formatDanishDate(item.date))}</span>
            </div>
            <h2 class="samling-item-navn">${escapeHtml(item.navn)}</h2>
            <p class="samling-item-evokation">${escapeHtml(item.evokation)}</p>
          </li>
        `).join('');
        slot.innerHTML = `<ul class="samling-list">${html}</ul>`;
      }

      async function init() {
        const slot = document.getElementById('samling-slot');
        if (!slot) return;

        const state = loadStorage();
        if (!state || !state.sidder || state.sidder.length === 0) {
          renderEmpty(slot);
          return;
        }

        try {
          const res = await fetch(POOL_URL, { cache: 'no-cache' });
          if (!res.ok) throw new Error('Kunne ikke indlæse mikrotekster.json');
          const data = await res.json();
          const pool = data.mikrotekster || [];

          // Slå hver gemt id op i pool og tilføj dato
          const items = state.sidder
            .map(s => {
              const draw = pool.find(p => p.id === s.id);
              if (!draw) return null;
              return Object.assign({}, draw, { date: s.date });
            })
            .filter(Boolean);

          if (items.length === 0) {
            renderEmpty(slot);
          } else {
            renderList(slot, items);
          }
        } catch (e) {
          console.warn('Samling kunne ikke loades:', e);
          renderEmpty(slot);
        }
      }

      if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', init);
      } else {
        init();
      }
    })();
  </script>
</body>
</html>
