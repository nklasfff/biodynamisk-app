<!DOCTYPE html>
<html lang="da">
<head>
  <meta http-equiv="Cache-Control" content="no-store" />
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- PWA / iOS standalone-mode -->
  <link rel="manifest" href="manifest.json">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Biodynamisk">
  <meta name="theme-color" content="#131a22">
  <link rel="apple-touch-icon" href="apple-touch-icon.png">
  <link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
  <title>Bibliotek — Den Biodynamiske App</title>

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=Cinzel:wght@300;400&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="container">

    <!-- Top navigation -->
    <header class="top-nav">
      <button class="back-btn" onclick="history.back()">‹ Tilbage</button>
      <span class="category-label">BIBLIOTEK</span>
    </header>

    <!-- Main title -->
    <h1 class="main-title" style="margin-top: 24px;">BIBLIOTEK</h1>
    <p class="subtitle">bogens vokabular i kort form</p>

    <!-- Hero illustration: 6 koncentriske ringe (én pr. kategori) bærer biblioteket — bittesmå punkter spredt langs ringene -->
    <div class="hero-container" style="max-width: 360px; margin: 24px auto 8px auto;">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 80 380 380" role="img" aria-label="Bibliotek — bogens vokabular">
        <defs>
          <style>
            @keyframes bib-core-r { 0%, 100% { r: 32px; } 50% { r: 40px; } }
            @keyframes bib-aura-r { 0%, 100% { rx: 158px; ry: 158px; } 50% { rx: 182px; ry: 182px; } }
            @keyframes bib-rings { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.08); } }

            /* Et punkt vandrer rundt: dim → lyser klart op → fader stille bort.
               18s cyklus pr. punkt, og 15 punkter forskudt med 1.2s stagger
               giver én konstant vandrende glød rundt om biblioteket. */
            @keyframes bib-dot-light {
              0%   { opacity: 0.22; r: 1.3px; }
              4%   { opacity: 1;    r: 2.8px; }
              10%  { opacity: 1;    r: 2.8px; }
              22%  { opacity: 0.3;  r: 1.5px; }
              100% { opacity: 0.22; r: 1.3px; }
            }

            .bib-core { animation: bib-core-r 8s ease-in-out infinite; }
            .bib-aura { animation: bib-aura-r 8s ease-in-out infinite; }
            .bib-rings {
              animation: bib-rings 8s ease-in-out infinite;
              transform-origin: 190px 270px;
              transform-box: view-box;
            }
            .bib-cycle {
              animation: bib-dot-light 18s ease-in-out infinite;
            }
            @media (prefers-reduced-motion: reduce) {
              .bib-core, .bib-aura, .bib-rings, .bib-cycle { animation: none; }
            }
          </style>
          <radialGradient id="well-bib" cx="50%" cy="42%" r="65%">
            <stop offset="0%" stop-color="#1f2a35"/>
            <stop offset="55%" stop-color="#131a22"/>
            <stop offset="100%" stop-color="#0c1218"/>
          </radialGradient>
          <radialGradient id="core-g-bib" cx="50%" cy="50%" r="50%">
            <stop offset="0%" stop-color="#f2f7fb" stop-opacity="1"/>
            <stop offset="30%" stop-color="#c4d0dc" stop-opacity="0.7"/>
            <stop offset="70%" stop-color="#8fa3b8" stop-opacity="0.2"/>
            <stop offset="100%" stop-color="#5e748a" stop-opacity="0"/>
          </radialGradient>
          <radialGradient id="aura-g-bib" cx="50%" cy="50%" r="50%">
            <stop offset="0%" stop-color="#c4d0dc" stop-opacity="0.28"/>
            <stop offset="55%" stop-color="#8fa3b8" stop-opacity="0.07"/>
            <stop offset="100%" stop-color="#8fa3b8" stop-opacity="0"/>
          </radialGradient>
          <radialGradient id="dot-g-bib" cx="50%" cy="50%" r="50%">
            <stop offset="0%" stop-color="#f2f7fb" stop-opacity="1"/>
            <stop offset="50%" stop-color="#c4d0dc" stop-opacity="0.7"/>
            <stop offset="100%" stop-color="#8fa3b8" stop-opacity="0"/>
          </radialGradient>
          <radialGradient id="anchor-g-bib" cx="50%" cy="50%" r="50%">
            <stop offset="0%" stop-color="#f2f7fb" stop-opacity="1"/>
            <stop offset="50%" stop-color="#c4d0dc" stop-opacity="0.85"/>
            <stop offset="100%" stop-color="#8fa3b8" stop-opacity="0"/>
          </radialGradient>
        </defs>

        <rect x="0" y="0" width="380" height="640" fill="url(#well-bib)"/>

        <ellipse class="bib-aura" cx="190" cy="270" rx="170" ry="170" fill="url(#aura-g-bib)"/>

        <!-- 6 koncentriske ringe — én pr. kategori. Bærer hele biblioteket. -->
        <g class="bib-rings" fill="none" stroke="#c4d0dc">
          <!-- Ring 1: Principper -->
          <circle cx="190" cy="270" r="58" stroke-width="0.55" opacity="0.55"/>
          <!-- Ring 2: Blechschmidt -->
          <circle cx="190" cy="270" r="76" stroke-width="0.5" opacity="0.48"/>
          <!-- Ring 3: Perspektiver -->
          <circle cx="190" cy="270" r="94" stroke-width="0.45" opacity="0.42"/>
          <!-- Ring 4: Egenskaber -->
          <circle cx="190" cy="270" r="112" stroke-width="0.4" opacity="0.36"/>
          <!-- Ring 5: Zoner -->
          <circle cx="190" cy="270" r="130" stroke-width="0.4" opacity="0.30"/>
          <!-- Ring 6: Stadier -->
          <circle cx="190" cy="270" r="148" stroke-width="0.35" opacity="0.24"/>
        </g>

        <!-- Anker-markør på hver ring (lodret op fra centrum) — bærer kategorien -->
        <g class="bib-rings">
          <circle cx="190" cy="212" r="2.0" fill="url(#anchor-g-bib)" opacity="0.95"/>
          <circle cx="190" cy="194" r="1.9" fill="url(#anchor-g-bib)" opacity="0.85"/>
          <circle cx="190" cy="176" r="1.8" fill="url(#anchor-g-bib)" opacity="0.75"/>
          <circle cx="190" cy="158" r="1.7" fill="url(#anchor-g-bib)" opacity="0.65"/>
          <circle cx="190" cy="140" r="1.6" fill="url(#anchor-g-bib)" opacity="0.55"/>
          <circle cx="190" cy="122" r="1.5" fill="url(#anchor-g-bib)" opacity="0.45"/>
        </g>

        <!-- Bittesmå punkter spredt langs ringene — termerne i hver kategori.
             Hvert punkt cykler gennem dim → klart lys → langsom fade.
             Stagger på 1.2s vandrer gløden ca. med uret rundt om biblioteket,
             så brugeren oplever en konstant rolig bevægelse. -->
        <g class="bib-rings">
          <!-- 1. Ring 1 ØSØ -->
          <circle class="bib-cycle" style="animation-delay: 0s"     cx="240.2" cy="299.0" r="1.3" fill="url(#dot-g-bib)" opacity="0.22"/>
          <!-- 2. Ring 2 ØNØ -->
          <circle class="bib-cycle" style="animation-delay: -1.2s"  cx="261.0" cy="240.1" r="1.3" fill="url(#dot-g-bib)" opacity="0.22"/>
          <!-- 3. Ring 3 NØ -->
          <circle class="bib-cycle" style="animation-delay: -2.4s"  cx="270.6" cy="217.6" r="1.3" fill="url(#dot-g-bib)" opacity="0.22"/>
          <!-- 4. Ring 4 NØ ydre -->
          <circle class="bib-cycle" style="animation-delay: -3.6s"  cx="296.9" cy="232.6" r="1.3" fill="url(#dot-g-bib)" opacity="0.22"/>
          <!-- 5. Ring 6 NØ langt ude -->
          <circle class="bib-cycle" style="animation-delay: -4.8s"  cx="332.4" cy="218.0" r="1.3" fill="url(#dot-g-bib)" opacity="0.22"/>
          <!-- 6. Ring 5 SØ -->
          <circle class="bib-cycle" style="animation-delay: -6.0s"  cx="312.5" cy="304.5" r="1.3" fill="url(#dot-g-bib)" opacity="0.22"/>
          <!-- 7. Ring 4 SØ langt nede -->
          <circle class="bib-cycle" style="animation-delay: -7.2s"  cx="252.0" cy="362.0" r="1.3" fill="url(#dot-g-bib)" opacity="0.22"/>
          <!-- 8. Ring 2 SSØ -->
          <circle class="bib-cycle" style="animation-delay: -8.4s"  cx="222.4" cy="338.7" r="1.3" fill="url(#dot-g-bib)" opacity="0.22"/>
          <!-- 9. Ring 1 SV -->
          <circle class="bib-cycle" style="animation-delay: -9.6s"  cx="148.9" cy="311.5" r="1.3" fill="url(#dot-g-bib)" opacity="0.22"/>
          <!-- 10. Ring 3 SV ydre -->
          <circle class="bib-cycle" style="animation-delay: -10.8s" cx="118.4" cy="332.3" r="1.3" fill="url(#dot-g-bib)" opacity="0.22"/>
          <!-- 11. Ring 5 SV langt ude -->
          <circle class="bib-cycle" style="animation-delay: -12.0s" cx="74.1"  cy="316.1" r="1.3" fill="url(#dot-g-bib)" opacity="0.22"/>
          <!-- 12. Ring 2 V -->
          <circle class="bib-cycle" style="animation-delay: -13.2s" cx="118.0" cy="296.9" r="1.3" fill="url(#dot-g-bib)" opacity="0.22"/>
          <!-- 13. Ring 4 V -->
          <circle class="bib-cycle" style="animation-delay: -14.4s" cx="80.4"  cy="234.1" r="1.3" fill="url(#dot-g-bib)" opacity="0.22"/>
          <!-- 14. Ring 6 NV langt ude -->
          <circle class="bib-cycle" style="animation-delay: -15.6s" cx="71.4"  cy="194.7" r="1.3" fill="url(#dot-g-bib)" opacity="0.22"/>
          <!-- 15. Ring 1 NNV — lukker cirklen -->
          <circle class="bib-cycle" style="animation-delay: -16.8s" cx="146.6" cy="231.8" r="1.3" fill="url(#dot-g-bib)" opacity="0.22"/>
        </g>

        <!-- Central kerne — vokabularets fælles felt -->
        <circle class="bib-core" cx="190" cy="270" r="36" fill="url(#core-g-bib)"/>
      </svg>
    </div>

    <div class="divider"></div>

    <p class="bibliotek-intro">
      Et samlet sted for de seks kategorier af mikrotekster — biodynamiske
      principper, Blechschmidts embryologi, perspektiver, essentielle egenskaber,
      zoner og stadier. Browse efter kategori eller søg på et ord.
    </p>

    <main id="bibliotek-app"></main>

    <!-- Bottom navigation -->
    <nav class="bottom-nav" data-active=""></nav>

  </div>

  <script src="js/theme-toggle.js"></script>
  <script src="js/bottom-nav.js"></script>
  <script src="js/bibliotek.js"></script>
</body>
</html>
